<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#080c14">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="금융뉴스">
    <title>📰 금융뉴스</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="home-bar.js" onerror="console.log('home-bar skip')"></script>
    <style>
        :root {
            --bg:#080c14;--sf:#0e1422;--sf2:#131b2d;--sf3:#181f30;
            --bd:#1e2d45;--bd2:#263548;--text:#c8d6e8;--text2:#7a91a8;--text3:#4a5f74;
            --ac:#00d4ff;--green:#00e676;--red:#ff5252;--yel:#ffca28;
            --mono:'JetBrains Mono',monospace;--sans:'Noto Sans KR',sans-serif;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding-bottom:80px;}

        header{position:sticky;top:36px;z-index:100;background:rgba(8,12,20,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
        .logo{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--ac);display:flex;align-items:center;gap:9px;flex-shrink:0;}
        .logo-dot{width:7px;height:7px;border-radius:50%;background:var(--ac);box-shadow:0 0 8px var(--ac);animation:pulse 3s ease-in-out infinite;}
        @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--ac)}50%{opacity:.3;box-shadow:none}}

        .idx-bar{display:flex;gap:14px;flex-shrink:0;}
        .idx-item{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
        .idx-name{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.06em;}
        .idx-val{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text);}
        .idx-chg{font-family:var(--mono);font-size:10px;}
        .up{color:var(--green);}.dn{color:var(--red);}

        .tab-bar{position:sticky;top:88px;z-index:90;background:rgba(8,12,20,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;scrollbar-width:none;}
        .tab-bar::-webkit-scrollbar{display:none;}
        .tab-btn{flex:1;min-width:80px;padding:13px 4px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.04em;cursor:pointer;transition:all .2s;white-space:nowrap;}
        .tab-btn.active{color:var(--ac);border-bottom-color:var(--ac);background:rgba(0,212,255,.04);}
        .tab-btn:hover:not(.active){color:var(--text2);}

        .live-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--red);margin-right:4px;vertical-align:middle;box-shadow:0 0 4px var(--red);animation:blink 1.4s ease-in-out infinite;}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

        .news-list{padding:0;}
        .news-item{display:block;padding:14px 16px;border-bottom:1px solid var(--bd);text-decoration:none;color:inherit;transition:background .12s;-webkit-tap-highlight-color:transparent;}
        .news-item:active{background:var(--sf);}
        .news-title{font-size:14px;line-height:1.6;color:var(--text);margin-bottom:5px;word-break:keep-all;}
        .news-meta{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--text3);}
        .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;background:var(--sf3);border:1px solid var(--bd2);font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text2);flex-shrink:0;margin-right:6px;}
        .rank-badge.gold{color:var(--yel);border-color:rgba(255,202,40,.3);background:rgba(255,202,40,.06);}
        .rank-badge.silver{color:#9e9e9e;border-color:rgba(158,158,158,.3);}
        .rank-badge.bronze{color:#cd7f32;border-color:rgba(205,127,50,.3);}

        .state{padding:60px 20px;text-align:center;color:var(--text3);font-size:13px;line-height:1.8;}
        .spin{display:inline-block;width:18px;height:18px;border:2px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg)}}

        .status-bar{position:sticky;bottom:0;background:rgba(8,12,20,.9);backdrop-filter:blur(10px);border-top:1px solid var(--bd);padding:7px 16px;display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--text3);z-index:80;}
        .refresh-btn{background:none;border:1px solid var(--bd2);color:var(--text3);border-radius:5px;padding:3px 10px;font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .15s;}
        .refresh-btn:hover{border-color:var(--ac);color:var(--ac);}
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-dot"></div>
        금융뉴스
    </div>
    <div class="idx-bar" id="idxBar">
        <div class="idx-item">
            <span class="idx-name">KOSPI</span>
            <span class="idx-val" id="kospiVal">—</span>
            <span class="idx-chg" id="kospiChg"></span>
        </div>
        <div class="idx-item">
            <span class="idx-name">KOSDAQ</span>
            <span class="idx-val" id="kosdaqVal">—</span>
            <span class="idx-chg" id="kosdaqChg"></span>
        </div>
    </div>
</header>

<div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="realtime" onclick="switchTab('realtime')"><span class="live-dot"></span>실시간속보</button>
    <button class="tab-btn" data-tab="main"     onclick="switchTab('main')">주요뉴스</button>
    <button class="tab-btn" data-tab="popular"  onclick="switchTab('popular')">많이본뉴스</button>
    <button class="tab-btn" data-tab="focus"    onclick="switchTab('focus')">뉴스포커스</button>
</div>

<div id="newsArea"></div>

<div class="status-bar">
    <span id="statusLbl">—</span>
    <button class="refresh-btn" onclick="forceLoad()">↻ 새로고침</button>
</div>

<script>
const WORKER = 'https://lotto-proxy.blackcore-ff6.workers.dev';
const TTL = { realtime:120, main:300, popular:300, focus:600 };

let currentTab = 'realtime';
let autoTimer = null;

// ── 지수 ──────────────────────────────────────────────────
async function loadIndex() {
    try {
        const r = await fetch(WORKER + '/naver/index', { signal: AbortSignal.timeout(6000) });
        if (!r.ok) return;
        const d = await r.json();
        const fmt = v => Number(v).toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const chgHtml = (c, p) => {
            const cls = c >= 0 ? 'up' : 'dn';
            const s = c >= 0 ? '+' : '';
            return `<span class="${cls}">${s}${fmt(c)} (${s}${Number(p).toFixed(2)}%)</span>`;
        };
        document.getElementById('kospiVal').textContent  = fmt(d.kospi.value);
        document.getElementById('kospiChg').innerHTML    = chgHtml(d.kospi.change, d.kospi.changePct);
        document.getElementById('kosdaqVal').textContent = fmt(d.kosdaq.value);
        document.getElementById('kosdaqChg').innerHTML   = chgHtml(d.kosdaq.change, d.kosdaq.changePct);
    } catch {}
}

// ── 탭 ──────────────────────────────────────────────────
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    loadNews(tab);
}

// ── 캐시 ──────────────────────────────────────────────────
function getCache(tab) {
    try {
        const d = JSON.parse(localStorage.getItem('news_' + tab) || 'null');
        if (!d || Date.now() - d.ts > TTL[tab] * 1000) return null;
        return d.items;
    } catch { return null; }
}
function setCache(tab, items) {
    try { localStorage.setItem('news_' + tab, JSON.stringify({ ts: Date.now(), items })); } catch {}
}

// ── 로드 ──────────────────────────────────────────────────
async function loadNews(tab, force) {
    if (!force) {
        const cached = getCache(tab);
        if (cached) { renderNews(tab, cached); return; }
    }
    document.getElementById('newsArea').innerHTML =
        '<div class="state"><div class="spin"></div><br><br>뉴스 불러오는 중...</div>';
    document.getElementById('statusLbl').textContent = '불러오는 중...';
    try {
        const r = await fetch(WORKER + '/naver/news?tab=' + tab + '&count=30', {
            signal: AbortSignal.timeout(12000),
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const d = await r.json();
        const items = d.items || [];
        if (items.length === 0) throw new Error('뉴스를 가져오지 못했습니다');
        setCache(tab, items);
        renderNews(tab, items);
    } catch (e) {
        document.getElementById('newsArea').innerHTML =
            `<div class="state">⚠️ ${esc(e.message)}<br><br><button class="refresh-btn" onclick="forceLoad()" style="margin:0 auto;display:block;padding:6px 16px">다시 시도</button></div>`;
        document.getElementById('statusLbl').textContent = '로드 실패';
    }
}

function forceLoad() { loadNews(currentTab, true); }

// ── 렌더 ──────────────────────────────────────────────────
function renderNews(tab, items) {
    const isPopular = tab === 'popular';
    const html = items.map((item, i) => {
        let prefix = '';
        if (isPopular) {
            const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
            prefix = `<span class="rank-badge ${cls}">${i + 1}</span>`;
        }
        const time = item.time ? `<span>${esc(item.time)}</span>` : '';
        return `<a class="news-item" href="${esc(item.url)}" target="_blank" rel="noopener noreferrer">
            <div class="news-title">${prefix}${esc(item.title)}</div>
            <div class="news-meta">${time}</div>
        </a>`;
    }).join('');

    document.getElementById('newsArea').innerHTML = '<div class="news-list">' + html + '</div>';

    const now = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('statusLbl').textContent = now + ' 업데이트 · ' + items.length + '건';

    if (autoTimer) clearTimeout(autoTimer);
    if (tab === 'realtime') {
        autoTimer = setTimeout(() => { if (currentTab === 'realtime') loadNews('realtime', true); }, TTL.realtime * 1000);
    }
}

function esc(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── 초기화 ──────────────────────────────────────────────
loadIndex();
loadNews('realtime');
setInterval(loadIndex, 60000);
</script>
</body>
</html>
