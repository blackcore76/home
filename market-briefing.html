<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 시황 브리핑 — BlackCore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInAnonymously, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, collection, addDoc, query, orderBy,
           limit, getDocs, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  /* ──────────────────────────────────────────
     ★ Firebase 설정 — 본인 프로젝트 값으로 교체
  ────────────────────────────────────────── */
  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT.firebaseapp.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let uid = null;

  /* 익명 로그인 */
  signInAnonymously(auth).catch(e => console.warn('Auth fail:', e));
  onAuthStateChanged(auth, user => {
    if (user) {
      uid = user.uid;
      loadHistory();
    }
  });

  /* Firestore 저장 */
  window._saveBriefing = async function(text) {
    if (!uid) return;
    try {
      await addDoc(collection(db, 'users', uid, 'briefings'), {
        content: text,
        createdAt: serverTimestamp()
      });
      loadHistory();
    } catch(e) { console.warn('Save fail:', e); }
  };

  /* 히스토리 로드 */
  window._loadHistory = async function() { await loadHistory(); };

  async function loadHistory() {
    if (!uid) return;
    try {
      const q = query(
        collection(db, 'users', uid, 'briefings'),
        orderBy('createdAt', 'desc'),
        limit(20)
      );
      const snap = await getDocs(q);
      const items = snap.docs.map(d => ({
        id: d.id,
        content: d.data().content,
        ts: d.data().createdAt?.toDate() ?? new Date()
      }));
      renderHistory(items);
    } catch(e) {
      console.warn('History load fail:', e);
      renderHistory([]);
    }
  }

  function pad(n) { return String(n).padStart(2,'0'); }

  function renderHistory(items) {
    const list = document.getElementById('historyList');
    const empty = document.getElementById('historyEmpty');
    if (!list) return;

    if (!items.length) {
      list.innerHTML = '';
      empty.style.display = 'flex';
      return;
    }
    empty.style.display = 'none';

    list.innerHTML = items.map((item, i) => {
      const kst = new Date(item.ts.getTime() + 9 * 3600000);
      const dateStr = `${kst.getUTCFullYear()}.${pad(kst.getUTCMonth()+1)}.${pad(kst.getUTCDate())}`;
      const timeStr = `${pad(kst.getUTCHours())}:${pad(kst.getUTCMinutes())}`;
      // 첫 줄 (타이틀) 추출
      const firstLine = item.content.split('\n').find(l => l.trim()) || '브리핑';
      const preview = item.content.replace(firstLine, '').trim().slice(0, 60);

      return `
        <div class="hist-item ${i===0?'hist-latest':''}" onclick="showHistoryItem(${i})" data-idx="${i}">
          <div class="hist-meta">
            <span class="hist-date">${dateStr}</span>
            <span class="hist-time">${timeStr} KST</span>
          </div>
          <div class="hist-preview">${preview}…</div>
        </div>
      `;
    }).join('');

    // 전역에 저장
    window._historyItems = items;
  }
</script>

<style>
  :root {
    --ink:    #0d0f12;
    --ink2:   #13171e;
    --ink3:   #1a2030;
    --stone:  #c8bfb0;
    --stone2: #a09488;
    --stone3: #6b5f54;
    --cream:  #f0ebe3;
    --steel:  #3d6fa8;
    --steel2: #2a4f7a;
    --gold:   #c9a84c;
    --gold2:  #8f6e2a;
    --text:   #d8d0c8;
    --muted:  #6b6560;
    --up:     #4a9e6f;
    --down:   #c05050;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.10);

    --header-h: 48px;
    --subbar-h: 36px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--ink);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', sans-serif;
    font-size: 14px;
    font-weight: 400;
    overflow: hidden;
  }

  /* ══ 최상단 헤더 ══ */
  .app-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--ink2);
    border-bottom: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 100;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .badge-num {
    font-size: 10px;
    font-weight: 600;
    color: var(--gold);
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.25);
    padding: 2px 7px;
    border-radius: 2px;
    letter-spacing: 0.06em;
  }

  .brand-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--cream);
    letter-spacing: 0.02em;
  }

  .brand-sep {
    color: var(--muted);
    font-size: 12px;
    margin: 0 2px;
  }

  .brand-sub {
    font-size: 11px;
    color: var(--muted);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--steel2);
    animation: pulse 2.5s ease-in-out infinite;
    flex-shrink: 0;
  }
  .status-dot.active  { background: var(--up);   animation: none; }
  .status-dot.loading { background: var(--gold2); }
  .status-dot.error   { background: var(--down); animation: none; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .status-text {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .clock-display {
    font-size: 11px;
    color: var(--stone2);
    font-weight: 500;
    letter-spacing: 0.12em;
    font-variant-numeric: tabular-nums;
  }

  .btn-home {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    border: 1px solid var(--border2);
    border-radius: 2px;
    transition: all 0.2s;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-home:hover { color: var(--stone2); border-color: var(--stone3); }

  /* ══ 서브바 ══ */
  .sub-bar {
    position: fixed;
    top: var(--header-h);
    left: 0; right: 0;
    height: var(--subbar-h);
    background: var(--ink);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
    z-index: 90;
  }

  .sub-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .sub-val {
    font-size: 10px;
    color: var(--stone2);
    letter-spacing: 0.06em;
  }

  .sub-sep { color: var(--border2); }

  /* ══ 바디 ══ */
  .app-body {
    position: fixed;
    top: calc(var(--header-h) + var(--subbar-h));
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    overflow: hidden;
  }

  /* ══ 메인 패널 ══ */
  .panel-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
    min-width: 0;
  }

  .panel-main-inner {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* scrollbar */
  .panel-main-inner::-webkit-scrollbar,
  .history-list::-webkit-scrollbar { width: 4px; }
  .panel-main-inner::-webkit-scrollbar-track,
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .panel-main-inner::-webkit-scrollbar-thumb,
  .history-list::-webkit-scrollbar-thumb { background: var(--ink3); border-radius: 2px; }

  /* idle */
  .idle-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px 0;
    text-align: center;
    min-height: 200px;
  }

  .idle-icon {
    width: 52px;
    height: 52px;
    border: 1px solid var(--border2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    position: relative;
  }
  .idle-icon::after {
    content: '';
    position: absolute;
    inset: -7px;
    border-radius: 50%;
    border: 1px solid var(--border);
    border-top-color: var(--steel2);
    animation: spin 5s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .idle-title { font-size: 16px; font-weight: 500; color: var(--stone); }
  .idle-desc  { font-size: 12px; color: var(--muted); line-height: 1.7; margin-top: 6px; }

  /* loading */
  .loading-state { display: none; flex-direction: column; gap: 16px; }

  .progress-track {
    height: 2px;
    background: var(--ink3);
    border-radius: 1px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 35%;
    background: linear-gradient(90deg, transparent, var(--steel), var(--gold), transparent);
    animation: scan 1.8s ease-in-out infinite;
  }
  @keyframes scan { 0%{transform:translateX(-200%)} 100%{transform:translateX(500%)} }

  .log-area {
    font-size: 11px;
    color: var(--muted);
    line-height: 2.2;
    letter-spacing: 0.04em;
  }
  .log-line { opacity:0; animation: fadeIn .3s ease forwards; }
  .log-line.gold  { color: var(--gold2); }
  .log-line.steel { color: var(--steel); }
  @keyframes fadeIn { to { opacity:1; } }

  .cursor {
    display: inline-block;
    width: 6px; height: 12px;
    background: var(--steel);
    vertical-align: middle;
    margin-left: 3px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50%{opacity:0} }

  /* result */
  .result-state { display: none; flex-direction: column; gap: 18px; }

  .result-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .result-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .result-time { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }

  .briefing-text {
    font-size: 14px;
    font-weight: 300;
    line-height: 2.0;
    color: var(--text);
    white-space: pre-wrap;
    word-break: keep-all;
    letter-spacing: 0.01em;
    animation: slideUp .6s ease forwards;
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(6px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .error-box {
    display: none;
    font-size: 12px;
    color: var(--down);
    padding: 12px 16px;
    border: 1px solid rgba(192,80,80,0.2);
    background: rgba(192,80,80,0.04);
    border-radius: 2px;
    letter-spacing: 0.03em;
  }

  /* 버튼 영역 */
  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn-primary {
    flex: 1;
    min-width: 160px;
    padding: 13px 20px;
    background: transparent;
    border: 1px solid var(--steel2);
    color: var(--stone);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 2px;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(61,111,168,.08), transparent);
    opacity: 0;
    transition: opacity .2s;
  }
  .btn-primary:hover { border-color: var(--steel); color: var(--cream); box-shadow: 0 0 18px rgba(61,111,168,.12); }
  .btn-primary:hover::before { opacity: 1; }
  .btn-primary:active { transform: scale(.99); }
  .btn-primary:disabled { opacity: .3; cursor: not-allowed; transform: none; }

  .btn-secondary {
    padding: 13px 20px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 2px;
    transition: all .2s;
    display: none;
  }
  .btn-secondary:hover { border-color: var(--stone3); color: var(--stone2); }

  /* ══ 히스토리 패널 ══ */
  .panel-history {
    width: 300px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--ink2);
    overflow: hidden;
  }

  .hist-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .hist-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--stone2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .hist-count {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .history-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .hist-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    height: 100%;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 20px;
    text-align: center;
  }

  .hist-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .15s;
    position: relative;
  }
  .hist-item:hover { background: var(--ink3); }
  .hist-item.active { background: var(--ink3); }
  .hist-item.hist-latest::before {
    content: 'NEW';
    position: absolute;
    top: 14px; right: 14px;
    font-size: 8px;
    color: var(--gold2);
    letter-spacing: 0.1em;
    border: 1px solid rgba(201,168,76,0.25);
    padding: 1px 5px;
    border-radius: 2px;
  }

  .hist-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }
  .hist-date { font-size: 12px; font-weight: 500; color: var(--stone); letter-spacing: 0.04em; }
  .hist-time { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }

  .hist-preview {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
    letter-spacing: 0.02em;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* 히스토리 뷰어 오버레이 */
  .hist-viewer {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(13,15,18,0.85);
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .hist-viewer.open { display: flex; }

  .hist-viewer-inner {
    background: var(--ink2);
    border: 1px solid var(--border2);
    border-radius: 2px;
    width: 100%;
    max-width: 680px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .hist-viewer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--ink3);
    flex-shrink: 0;
  }
  .hist-viewer-title {
    font-size: 10px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .hist-viewer-ts { font-size: 10px; color: var(--muted); }

  .hist-viewer-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 2px 6px;
    transition: color .2s;
  }
  .hist-viewer-close:hover { color: var(--stone); }

  .hist-viewer-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px 24px;
  }
  .hist-viewer-body::-webkit-scrollbar { width: 4px; }
  .hist-viewer-body::-webkit-scrollbar-thumb { background: var(--ink3); }

  .hist-viewer-text {
    font-size: 14px;
    font-weight: 300;
    line-height: 2.0;
    color: var(--text);
    white-space: pre-wrap;
    word-break: keep-all;
    letter-spacing: 0.01em;
  }

  /* ══ 반응형 — 모바일 ══ */
  @media (max-width: 768px) {
    html, body { overflow: auto; }

    .app-body {
      position: static;
      flex-direction: column;
      overflow: auto;
      height: auto;
      margin-top: calc(var(--header-h) + var(--subbar-h));
      padding-bottom: 40px;
    }

    .panel-main { border-right: none; border-bottom: 1px solid var(--border); }
    .panel-main-inner { padding: 20px 16px; overflow: visible; }

    .panel-history { width: 100%; }
    .history-list { max-height: 320px; }

    .btn-primary { min-width: 100%; }
    .btn-secondary { width: 100%; }

    .sub-bar { gap: 12px; overflow-x: auto; white-space: nowrap; }
  }
</style>
</head>
<body>

<!-- ══ 헤더 ══ -->
<header class="app-header">
  <div class="header-brand">
    <span class="badge-num">07</span>
    <span class="brand-title">AI 시황 브리핑</span>
    <span class="brand-sep">/</span>
    <span class="brand-sub">Claude · Realtime</span>
  </div>
  <div class="header-right">
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">대기</span>
    </div>
    <span class="clock-display" id="clock">--:--:--</span>
    <a class="btn-home" href="index.html">← 홈</a>
  </div>
</header>

<!-- ══ 서브바 ══ -->
<div class="sub-bar">
  <span class="sub-label">KST</span>
  <span class="sub-val" id="subDate">--.--.--</span>
  <span class="sub-sep">|</span>
  <span class="sub-label">커버리지</span>
  <span class="sub-val">US · KR · FX · Commodities</span>
  <span class="sub-sep">|</span>
  <span class="sub-label">엔진</span>
  <span class="sub-val">Claude + Web Search</span>
</div>

<!-- ══ 바디 ══ -->
<div class="app-body">

  <!-- 메인 패널 -->
  <div class="panel-main">
    <div class="panel-main-inner" id="mainInner">

      <!-- idle -->
      <div class="idle-state" id="idleState">
        <div class="idle-icon">📡</div>
        <div>
          <div class="idle-title">AI 실시간 시황 브리핑</div>
          <div class="idle-desc">
            Claude가 웹 검색으로 현재 시장 데이터를 수집하고<br>한국어 브리핑을 생성합니다
          </div>
        </div>
      </div>

      <!-- loading -->
      <div class="loading-state" id="loadingState">
        <div class="progress-track"><div class="progress-fill"></div></div>
        <div class="log-area" id="logArea"></div>
      </div>

      <!-- result -->
      <div class="result-state" id="resultState">
        <div class="result-meta">
          <span class="result-label">◆ 시황 브리핑</span>
          <span class="result-time" id="resultTime"></span>
        </div>
        <div class="briefing-text" id="briefingText"></div>
        <div class="error-box" id="errorBox"></div>
      </div>

      <!-- 버튼 -->
      <div class="btn-row">
        <button class="btn-primary" id="btnMain" onclick="runBriefing()">
          실시간 시황 브리핑 받기
        </button>
        <button class="btn-secondary" id="btnRefresh" onclick="doRefresh()">
          ↻ 새로고침
        </button>
      </div>

    </div>
  </div>

  <!-- 히스토리 패널 -->
  <div class="panel-history">
    <div class="hist-header">
      <span class="hist-title">◈ 브리핑 히스토리</span>
      <span class="hist-count" id="histCount">최근 20건</span>
    </div>
    <div class="history-list" id="historyList"></div>
    <div class="hist-empty" id="historyEmpty">
      <span style="font-size:24px;opacity:.3">📂</span>
      <span>저장된 브리핑이 없습니다</span>
      <span style="font-size:10px">브리핑 생성 시 자동 저장됩니다</span>
    </div>
  </div>

</div>

<!-- ══ 히스토리 뷰어 오버레이 ══ -->
<div class="hist-viewer" id="histViewer" onclick="closeViewer(event)">
  <div class="hist-viewer-inner">
    <div class="hist-viewer-header">
      <span class="hist-viewer-title">◆ 브리핑 기록</span>
      <span class="hist-viewer-ts" id="viewerTs"></span>
      <button class="hist-viewer-close" onclick="closeViewer()">×</button>
    </div>
    <div class="hist-viewer-body">
      <div class="hist-viewer-text" id="viewerText"></div>
    </div>
  </div>
</div>

<script>
/* ── 시계 ── */
function pad(n) { return String(n).padStart(2,'0'); }

function updateClock() {
  const kst = new Date(Date.now() + 9 * 3600000);
  document.getElementById('clock').textContent =
    `${pad(kst.getUTCHours())}:${pad(kst.getUTCMinutes())}:${pad(kst.getUTCSeconds())}`;
  document.getElementById('subDate').textContent =
    `${kst.getUTCFullYear()}.${pad(kst.getUTCMonth()+1)}.${pad(kst.getUTCDate())}`;
}
updateClock();
setInterval(updateClock, 1000);

function kstLabel() {
  const kst = new Date(Date.now() + 9 * 3600000);
  return `${kst.getUTCFullYear()}.${pad(kst.getUTCMonth()+1)}.${pad(kst.getUTCDate())}  `
       + `${pad(kst.getUTCHours())}:${pad(kst.getUTCMinutes())} KST`;
}

/* ── DOM ── */
const $idle    = document.getElementById('idleState');
const $loading = document.getElementById('loadingState');
const $result  = document.getElementById('resultState');
const $btnMain = document.getElementById('btnMain');
const $btnRef  = document.getElementById('btnRefresh');
const $log     = document.getElementById('logArea');
const $text    = document.getElementById('briefingText');
const $error   = document.getElementById('errorBox');
const $dot     = document.getElementById('statusDot');
const $slabel  = document.getElementById('statusText');
const $rtime   = document.getElementById('resultTime');

const STATUS_LABELS = { idle:'대기', loading:'수집 중', active:'완료', error:'오류' };

function setStatus(s) {
  $dot.className = 'status-dot' + (s !== 'idle' ? ' '+s : '');
  $slabel.textContent = STATUS_LABELS[s] || '';
}

function addLog(text, cls, delay) {
  return new Promise(r => setTimeout(() => {
    const d = document.createElement('div');
    d.className = 'log-line' + (cls ? ' '+cls : '');
    d.textContent = text;
    $log.appendChild(d);
    r();
  }, delay));
}

async function showLoading() {
  $idle.style.display    = 'none';
  $result.style.display  = 'none';
  $loading.style.display = 'flex';
  $btnMain.disabled = true;
  $btnRef.style.display = 'none';
  $log.innerHTML = '';
  setStatus('loading');

  const steps = [
    ['> Claude AI 연결 중...', '', 0],
    ['> 웹 검색 도구 활성화', '', 350],
    ['> KOSPI / KOSDAQ 데이터 조회', 'gold', 850],
    ['> 나스닥 / S&P500 현재가 수집', 'gold', 1450],
    ['> USD/KRW 환율 실시간 검색', 'gold', 1950],
    ['> 국제 금값 · 원유 시세 조회', 'gold', 2450],
    ['> 시장 흐름 분석 중...', 'steel', 3100],
    ['> 브리핑 생성 중', 'steel', 3800],
  ];
  for (const [t,c,d] of steps) await addLog(t, c, d);
  setTimeout(() => {
    const cur = document.createElement('span');
    cur.className = 'cursor';
    $log.appendChild(cur);
  }, 4050);
}

function showResult(text) {
  $loading.style.display = 'none';
  $result.style.display  = 'flex';
  $error.style.display   = 'none';
  $text.textContent = text;
  $rtime.textContent = kstLabel();
  $btnMain.style.display = 'none';
  $btnRef.style.display  = 'block';
  setStatus('active');
}

function showError(msg) {
  $loading.style.display = 'none';
  $result.style.display  = 'flex';
  $text.textContent = '';
  $error.style.display   = 'block';
  $error.textContent = '⚠ ' + msg;
  $btnMain.disabled = false;
  setStatus('error');
}

function doRefresh() {
  $idle.style.display    = 'flex';
  $result.style.display  = 'none';
  $loading.style.display = 'none';
  $btnMain.style.display = 'block';
  $btnMain.disabled = false;
  $btnRef.style.display  = 'none';
  setStatus('idle');
  runBriefing();
}

/* ── 히스토리 뷰어 ── */
window.showHistoryItem = function(idx) {
  const items = window._historyItems;
  if (!items || !items[idx]) return;
  const item = items[idx];
  const kst = new Date(item.ts.getTime() + 9 * 3600000);
  document.getElementById('viewerTs').textContent =
    `${kst.getUTCFullYear()}.${pad(kst.getUTCMonth()+1)}.${pad(kst.getUTCDate())}  `
    + `${pad(kst.getUTCHours())}:${pad(kst.getUTCMinutes())} KST`;
  document.getElementById('viewerText').textContent = item.content;
  document.getElementById('histViewer').classList.add('open');
};

window.closeViewer = function(e) {
  if (!e || e.target === document.getElementById('histViewer')) {
    document.getElementById('histViewer').classList.remove('open');
  }
};

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('histViewer').classList.remove('open');
});

/* ── Claude API ── */
async function runBriefing() {
  await showLoading();

  const system = `당신은 블랙코어(BlackCore)의 전담 시황 브리퍼입니다.
웹 검색으로 KST 기준 최신 시장 데이터를 수집한 뒤 아래 형식으로 브리핑을 작성하세요.

[오늘의 시황 — YYYY.MM.DD HH:MM KST]

📊 주요 지수
KOSPI       xxx,xxx.xx  ▲/▼ xx.xx (+x.xx%)
KOSDAQ      xxx.xx      ▲/▼ xx.xx (+x.xx%)
나스닥      xx,xxx.xx   ▲/▼ xx.xx
S&P500      x,xxx.xx    ▲/▼ xx.xx

💱 환율 · 원자재
USD/KRW     x,xxx원
국제금      $x,xxx.xx/oz
WTI 원유    $xx.xx/bbl

📌 핵심 흐름
[오늘 시장 핵심 2~3줄. 주요 이슈, 섹터 동향, 전반적 분위기]

⚡ 주목 포인트
[투자자 관점 오늘 가장 주목할 1가지. 구체적 근거 포함]

마크다운 없이 순수 텍스트만. 수치는 검색한 실제 최신 데이터 사용.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system,
        messages: [{
          role: 'user',
          content: '지금 웹 검색으로 실시간 데이터를 수집해서 오늘 KST 기준 시황 브리핑을 작성해줘.'
        }],
        tools: [{ type: 'web_search_20250305', name: 'web_search' }]
      })
    });

    if (!res.ok) {
      const e = await res.json().catch(()=>({}));
      throw new Error(e?.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const text = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n')
      .trim();

    if (!text) throw new Error('응답이 비어있습니다. 다시 시도해주세요.');

    showResult(text);

    // Firebase 저장
    if (typeof window._saveBriefing === 'function') {
      window._saveBriefing(text);
    }

  } catch(e) {
    showError(e.message || '알 수 없는 오류가 발생했습니다.');
  }
}
</script>
</body>
</html>
