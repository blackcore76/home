<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#080c14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI 브리핑">
<title>📈 AI 주식 분석 브리핑</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyCIQKMbhnQY2sIdDthFrm-dznnVMs5pb30",
  authDomain: "my-bp-tracker-3d595.firebaseapp.com",
  projectId: "my-bp-tracker-3d595",
  storageBucket: "my-bp-tracker-3d595.firebasestorage.app",
  messagingSenderId: "1016360206319",
  appId: "1:1016360206319:web:5f5df2e2c45b30694a401a"
});

<script src="auth.js"></script>
<script src="home-bar.js"></script>

<style>
:root{
--bg:#080c14;
--sf:#0e1422;
--sf2:#131b2d;
--sf3:#181f30;
--bd:#1e2d45;
--bd2:#263548;
--text:#c8d6e8;
--text2:#7a91a8;
--text3:#4a5f74;
--accent:#00d4ff;
--green:#00e676;
--red:#ff5252;
--mono:'JetBrains Mono', monospace;
--sans:'Noto Sans KR', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
background:var(--bg);
color:var(--text);
font-family:var(--sans);
padding-bottom:80px;
}
header{
position:sticky;
top:36px;
z-index:50;
height:52px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 16px;
background:rgba(8,12,20,.92);
backdrop-filter:blur(16px);
border-bottom:1px solid var(--bd);
}
.logo{
font-family:var(--mono);
color:var(--accent);
display:flex;
gap:8px;
align-items:center;
font-weight:600;
}
.logo-dot{
width:7px;height:7px;border-radius:50%;
background:var(--accent);
box-shadow:0 0 8px var(--accent);
}
.user-badge{
display:flex;
align-items:center;
gap:6px;
font-family:var(--mono);
font-size:10px;
background:var(--sf2);
border:1px solid var(--bd);
padding:4px 10px;
border-radius:20px;
color:var(--text2);
}
.container{
padding:20px 16px;
}
.card{
background:var(--sf);
border:1px solid var(--bd);
border-radius:14px;
padding:20px;
margin-bottom:16px;
}
.search-box{
display:flex;
gap:8px;
}
.search-input{
flex:1;
background:var(--sf2);
border:1px solid var(--bd2);
color:var(--text);
padding:12px;
border-radius:8px;
font-family:var(--mono);
}
.btn{
background:var(--accent);
border:none;
padding:0 20px;
border-radius:8px;
font-weight:700;
cursor:pointer;
}
.price-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:20px;
}
.price-card{
background:var(--sf3);
border:1px solid var(--bd);
padding:12px;
border-radius:10px;
text-align:center;
}
.chart-area{
background:var(--sf3);
border:1px solid var(--bd);
padding:14px;
border-radius:12px;
margin-bottom:20px;
}
.report-area{
background:linear-gradient(135deg,var(--sf),var(--sf2));
border:1px solid rgba(0,212,255,.2);
padding:18px;
border-radius:14px;
}
.report-content{
white-space:pre-line;
line-height:1.8;
font-size:13px;
color:var(--text2);
}
.report-actions{
display:flex;
gap:8px;
margin-top:16px;
}
.report-btn{
flex:1;
padding:12px;
border-radius:10px;
cursor:pointer;
font-weight:700;
}
.save-btn{
background:var(--accent);
border:none;
color:#000;
}
.view-btn{
background:var(--sf3);
border:1px solid var(--bd);
color:var(--text);
}
.saved-wrap{
margin-top:18px;
display:none;
}
.symbol-group{
margin-bottom:18px;
}
.symbol-title{
font-family:var(--mono);
color:var(--accent);
font-size:12px;
margin-bottom:8px;
}
.saved-item{
background:var(--sf3);
border:1px solid var(--bd);
padding:12px;
border-radius:10px;
margin-bottom:8px;
cursor:pointer;
}
.saved-date{
font-size:11px;
color:var(--text3);
margin-bottom:6px;
}
.saved-preview{
font-size:12px;
color:var(--text2);
line-height:1.6;
}
.delete-btn{
margin-top:8px;
background:none;
border:1px solid var(--red);
color:var(--red);
padding:6px 10px;
border-radius:8px;
cursor:pointer;
font-size:11px;
}
.hidden{display:none}
</style>
</head>
<body>

<header>
<div class="logo"><div class="logo-dot"></div>AI 주식 분석 브리핑</div>
<div class="user-badge">
<span>👤</span>
<span id="userEmail">로그인</span>
</div>
</header>

<div class="container">

<div class="card">
<div class="search-box">
<input id="symbolInput" class="search-input" value="AAPL">
<button class="btn" onclick="fetchAndAnalyze()">분석</button>
</div>
</div>

<div id="resultArea" class="hidden">
<div class="price-grid">
<div class="price-card"><div>현재가</div><div id="currentPrice">-</div></div>
<div class="price-card"><div>변동률</div><div id="changePercent">-</div></div>
<div class="price-card"><div>변동폭</div><div id="rangeValue">-</div></div>
</div>

<div class="chart-area">
<canvas id="chart"></canvas>
</div>

<div class="report-area">
<div id="analysisText" class="report-content"></div>

<div class="report-actions">
<button class="report-btn save-btn" onclick="saveReport()">리포트 저장</button>
<button class="report-btn view-btn" onclick="toggleReports()">저장된 리포트</button>
</div>

<div id="savedWrap" class="saved-wrap"></div>
</div>
</div>

</div>

<script>
const db = firebase.firestore();
const COL = "market_aibriefings";

let currentUser=null;
let currentReport=null;
let chart=null;

firebase.auth().onAuthStateChanged(user=>{
currentUser=user;
document.getElementById("userEmail").textContent=user?user.email.split("@")[0]:"로그인";
});

async function fetchAndAnalyze(){
const symbol=document.getElementById("symbolInput").value.trim().toUpperCase();
const finnhubKey=localStorage.getItem("finnhub_key");
const geminiKey=localStorage.getItem("gemini_key");

const stock=await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${finnhubKey}`).then(r=>r.json());

document.getElementById("currentPrice").innerText=`$${stock.c}`;
document.getElementById("changePercent").innerText=`${stock.dp}%`;
document.getElementById("rangeValue").innerText=`$${(stock.h-stock.l).toFixed(2)}`;

const ctx=document.getElementById("chart").getContext("2d");
if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"line",
data:{
labels:["저가","현재","고가"],
datasets:[{
data:[stock.l,stock.c,stock.h],
borderColor:"#00d4ff",
tension:.2
}]
},
options:{plugins:{legend:{display:false}}}
});

const prompt=`${symbol} 주식 현재가 ${stock.c} 기준 한국어 투자 브리핑 작성`;

const ai=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${geminiKey}`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{parts:[{text:prompt}]}]
})
}).then(r=>r.json());

const text=ai.candidates?.[0]?.content?.parts?.[0]?.text || "분석 실패";
document.getElementById("analysisText").innerText=text;
document.getElementById("resultArea").classList.remove("hidden");

currentReport={
symbol,
report:text,
price:stock.c,
createdAt:new Date().toISOString(),
title:`${symbol} ${new Date().toLocaleDateString("ko-KR")} 분석`
};
}

async function saveReport(){
if(!currentUser){
alert("로그인 후 저장 가능합니다.");
return;
}
if(!currentReport)return;

await db.collection(COL).add({
...currentReport,
uid:currentUser.uid,
email:currentUser.email
});

alert("저장 완료");
}

async function toggleReports(){
const wrap=document.getElementById("savedWrap");

if(wrap.style.display==="block"){
wrap.style.display="none";
return;
}

const snap=await db.collection(COL).orderBy("createdAt","desc").limit(50).get();

const grouped={};

snap.forEach(doc=>{
const d=doc.data();
if(!grouped[d.symbol]) grouped[d.symbol]=[];
grouped[d.symbol].push({id:doc.id,...d});
});

let html="";

Object.keys(grouped).forEach(symbol=>{
html+=`<div class="symbol-group"><div class="symbol-title">${symbol}</div>`;
grouped[symbol].forEach(item=>{
html+=`
<div class="saved-item" onclick="loadReport('${item.id}')">
<div class="saved-date">${new Date(item.createdAt).toLocaleString("ko-KR")}</div>
<div class="saved-preview">${item.report.substring(0,120)}...</div>
${currentUser && currentUser.uid===item.uid ? `<button class="delete-btn" onclick="event.stopPropagation();deleteReport('${item.id}')">삭제</button>` : ""}
</div>`;
});
html+="</div>";
});

wrap.innerHTML=html || "저장된 리포트 없음";
wrap.style.display="block";
}

async function loadReport(id){
const doc=await db.collection(COL).doc(id).get();
const d=doc.data();
document.getElementById("analysisText").innerText=d.report;
}

async function deleteReport(id){
if(!confirm("삭제하시겠습니까?")) return;
await db.collection(COL).doc(id).delete();
toggleReports();
toggleReports();
}
</script>

</body>
</html>
