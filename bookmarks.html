<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#080c14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>북마크 저장소</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
:root {
  --bg:      #080c14;
  --sf:      #0e1422;
  --sf2:     #131b2d;
  --sf3:     #181f30;
  --bd:      #1e2d45;
  --bd2:     #263548;
  --text:    #c8d6e8;
  --text2:   #7a91a8;
  --text3:   #4a5f74;
  --accent:  #00d4ff;
  --accent2: #0099cc;
  --green:   #00e676;
  --red:     #ff5252;
  --yellow:  #ffca28;
  --mono:    'JetBrains Mono', monospace;
  --sans:    'Noto Sans KR', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* HEADER */
header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(8,12,20,.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bd);
  padding: 0 16px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 8px; }
.logo-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); animation: pulse 3s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 8px var(--accent)} 50%{opacity:.4;box-shadow:0 0 3px var(--accent)} }
.sync-badge { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; color: var(--text3); background: var(--sf); border: 1px solid var(--bd); border-radius: 20px; padding: 3px 10px; }
.sdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.sdot.live { background: var(--green); box-shadow: 0 0 5px var(--green); animation: bl 3s infinite; }
.sdot.load { background: var(--yellow); box-shadow: 0 0 5px var(--yellow); animation: bl .6s infinite; }
.sdot.err  { background: var(--red); }
@keyframes bl { 0%,100%{opacity:1} 50%{opacity:.2} }
.user-badge {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10px;
  color: var(--text2); background: var(--sf2);
  border: 1px solid var(--bd); border-radius: 20px;
  padding: 3px 10px;
  cursor: pointer;
}
.user-badge .user-email { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-badge:hover { border-color: var(--accent); color: var(--accent); }

/* INPUT AREA */
.input-wrap {
  padding: 16px;
  background: var(--sf);
  border-bottom: 1px solid var(--bd);
}
.input-box {
  background: var(--sf2);
  border: 1px solid var(--bd2);
  border-radius: 12px;
  padding: 14px;
  transition: border-color .2s;
}
.input-box:focus-within { border-color: var(--accent); }

/* 카테고리 & URL 행 */
.row-group {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.row-group > * { flex: 1; min-width: 140px; }

.url-input, .category-select, .new-cat-input {
  background: var(--sf3); border: 1px solid var(--bd2); color: var(--text);
  border-radius: 8px; padding: 8px 12px;
  font-family: var(--sans); font-size: 13px;
  outline: none;
}
.url-input:focus, .category-select:focus, .new-cat-input:focus {
  border-color: var(--accent);
}
.url-input::placeholder { color: var(--text3); }

.new-cat-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  align-items: center;
}
.new-cat-input {
  flex: 1;
}
.btn-add-cat {
  background: var(--sf3); border: 1px solid var(--bd); color: var(--text2);
  border-radius: 8px; padding: 8px 14px;
  font-size: 12px; cursor: pointer;
  transition: all .15s;
}
.btn-add-cat:hover { border-color: var(--accent); color: var(--accent); }

textarea {
  width: 100%; background: transparent; border: none; outline: none;
  color: var(--text); font-family: var(--sans); font-size: 14px;
  line-height: 1.7; resize: none; min-height: 70px;
}
textarea::placeholder { color: var(--text3); }
.input-footer {
  display: flex; justify-content: space-between; align-items: center; margin-top: 10px;
}
.char-count { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.btn-submit {
  background: var(--accent); color: #000; border: none; border-radius: 8px;
  padding: 8px 20px; font-family: var(--sans); font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px;
}
.btn-submit:hover { background: #33ddff; }
.btn-submit:disabled { opacity: .4; pointer-events: none; }

/* FILTER */
.filter-bar {
  padding: 10px 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  border-bottom: 1px solid var(--bd);
}
.filter-input {
  background: var(--sf2); border: 1px solid var(--bd2); color: var(--text);
  border-radius: 6px; padding: 6px 10px; font-size: 12px; font-family: var(--sans);
  outline: none; width: 140px;
}
.filter-input:focus { border-color: var(--accent); }
.filter-input::placeholder { color: var(--text3); }
.count-chip {
  margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--text3);
  background: var(--sf2); border: 1px solid var(--bd); border-radius: 20px;
  padding: 3px 10px;
}
.count-chip span { color: var(--accent); font-weight: 600; }

/* FEED (북마크 목록) */
.feed { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }

.bookmark-item {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 14px;
  padding: 16px;
  position: relative;
  transition: border-color .2s, background .2s;
  animation: fadeIn .3s ease both;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.bookmark-item::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, var(--accent), transparent);
  border-radius: 3px 0 0 3px;
}
.bookmark-item:hover { border-color: var(--bd2); background: var(--sf2); }

.item-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap;
}
.item-category {
  font-family: var(--mono); font-size: 10px;
  background: rgba(0,212,255,.15);
  border: 1px solid rgba(0,212,255,.3);
  color: var(--accent);
  border-radius: 12px;
  padding: 3px 10px;
}
.item-url {
  font-family: var(--mono); font-size: 10px; color: var(--text2);
  background: var(--sf3); border: 1px solid var(--bd); border-radius: 5px;
  padding: 2px 8px;
  text-decoration: none;
  transition: all .15s;
}
.item-url:hover { color: var(--accent); border-color: var(--accent); }
.item-author {
  font-family: var(--mono); font-size: 9px; color: var(--text3);
  background: var(--sf3); border: 1px solid var(--bd); border-radius: 5px;
  padding: 2px 6px;
}
.item-time {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  margin-left: auto;
}
.item-actions { display: flex; gap: 5px; }
.btn-icon {
  background: transparent; border: 1px solid var(--bd); color: var(--text3);
  border-radius: 6px; width: 28px; height: 28px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: all .15s;
}
.btn-icon.edit:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,.08); }
.btn-icon.del:hover  { border-color: var(--red); color: var(--red); background: rgba(255,82,82,.08); }
.btn-icon.visit:hover { border-color: var(--green); color: var(--green); }

.item-memo {
  font-size: 14px; line-height: 1.7; color: var(--text);
  white-space: pre-wrap; word-break: break-word;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--bd);
}
.item-memo.editing { display: none; }

.edit-area { display: none; }
.edit-area.active { display: block; }
.edit-textarea {
  width: 100%; background: var(--sf3); border: 1px solid var(--accent);
  color: var(--text); border-radius: 8px; padding: 10px 12px;
  font-family: var(--sans); font-size: 14px; line-height: 1.7;
  resize: none; outline: none; min-height: 80px;
}
.edit-footer { display: flex; gap: 6px; justify-content: flex-end; margin-top: 8px; }
.btn-edit-cancel {
  background: transparent; border: 1px solid var(--bd2); color: var(--text2);
  border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer;
}
.btn-edit-cancel:hover { color: var(--text); border-color: var(--text2); }
.btn-edit-save {
  background: var(--accent); border: none; color: #000;
  border-radius: 6px; padding: 6px 16px; font-size: 12px; font-weight: 700;
  cursor: pointer;
}

/* 페이지네이션 */
.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  padding: 20px 16px 32px;
  flex-wrap: wrap;
}
.page-btn {
  background: var(--sf2);
  border: 1px solid var(--bd);
  color: var(--text2);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  min-width: 36px;
}
.page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.page-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}
.page-btn:disabled {
  opacity: .3;
  cursor: not-allowed;
}
.page-info {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  margin: 0 8px;
}

/* EMPTY */
.empty {
  text-align: center; padding: 80px 20px; color: var(--text3);
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.empty-icon { font-size: 48px; opacity: .4; }
.empty p { font-size: 14px; }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--sf2); border: 1px solid var(--bd2); color: var(--text);
  border-radius: 10px; padding: 10px 18px; font-size: 13px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5); z-index: 9999;
  opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* LOGIN MODAL */
.login-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,.85);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.login-overlay.open { opacity: 1; pointer-events: all; }
.login-modal {
  background: var(--sf);
  border: 1px solid var(--bd2);
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  max-width: 320px;
  width: 90%;
  transform: scale(.9);
  transition: transform .2s;
}
.login-overlay.open .login-modal { transform: scale(1); }
.login-modal .icon { font-size: 48px; margin-bottom: 16px; }
.login-modal h3 { font-family: var(--mono); font-size: 16px; margin-bottom: 8px; }
.login-modal p { font-size: 12px; color: var(--text3); margin-bottom: 24px; }
.login-modal .btn-login {
  background: var(--accent); color: #000; border: none;
  border-radius: 10px; padding: 12px 24px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  width: 100%;
}
.login-modal .btn-login:hover { background: #33ddff; }
.login-modal .btn-cancel {
  background: transparent; border: 1px solid var(--bd2);
  color: var(--text2); border-radius: 10px;
  padding: 10px 20px; font-size: 13px;
  cursor: pointer; margin-top: 12px;
  width: 100%;
}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>북마크 저장소</div>
  <div style="display: flex; align-items: center; gap: 8px;">
    <div class="sync-badge">
      <div class="sdot load" id="sdot"></div>
      <span id="stxt">연결 중...</span>
    </div>
    <div class="user-badge" id="userBadge" onclick="showLoginModal()">
      <span>👤</span>
      <span class="user-email" id="userEmail">로그인</span>
    </div>
  </div>
</header>

<!-- 입력 영역 -->
<div class="input-wrap">
  <div class="input-box">
    <div class="row-group">
      <input class="url-input" id="inUrl" type="url" placeholder="🔗 URL (예: https://..." autocomplete="off">
      <select class="category-select" id="categorySelect">
        <option value="">📁 카테고리 선택</option>
      </select>
    </div>
    <div class="new-cat-row" id="newCatRow" style="display: none;">
      <input class="new-cat-input" id="newCatName" type="text" placeholder="새 카테고리 이름" maxlength="20">
      <button class="btn-add-cat" onclick="addNewCategory()">➕ 추가</button>
      <button class="btn-add-cat" onclick="cancelNewCategory()">✖️ 취소</button>
    </div>
    <button class="btn-add-cat" id="showNewCatBtn" onclick="toggleNewCategory()" style="margin-bottom: 12px;">+ 새 카테고리</button>
    <textarea id="inMemo" placeholder="메모 (선택사항)..." rows="2" oninput="updateChar()"></textarea>
    <div class="input-footer">
      <span class="char-count" id="charCount">0 / 1000</span>
      <button class="btn-submit" id="btnSubmit" onclick="checkLoginAndSubmit()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        북마크 저장
      </button>
    </div>
  </div>
</div>

<!-- 필터 -->
<div class="filter-bar">
  <select class="filter-input" id="filterCategory" onchange="applyFiltersAndRender()">
    <option value="">📁 모든 카테고리</option>
  </select>
  <input class="filter-input" type="text" id="filterText" oninput="applyFiltersAndRender()" placeholder="URL / 메모 검색...">
  <div class="count-chip" id="countChip">총 <span>0</span>개</div>
</div>

<!-- 북마크 목록 -->
<div class="feed" id="bookmarkList"></div>

<!-- 페이지네이션 -->
<div class="pagination" id="pagination"></div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<!-- 로그인 모달 -->
<div class="login-overlay" id="loginModal" onclick="if(event.target===this) closeLoginModal()">
  <div class="login-modal">
    <div class="icon">🔐</div>
    <h3>로그인이 필요합니다</h3>
    <p>북마크를 저장하려면<br>Google 계정으로 로그인해주세요</p>
    <button class="btn-login" onclick="triggerLogin()">Google 계정으로 로그인</button>
    <button class="btn-cancel" onclick="closeLoginModal()">취소</button>
  </div>
</div>

<script>
const db = firebase.firestore();
const COL = 'bookmarks';

// 상태 변수
let bookmarks = [];
let currentUser = null;
let pendingAction = null;
let pendingData = null;
let categories = new Set();  // 카테고리 목록
let currentPage = 1;
const ITEMS_PER_PAGE = 10;
let currentFilteredList = [];

// DOM 요소
const urlInput = document.getElementById('inUrl');
const memoInput = document.getElementById('inMemo');
const categorySelect = document.getElementById('categorySelect');
const filterCategory = document.getElementById('filterCategory');
const filterText = document.getElementById('filterText');

// 날짜/시간 포맷
function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', month: '2-digit', day: '2-digit' });
}
function formatEmail(email) {
  if (!email) return '익명';
  return email.split('@')[0];
}
function escHtml(s) {
  return String(s || '').replace(/[<>&"]/g, c =>
    ({ '<':'&lt;', '>':'&gt;', '&':'&amp;', '"':'&quot;' })[c]);
}

// 글자 수 체크
function updateChar() {
  const len = memoInput.value.length;
  document.getElementById('charCount').textContent = len + ' / 1000';
  document.getElementById('btnSubmit').disabled = len > 1000;
}
updateChar();

// 동기화 상태
function setSS(state) {
  const dot = document.getElementById('sdot');
  const txt = document.getElementById('stxt');
  const map = { live:'● 실시간', load:'연결 중...', err:'오프라인' };
  dot.className = 'sdot ' + state;
  txt.textContent = map[state] || '—';
}

// Firestore 실시간 리스너
function initSync() {
  setSS('load');
  db.collection(COL)
    .orderBy('createdAt', 'desc')
    .onSnapshot(snap => {
      bookmarks = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      // 카테고리 업데이트
      updateCategoriesFromBookmarks();
      setSS('live');
      applyFiltersAndRender();
    }, err => {
      console.error(err);
      setSS('err');
      toast('⚠️ Firebase 연결 실패: ' + err.message);
    });
}

// 북마크에서 카테고리 추출
function updateCategoriesFromBookmarks() {
  const newCategories = new Set();
  bookmarks.forEach(b => {
    if (b.category && b.category.trim()) {
      newCategories.add(b.category.trim());
    }
  });
  categories = newCategories;
  updateCategoryDropdowns();
}

// 카테고리 드롭다운 업데이트
function updateCategoryDropdowns() {
  const sorted = Array.from(categories).sort();
  
  // 입력용 드롭다운
  categorySelect.innerHTML = '<option value="">📁 카테고리 선택</option>';
  sorted.forEach(cat => {
    categorySelect.innerHTML += `<option value="${escHtml(cat)}">${escHtml(cat)}</option>`;
  });
  
  // 필터용 드롭다운
  filterCategory.innerHTML = '<option value="">📁 모든 카테고리</option>';
  sorted.forEach(cat => {
    filterCategory.innerHTML += `<option value="${escHtml(cat)}">${escHtml(cat)}</option>`;
  });
}

// 새 카테고리 UI 토글
function toggleNewCategory() {
  const row = document.getElementById('newCatRow');
  const btn = document.getElementById('showNewCatBtn');
  if (row.style.display === 'none') {
    row.style.display = 'flex';
    btn.textContent = '✖️ 닫기';
    document.getElementById('newCatName').focus();
  } else {
    row.style.display = 'none';
    btn.textContent = '+ 새 카테고리';
    document.getElementById('newCatName').value = '';
  }
}
function cancelNewCategory() {
  document.getElementById('newCatRow').style.display = 'none';
  document.getElementById('showNewCatBtn').textContent = '+ 새 카테고리';
  document.getElementById('newCatName').value = '';
}
function addNewCategory() {
  const newCat = document.getElementById('newCatName').value.trim();
  if (!newCat) {
    toast('카테고리 이름을 입력해주세요');
    return;
  }
  if (newCat.length > 20) {
    toast('카테고리 이름은 20자 이내로 해주세요');
    return;
  }
  if (categories.has(newCat)) {
    toast('이미 존재하는 카테고리입니다');
    return;
  }
  categories.add(newCat);
  updateCategoryDropdowns();
  categorySelect.value = newCat;
  cancelNewCategory();
  toast(`✅ "${newCat}" 카테고리가 추가되었습니다`);
}

// 필터 적용
function applyFiltersAndRender() {
  const filterCat = filterCategory.value;
  const filterTxt = filterText.value.trim().toLowerCase();
  
  currentFilteredList = bookmarks.filter(b => {
    if (filterCat && b.category !== filterCat) return false;
    if (filterTxt) {
      const urlMatch = (b.url || '').toLowerCase().includes(filterTxt);
      const memoMatch = (b.memo || '').toLowerCase().includes(filterTxt);
      if (!urlMatch && !memoMatch) return false;
    }
    return true;
  });
  
  currentPage = 1;
  renderBookmarks();
}

// 렌더링 (페이지네이션 포함)
function renderBookmarks() {
  const total = currentFilteredList.length;
  const totalPages = Math.ceil(total / ITEMS_PER_PAGE);
  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const end = start + ITEMS_PER_PAGE;
  const pageItems = currentFilteredList.slice(start, end);
  
  const el = document.getElementById('bookmarkList');
  const chip = document.getElementById('countChip');
  chip.innerHTML = `총 <span>${total}</span>개`;
  
  if (total === 0) {
    el.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔖</div>
        <p>저장된 북마크가 없습니다</p>
        <p class="hint">첫 번째 북마크를 저장해보세요</p>
      </div>`;
    renderPagination(1, 0);
    return;
  }
  
  el.innerHTML = pageItems.map(b => `
    <div class="bookmark-item" id="item-${b.id}">
      <div class="item-header">
        <span class="item-category">📁 ${escHtml(b.category || '미분류')}</span>
        <a class="item-url" href="${escHtml(b.url)}" target="_blank" rel="noopener noreferrer">🔗 ${truncateUrl(b.url)}</a>
        <span class="item-author">👤 ${formatEmail(b.userEmail)}</span>
        <span class="item-time">${fmtTime(b.createdAt)}${b.updatedAt ? ' · 수정됨' : ''}</span>
        <div class="item-actions">
          <button class="btn-icon visit" title="방문" onclick="window.open('${escHtml(b.url)}', '_blank')">🔗</button>
          <button class="btn-icon edit" title="수정" onclick="checkLoginAndEdit('${b.id}')">✏️</button>
          <button class="btn-icon del" title="삭제" onclick="checkLoginAndDelete('${b.id}')">🗑️</button>
        </div>
      </div>
      <div class="item-memo" id="memo-${b.id}">${b.memo ? escHtml(b.memo) : '<span style="color:var(--text3);">(메모 없음)</span>'}</div>
      <div class="edit-area" id="edit-area-${b.id}">
        <textarea class="edit-textarea" id="edit-text-${b.id}" rows="3">${escHtml(b.memo || '')}</textarea>
        <div class="edit-footer">
          <button class="btn-edit-cancel" onclick="cancelEdit('${b.id}')">취소</button>
          <button class="btn-edit-save" onclick="saveEdit('${b.id}')">저장</button>
        </div>
      </div>
    </div>
  `).join('');
  
  renderPagination(currentPage, totalPages);
}

function truncateUrl(url) {
  if (!url) return '';
  try {
    const u = new URL(url);
    return u.hostname + (u.pathname === '/' ? '' : u.pathname.slice(0, 20) + (u.pathname.length > 20 ? '…' : ''));
  } catch(e) {
    return url.slice(0, 40) + (url.length > 40 ? '…' : '');
  }
}

function renderPagination(current, totalPages) {
  const container = document.getElementById('pagination');
  if (totalPages <= 1) {
    container.innerHTML = '';
    return;
  }
  
  let html = '';
  html += `<button class="page-btn" onclick="goToPage(1)" ${current === 1 ? 'disabled' : ''}>«</button>`;
  html += `<button class="page-btn" onclick="goToPage(${current-1})" ${current === 1 ? 'disabled' : ''}>‹</button>`;
  
  // 페이지 번호 (최대 7개)
  let startPage = Math.max(1, current - 3);
  let endPage = Math.min(totalPages, current + 3);
  if (endPage - startPage < 6) {
    if (startPage === 1) endPage = Math.min(totalPages, startPage + 6);
    if (endPage === totalPages) startPage = Math.max(1, endPage - 6);
  }
  
  for (let i = startPage; i <= endPage; i++) {
    html += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
  }
  
  html += `<button class="page-btn" onclick="goToPage(${current+1})" ${current === totalPages ? 'disabled' : ''}>›</button>`;
  html += `<button class="page-btn" onclick="goToPage(${totalPages})" ${current === totalPages ? 'disabled' : ''}>»</button>`;
  html += `<span class="page-info">${current} / ${totalPages}</span>`;
  
  container.innerHTML = html;
}

function goToPage(page) {
  const total = Math.ceil(currentFilteredList.length / ITEMS_PER_PAGE);
  if (page < 1 || page > total) return;
  currentPage = page;
  renderBookmarks();
}

// 로그인 모달
function showLoginModal() {
  document.getElementById('loginModal').classList.add('open');
}
function closeLoginModal() {
  document.getElementById('loginModal').classList.remove('open');
  pendingAction = null;
  pendingData = null;
}

async function triggerLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await firebase.auth().signInWithPopup(provider);
    closeLoginModal();
    if (pendingAction) {
      if (pendingAction === 'submit') await submitBookmark();
      else if (pendingAction === 'edit' && pendingData) await saveEdit(pendingData.id);
      else if (pendingAction === 'delete' && pendingData) await deleteBookmark(pendingData.id);
      pendingAction = null;
      pendingData = null;
    }
  } catch(e) {
    toast('❌ 로그인 실패: ' + e.message);
  }
}

function updateUIForUser(user) {
  currentUser = user;
  const userEmailSpan = document.getElementById('userEmail');
  if (user) {
    userEmailSpan.textContent = formatEmail(user.email);
    toast(`✅ ${user.email} 님 환영합니다!`);
  } else {
    userEmailSpan.textContent = '로그인';
  }
}

// 로그인 체크 함수들
function checkLoginAndSubmit() {
  if (!currentUser) {
    pendingAction = 'submit';
    showLoginModal();
    return;
  }
  submitBookmark();
}
function checkLoginAndEdit(id) {
  if (!currentUser) {
    pendingAction = 'edit';
    pendingData = { id };
    showLoginModal();
    return;
  }
  startEdit(id);
}
function checkLoginAndDelete(id) {
  if (!currentUser) {
    pendingAction = 'delete';
    pendingData = { id };
    showLoginModal();
    return;
  }
  deleteBookmark(id);
}

// 북마크 저장
async function submitBookmark() {
  if (!currentUser) return;
  
  const url = urlInput.value.trim();
  const memo = memoInput.value.trim();
  const category = categorySelect.value;
  
  if (!url) {
    toast('URL을 입력해주세요');
    return;
  }
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    toast('URL은 http:// 또는 https:// 로 시작해야 합니다');
    return;
  }
  
  document.getElementById('btnSubmit').disabled = true;
  try {
    await db.collection(COL).add({
      url,
      memo: memo || '',
      category: category || '미분류',
      userId: currentUser.uid,
      userEmail: currentUser.email,
      createdAt: new Date().toISOString(),
    });
    urlInput.value = '';
    memoInput.value = '';
    categorySelect.value = '';
    updateChar();
    toast('✅ 북마크 저장 완료!');
  } catch(e) {
    toast('❌ 저장 실패: ' + e.message);
  } finally {
    document.getElementById('btnSubmit').disabled = false;
  }
}

// 북마크 삭제
async function deleteBookmark(id) {
  if (!currentUser) return;
  const bookmark = bookmarks.find(b => b.id === id);
  if (!bookmark) return;
  if (bookmark.userId !== currentUser.uid) {
    toast('⚠️ 본인이 저장한 북마크만 삭제할 수 있습니다!');
    return;
  }
  if (!confirm('이 북마크를 삭제하시겠습니까?')) return;
  try {
    await db.collection(COL).doc(id).delete();
    toast('🗑️ 삭제되었습니다');
  } catch(e) {
    toast('❌ 삭제 실패');
  }
}

// 편집 모드
function startEdit(id) {
  if (!currentUser) return;
  const bookmark = bookmarks.find(b => b.id === id);
  if (!bookmark || bookmark.userId !== currentUser.uid) {
    toast('⚠️ 본인이 저장한 북마크만 수정할 수 있습니다!');
    return;
  }
  const memoDiv = document.getElementById(`memo-${id}`);
  const editArea = document.getElementById(`edit-area-${id}`);
  if (memoDiv) memoDiv.classList.add('editing');
  if (editArea) editArea.classList.add('active');
}

function cancelEdit(id) {
  const memoDiv = document.getElementById(`memo-${id}`);
  const editArea = document.getElementById(`edit-area-${id}`);
  if (memoDiv) memoDiv.classList.remove('editing');
  if (editArea) editArea.classList.remove('active');
}

async function saveEdit(id) {
  if (!currentUser) return;
  const bookmark = bookmarks.find(b => b.id === id);
  if (!bookmark || bookmark.userId !== currentUser.uid) {
    toast('⚠️ 본인이 저장한 북마크만 수정할 수 있습니다!');
    return;
  }
  const newMemo = document.getElementById(`edit-text-${id}`).value.trim();
  try {
    await db.collection(COL).doc(id).update({
      memo: newMemo || '',
      updatedAt: new Date().toISOString(),
    });
    toast('✅ 메모가 수정되었습니다');
    cancelEdit(id);
  } catch(e) {
    toast('❌ 수정 실패');
  }
}

// 토스트
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// 엔터키로 저장 (URL 입력창에서)
urlInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    checkLoginAndSubmit();
  }
});

// 인증 상태 감시
firebase.auth().onAuthStateChanged(user => {
  updateUIForUser(user);
});

// 부팅
initSync();
</script>
</body>
</html>
