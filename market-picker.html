<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<title>Market Picker</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, where, Timestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyCIQKMbhnQY2sIdDthFrm-dznnVMs5pb30",
  authDomain: "my-bp-tracker-3d595.firebaseapp.com",
  projectId: "my-bp-tracker-3d595",
  storageBucket: "my-bp-tracker-3d595.appspot.com",
  messagingSenderId: "1016360206319",
  appId: "1:1016360206319:web:5f5df2e2c45b30694a401a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentUser = null;
let allRecords = [];
let editingId = null;

// ─── 체크리스트 항목 정의 ───
const CHECKLIST_ITEMS = [
  { id:'c01', cat:'수익성',   label:'영업이익 증가',      criteria:'최근 3년 연속 증가',        scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c02', cat:'수익성',   label:'순이익 증가',         criteria:'최근 3년 연속 증가',        scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c03', cat:'수익성',   label:'매출 증가',           criteria:'최근 3년 연속 증가',        scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c04', cat:'수익성',   label:'매출총이익률 추세',   criteria:'규모 확장과 함께 상승 추세', scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c05', cat:'수익성',   label:'영업이익률',          criteria:'10% 이상',                  scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c06', cat:'수익성',   label:'순이익률',            criteria:'8% 이상',                   scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c07', cat:'수익성',   label:'1회성 이익 여부',     criteria:'일회성 이익 없음',           scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c08', cat:'밸류에이션', label:'업종 평균 PER 비교', criteria:'업종 평균 이하',            scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c09', cat:'밸류에이션', label:'Forward PER',       criteria:'현재 PER보다 낮음',         scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c10', cat:'밸류에이션', label:'EPS 증가',           criteria:'최근 3년 증가',             scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c11', cat:'밸류에이션', label:'EPS 정확도',         criteria:'예상치와 큰 괴리 없음',     scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c12', cat:'재무건전성', label:'부채비율',           criteria:'100% 이하',                 scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c13', cat:'재무건전성', label:'당좌비율',           criteria:'1.0 이상',                  scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c14', cat:'재무건전성', label:'유동비율',           criteria:'1.5 이상',                  scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c15', cat:'재무건전성', label:'자본 증가',          criteria:'최근 3년 증가',             scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c16', cat:'재무건전성', label:'현금흐름',           criteria:'영업CF 플러스',             scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c17', cat:'재무건전성', label:'운전자본 안정성',    criteria:'매출 대비 외상매출·매입 안정', scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c18', cat:'재무건전성', label:'주식희석률',         criteria:'과도한 주식 발행 없음',     scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c19', cat:'경쟁력',   label:'브랜드 구축',         criteria:'강한 브랜드 인지도',        scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c20', cat:'경쟁력',   label:'시장 선도',           criteria:'업종 상위권',               scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c21', cat:'경쟁력',   label:'시장 점유율',         criteria:'상위 3위 이내',             scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c22', cat:'경쟁력',   label:'고객 충성도',         criteria:'높은 리텐션·재구매율',      scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c23', cat:'경쟁력',   label:'배당 성향',           criteria:'0~1% 이하 (재투자 선호)',   scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c24', cat:'신뢰도',   label:'내부자 매도',         criteria:'과도한 매도 없음',          scoreMap:{부합:4, 확인필요:2, 미달:0} },
  { id:'c25', cat:'신뢰도',   label:'사업보고서 리스크',   criteria:'중대 리스크 없음',          scoreMap:{부합:4, 확인필요:2, 미달:0} },
];

const MAX_SCORE = CHECKLIST_ITEMS.length * 4; // 100점

function calcScore(checks) {
  let total = 0;
  CHECKLIST_ITEMS.forEach(item => {
    const v = checks[item.id];
    if (v && item.scoreMap[v] !== undefined) total += item.scoreMap[v];
  });
  return Math.round(total / MAX_SCORE * 100);
}

function getJudge(score) {
  if (score >= 85) return { label:'매수검토', cls:'badge-buy' };
  if (score >= 71) return { label:'관망',     cls:'badge-watch' };
  return                  { label:'매수불가', cls:'badge-no' };
}

// ─── Auth ───
window.loginGoogle = async () => {
  try { await signInWithPopup(auth, provider); } catch(e) { showToast('로그인 실패: '+e.message,'err'); }
};
window.logoutUser = async () => {
  await signOut(auth);
  showToast('로그아웃되었습니다.');
};

onAuthStateChanged(auth, user => {
  currentUser = user;
  document.getElementById('authSection').innerHTML = user
    ? `<span class="uid-label">${user.displayName || user.email}</span>
       <button class="btn-ghost sm" onclick="logoutUser()">로그아웃</button>`
    : `<button class="btn-gold sm" onclick="loginGoogle()">Google 로그인</button>`;
  if (user) loadRecords();
});

// ─── Firestore CRUD ───
async function loadRecords() {
  try {
    const q = query(collection(db,'marketPicker'), where('uid','==',currentUser.uid), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    allRecords = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    renderList(allRecords);
    showToast(`${allRecords.length}건 로드 완료`);
  } catch(e) { showToast('로드 오류: '+e.message,'err'); }
}

window.saveRecord = async () => {
  if (!currentUser) { showToast('로그인이 필요합니다.','err'); return; }
  const name   = document.getElementById('inp_name').value.trim();
  const ticker = document.getElementById('inp_ticker').value.trim().toUpperCase();
  const stype  = document.getElementById('inp_type').value;
  const memo   = document.getElementById('inp_memo').value.trim();
  const date   = document.getElementById('inp_date').value;
  if (!name||!ticker||!date) { showToast('회사명·티커·날짜는 필수입니다.','err'); return; }

  const checks = {};
  const actuals = {};
  CHECKLIST_ITEMS.forEach(item => {
    checks[item.id]  = document.getElementById('chk_'+item.id)?.value || '미달';
    actuals[item.id] = document.getElementById('act_'+item.id)?.value.trim() || '';
  });

  const score = calcScore(checks);
  const judge = getJudge(score).label;
  const data  = { uid:currentUser.uid, name, ticker, stype, memo, date, checks, actuals, score, judge, createdAt:Timestamp.now() };

  try {
    if (editingId) {
      await updateDoc(doc(db,'marketPicker',editingId), data);
      showToast('수정 완료 ✓');
    } else {
      await addDoc(collection(db,'marketPicker'), data);
      showToast('저장 완료 ✓');
    }
    editingId = null;
    document.getElementById('editLabel').textContent = '신규 종목 분석';
    await loadRecords();
    showPage('list');
  } catch(e) { showToast('저장 오류: '+e.message,'err'); }
};

window.deleteRecord = async (id) => {
  if (!confirm('삭제하시겠습니까?')) return;
  await deleteDoc(doc(db,'marketPicker',id));
  showToast('삭제 완료');
  await loadRecords();
};

window.editRecord = (id) => {
  const r = allRecords.find(x=>x.id===id);
  if (!r) return;
  editingId = id;
  document.getElementById('editLabel').textContent = `수정 중: ${r.name} (${r.ticker})`;
  document.getElementById('inp_name').value   = r.name;
  document.getElementById('inp_ticker').value = r.ticker;
  document.getElementById('inp_type').value   = r.stype||'성장주';
  document.getElementById('inp_memo').value   = r.memo||'';
  document.getElementById('inp_date').value   = r.date;
  CHECKLIST_ITEMS.forEach(item => {
    const el = document.getElementById('chk_'+item.id);
    const al = document.getElementById('act_'+item.id);
    if (el) el.value = r.checks?.[item.id]||'미달';
    if (al) al.value = r.actuals?.[item.id]||'';
  });
  updateLiveScore();
  showPage('form');
  window.scrollTo(0,0);
};

window.viewDetail = (id) => {
  const r = allRecords.find(x=>x.id===id);
  if (!r) return;
  const judge = getJudge(r.score);
  const catGroups = {};
  CHECKLIST_ITEMS.forEach(item => {
    if (!catGroups[item.cat]) catGroups[item.cat] = [];
    catGroups[item.cat].push(item);
  });
  let rows = '';
  Object.entries(catGroups).forEach(([cat, items]) => {
    rows += `<tr class="cat-row"><td colspan="4">${cat}</td></tr>`;
    items.forEach(item => {
      const v = r.checks?.[item.id]||'미달';
      const act = r.actuals?.[item.id]||'-';
      const vcls = v==='부합'?'v-ok':v==='확인필요'?'v-warn':'v-bad';
      rows += `<tr>
        <td class="item-label">${item.label}</td>
        <td class="criteria-col">${item.criteria}</td>
        <td class="actual-col">${act}</td>
        <td><span class="vtag ${vcls}">${v}</span></td>
      </tr>`;
    });
  });
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-hero">
      <div class="detail-company">${r.name}<span class="detail-ticker">${r.ticker}</span></div>
      <div class="detail-date">${r.date} · ${r.stype||''}</div>
      <div class="detail-score-row">
        <div class="big-score">${r.score}<span class="score-unit">/100</span></div>
        <span class="badge ${judge.cls} big">${judge.label}</span>
      </div>
      ${r.memo?`<div class="detail-memo">${r.memo}</div>`:''}
    </div>
    <table class="detail-table"><thead>
      <tr><th>항목</th><th>기준치</th><th>실제값</th><th>판정</th></tr>
    </thead><tbody>${rows}</tbody></table>
    <div class="detail-actions">
      <button class="btn-ghost" onclick="editRecord('${r.id}')">✏️ 수정</button>
      <button class="btn-danger" onclick="deleteRecord('${r.id}');showPage('list')">🗑 삭제</button>
    </div>`;
  showPage('detail');
};

// ─── 검색 ───
window.doSearch = () => {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const ft = document.getElementById('filterJudge').value;
  let res = allRecords;
  if (q) res = res.filter(r =>
    r.name?.toLowerCase().includes(q) ||
    r.ticker?.toLowerCase().includes(q) ||
    r.date?.includes(q) ||
    r.memo?.toLowerCase().includes(q)
  );
  if (ft) res = res.filter(r => r.judge===ft);
  renderList(res);
};

function renderList(records) {
  const el = document.getElementById('recordList');
  if (!records.length) { el.innerHTML='<div class="empty-state">📭 분석 기록이 없습니다</div>'; return; }
  el.innerHTML = records.map(r => {
    const judge = getJudge(r.score);
    const conf = r.checks ? Object.values(r.checks).filter(v=>v==='부합').length : 0;
    const warn = r.checks ? Object.values(r.checks).filter(v=>v==='확인필요').length : 0;
    const bad  = r.checks ? Object.values(r.checks).filter(v=>v==='미달').length : 0;
    return `
    <div class="record-card" onclick="viewDetail('${r.id}')">
      <div class="card-top">
        <div class="card-company">
          <span class="card-name">${r.name}</span>
          <span class="card-ticker">${r.ticker}</span>
          <span class="card-type">${r.stype||''}</span>
        </div>
        <div class="card-right">
          <div class="card-score">${r.score}<span class="s-unit">/100</span></div>
          <span class="badge ${judge.cls}">${judge.label}</span>
        </div>
      </div>
      <div class="card-stats">
        <span class="stat ok">●부합 ${conf}</span>
        <span class="stat warn">●확인 ${warn}</span>
        <span class="stat bad">●미달 ${bad}</span>
        <span class="stat date">${r.date}</span>
      </div>
      ${r.memo?`<div class="card-memo">${r.memo}</div>`:''}
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="btn-ghost xs" onclick="editRecord('${r.id}')">수정</button>
        <button class="btn-danger xs" onclick="deleteRecord('${r.id}')">삭제</button>
      </div>
    </div>`;
  }).join('');
}

// ─── 실시간 점수 ───
window.updateLiveScore = () => {
  const checks = {};
  CHECKLIST_ITEMS.forEach(item => {
    checks[item.id] = document.getElementById('chk_'+item.id)?.value||'미달';
  });
  const score = calcScore(checks);
  const judge = getJudge(score);
  document.getElementById('liveScore').textContent = score;
  const lb = document.getElementById('liveJudge');
  lb.textContent = judge.label;
  lb.className = 'badge '+judge.cls+' big';
};

// ─── 페이지 전환 ───
window.showPage = (page) => {
  ['pageList','pageForm','pageDetail'].forEach(p => {
    document.getElementById(p).classList.toggle('hidden', p !== 'page'+cap(page));
  });
  if (page==='form' && !editingId) {
    document.getElementById('inp_date').value = new Date().toISOString().slice(0,10);
    document.getElementById('editLabel').textContent = '신규 종목 분석';
    document.getElementById('inp_name').value = '';
    document.getElementById('inp_ticker').value = '';
    document.getElementById('inp_memo').value = '';
    CHECKLIST_ITEMS.forEach(item => {
      const el = document.getElementById('chk_'+item.id);
      const al = document.getElementById('act_'+item.id);
      if (el) el.value = '미달';
      if (al) al.value = '';
    });
    updateLiveScore();
  }
};

function cap(s) { return s.charAt(0).toUpperCase()+s.slice(1); }
window.showToast = (msg, type='ok') => {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show '+(type==='err'?'toast-err':'');
  setTimeout(()=>t.classList.remove('show'),2800);
};
</script>

<style>
:root {
  --bg:       #07070f;
  --bg2:      #0d0d1a;
  --bg3:      #121224;
  --surface:  #161630;
  --surface2: #1c1c3a;
  --gold:     #c9a84c;
  --gold-lt:  #e8c96b;
  --gold-dk:  #8a6b20;
  --green:    #00d97e;
  --green-dk: #00854b;
  --amber:    #f5a623;
  --red:      #e74c3c;
  --text:     #e8e8f0;
  --text2:    #9090b0;
  --text3:    #55556a;
  --border:   #1e1e3a;
  --border2:  #2a2a4a;
  --radius:   8px;
  --mono:     'DM Mono', monospace;
  --sans:     'Noto Sans KR', sans-serif;
  --display:  'Bebas Neue', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}

/* ── 스크롤바 */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── 레이아웃 */
.app-wrap{max-width:860px;margin:0 auto;padding:0 12px 80px;}

/* ── 헤더 */
.app-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 0 12px;border-bottom:1px solid var(--border2);
  position:sticky;top:0;background:var(--bg);z-index:100;
}
.logo-block{display:flex;align-items:baseline;gap:10px;}
.logo-main{font-family:var(--display);font-size:26px;letter-spacing:2px;color:var(--gold);}
.logo-sub{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:1px;}
.uid-label{font-size:11px;color:var(--text2);margin-right:8px;}

/* ── 탭 네비 */
.tab-nav{display:flex;gap:4px;padding:12px 0 10px;border-bottom:1px solid var(--border);}
.tab-btn{
  padding:6px 18px;border-radius:20px;border:1px solid var(--border2);
  background:transparent;color:var(--text2);font-family:var(--sans);font-size:12px;
  cursor:pointer;transition:all .2s;
}
.tab-btn:hover{border-color:var(--gold-dk);color:var(--gold);}
.tab-btn.active{background:var(--gold);border-color:var(--gold);color:#0a0a0f;font-weight:700;}

/* ── 버튼 */
.btn-gold{
  background:var(--gold);color:#0a0a0f;font-weight:700;font-family:var(--sans);
  border:none;border-radius:var(--radius);cursor:pointer;transition:all .15s;
  padding:8px 18px;font-size:13px;
}
.btn-gold:hover{background:var(--gold-lt);}
.btn-gold.sm{padding:5px 12px;font-size:11px;}
.btn-ghost{
  background:transparent;color:var(--text2);border:1px solid var(--border2);
  border-radius:var(--radius);cursor:pointer;font-family:var(--sans);
  padding:7px 16px;font-size:12px;transition:all .15s;
}
.btn-ghost:hover{border-color:var(--gold-dk);color:var(--gold);}
.btn-ghost.sm{padding:4px 10px;font-size:11px;}
.btn-ghost.xs{padding:3px 8px;font-size:10px;}
.btn-danger{
  background:transparent;color:var(--red);border:1px solid rgba(231,76,60,.3);
  border-radius:var(--radius);cursor:pointer;font-family:var(--sans);
  padding:7px 16px;font-size:12px;transition:all .15s;
}
.btn-danger:hover{background:rgba(231,76,60,.1);}
.btn-danger.xs{padding:3px 8px;font-size:10px;}
.hidden{display:none!important;}

/* ── 검색 바 */
.search-bar{display:flex;gap:8px;padding:14px 0 10px;flex-wrap:wrap;align-items:center;}
.search-input{
  flex:1;min-width:160px;background:var(--surface);border:1px solid var(--border2);
  color:var(--text);border-radius:var(--radius);padding:8px 14px;font-family:var(--sans);
  font-size:13px;outline:none;
}
.search-input:focus{border-color:var(--gold-dk);}
.search-input::placeholder{color:var(--text3);}
select.filter-sel{
  background:var(--surface);border:1px solid var(--border2);color:var(--text2);
  border-radius:var(--radius);padding:8px 10px;font-family:var(--sans);font-size:12px;outline:none;
}
select.filter-sel:focus{border-color:var(--gold-dk);}

/* ── 카드 */
.record-card{
  background:var(--surface);border:1px solid var(--border2);border-radius:10px;
  padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .18s;
}
.record-card:hover{border-color:var(--gold-dk);background:var(--surface2);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.card-company{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.card-name{font-weight:700;font-size:15px;color:var(--text);}
.card-ticker{font-family:var(--mono);font-size:12px;color:var(--gold);background:rgba(201,168,76,.1);padding:2px 7px;border-radius:4px;}
.card-type{font-size:10px;color:var(--text3);}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.card-score{font-family:var(--display);font-size:30px;color:var(--gold);line-height:1;}
.s-unit{font-family:var(--sans);font-size:11px;color:var(--text3);}
.card-stats{display:flex;gap:12px;margin-top:8px;font-family:var(--mono);font-size:11px;}
.stat.ok{color:var(--green);}.stat.warn{color:var(--amber);}.stat.bad{color:var(--red);}
.stat.date{color:var(--text3);margin-left:auto;}
.card-memo{margin-top:6px;font-size:11px;color:var(--text3);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-actions{display:flex;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;}

/* ── 배지 */
.badge{
  display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;
  letter-spacing:.5px;font-family:var(--mono);
}
.badge.big{padding:5px 16px;font-size:14px;}
.badge-buy{background:rgba(0,217,126,.12);color:var(--green);border:1px solid rgba(0,217,126,.3);}
.badge-watch{background:rgba(245,166,35,.12);color:var(--amber);border:1px solid rgba(245,166,35,.3);}
.badge-no{background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.3);}

/* ── 폼 */
.form-section{margin-top:20px;}
.form-title-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.form-title{font-family:var(--display);font-size:20px;letter-spacing:1px;color:var(--gold);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
@media(max-width:520px){.form-grid{grid-template-columns:1fr;}}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:11px;color:var(--text2);font-weight:500;letter-spacing:.5px;}
.form-input,.form-select{
  background:var(--surface);border:1px solid var(--border2);color:var(--text);
  border-radius:var(--radius);padding:9px 12px;font-family:var(--sans);font-size:13px;outline:none;
  transition:border .15s;
}
.form-input:focus,.form-select:focus{border-color:var(--gold-dk);}
.form-input::placeholder{color:var(--text3);}
textarea.form-input{resize:vertical;min-height:60px;}

/* ── 라이브 점수판 */
.live-scoreboard{
  background:var(--bg3);border:1px solid var(--border2);border-radius:10px;
  padding:16px;display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;position:sticky;top:62px;z-index:90;
}
.live-score-label{font-size:11px;color:var(--text3);}
.live-score-num{font-family:var(--display);font-size:48px;color:var(--gold);line-height:1;}

/* ── 카테고리 그룹 */
.cat-block{margin-bottom:20px;}
.cat-label{
  font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--text3);
  text-transform:uppercase;padding:6px 0;border-bottom:1px solid var(--border);
  margin-bottom:10px;
}
.check-item{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:12px;margin-bottom:8px;transition:border .15s;
}
.check-item:focus-within{border-color:var(--border2);}
.check-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
.check-label{font-weight:700;font-size:13px;color:var(--text);}
.check-criteria{font-size:11px;color:var(--text3);font-style:italic;flex:1;}
.verdict-sel{
  background:var(--bg2);border:1px solid var(--border2);color:var(--text2);
  border-radius:6px;padding:5px 10px;font-family:var(--mono);font-size:11px;outline:none;
  cursor:pointer;min-width:80px;
}
.verdict-sel:focus{border-color:var(--gold-dk);}
.verdict-sel option[value="부합"]{color:var(--green);}
.verdict-sel option[value="확인필요"]{color:var(--amber);}
.verdict-sel option[value="미달"]{color:var(--red);}
textarea.actual-input{
  width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);
  border-radius:6px;padding:8px 10px;font-family:var(--sans);font-size:12px;
  outline:none;resize:vertical;min-height:48px;line-height:1.5;
  transition:border .15s;
}
textarea.actual-input:focus{border-color:var(--border2);}
textarea.actual-input::placeholder{color:var(--text3);}
.form-actions{display:flex;gap:10px;padding-top:10px;}

/* ── 상세 */
.detail-hero{
  background:var(--bg3);border:1px solid var(--border2);border-radius:10px;
  padding:20px;margin:16px 0;
}
.detail-company{font-size:20px;font-weight:700;display:flex;align-items:baseline;gap:10px;margin-bottom:4px;}
.detail-ticker{font-family:var(--mono);font-size:14px;color:var(--gold);background:rgba(201,168,76,.1);padding:2px 8px;border-radius:4px;}
.detail-date{font-size:11px;color:var(--text3);margin-bottom:12px;}
.detail-score-row{display:flex;align-items:center;gap:16px;margin-bottom:10px;}
.big-score{font-family:var(--display);font-size:60px;color:var(--gold);line-height:1;}
.score-unit{font-family:var(--sans);font-size:14px;color:var(--text3);}
.detail-memo{font-size:12px;color:var(--text3);font-style:italic;margin-top:8px;}
.detail-table{width:100%;border-collapse:collapse;margin-bottom:16px;}
.detail-table th{
  text-align:left;padding:8px 10px;font-size:10px;letter-spacing:1px;
  color:var(--text3);border-bottom:1px solid var(--border2);font-weight:500;
}
.detail-table td{
  padding:9px 10px;font-size:12px;color:var(--text2);
  border-bottom:1px solid var(--border);vertical-align:top;
}
.detail-table tr.cat-row td{
  background:var(--bg3);color:var(--text3);font-size:10px;letter-spacing:1.5px;
  font-family:var(--mono);text-transform:uppercase;padding:5px 10px;
}
.detail-table .item-label{font-weight:600;color:var(--text);width:120px;}
.detail-table .criteria-col{color:var(--text3);font-style:italic;width:160px;}
.detail-table .actual-col{max-width:280px;word-break:break-all;}
.vtag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;font-family:var(--mono);}
.v-ok{background:rgba(0,217,126,.1);color:var(--green);}
.v-warn{background:rgba(245,166,35,.1);color:var(--amber);}
.v-bad{background:rgba(231,76,60,.1);color:var(--red);}
.detail-actions{display:flex;gap:10px;padding-top:6px;}

/* ── 토스트 */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface2);border:1px solid var(--border2);color:var(--text);
  padding:10px 22px;border-radius:24px;font-size:13px;z-index:9999;
  opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.toast-err{border-color:rgba(231,76,60,.5);color:var(--red);}

/* ── 구분선 */
.section-divider{height:1px;background:var(--border);margin:4px 0 16px;}
</style>
</head>
<body>
<div class="app-wrap">

  <!-- 헤더 -->
  <header class="app-header">
    <div class="logo-block">
      <span class="logo-main">MARKET PICKER</span>
      <span class="logo-sub">GROWTH STOCK CHECKLIST</span>
    </div>
    <div id="authSection"></div>
  </header>

  <!-- 탭 네비 -->
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="showPage('list');this.closest('.tab-nav').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">📋 분석 목록</button>
    <button class="tab-btn" onclick="editingId=null;showPage('form');this.closest('.tab-nav').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">✏️ 신규 분석</button>
  </nav>

  <!-- ══ 목록 페이지 ══ -->
  <div id="pageList">
    <div class="search-bar">
      <input class="search-input" id="searchInput" placeholder="종목명 / 티커 / 날짜 / 메모 검색..." oninput="doSearch()">
      <select class="filter-sel" id="filterJudge" onchange="doSearch()">
        <option value="">전체</option>
        <option value="매수검토">매수검토</option>
        <option value="관망">관망</option>
        <option value="매수불가">매수불가</option>
      </select>
      <button class="btn-gold" onclick="editingId=null;showPage('form');document.querySelectorAll('.tab-btn').forEach((b,i)=>{b.classList.toggle('active',i===1)})">+ 신규</button>
    </div>
    <div id="recordList"><div class="empty-state">📭 로그인 후 분석 기록을 불러옵니다</div></div>
  </div>

  <!-- ══ 입력 폼 페이지 ══ -->
  <div id="pageForm" class="hidden">
    <div class="form-section">
      <div class="form-title-bar">
        <span class="form-title" id="editLabel">신규 종목 분석</span>
        <button class="btn-ghost sm" onclick="showPage('list')">← 목록</button>
      </div>

      <!-- 기본 정보 -->
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">회사명 *</label>
          <input class="form-input" id="inp_name" placeholder="예) Duolingo">
        </div>
        <div class="form-group">
          <label class="form-label">티커 *</label>
          <input class="form-input" id="inp_ticker" placeholder="예) DUOL" style="font-family:var(--mono);">
        </div>
        <div class="form-group">
          <label class="form-label">유형</label>
          <select class="form-select" id="inp_type">
            <option value="성장주">성장주</option>
            <option value="가치주">가치주</option>
            <option value="배당주">배당주</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">분석 날짜 *</label>
          <input class="form-input" id="inp_date" type="date">
        </div>
        <div class="form-group full">
          <label class="form-label">한줄 메모</label>
          <textarea class="form-input" id="inp_memo" placeholder="핵심 투자 논리 또는 주의사항" rows="2"></textarea>
        </div>
      </div>

      <div class="section-divider"></div>

      <!-- 라이브 점수판 -->
      <div class="live-scoreboard">
        <div>
          <div class="live-score-label">현재 점수</div>
          <div class="live-score-num" id="liveScore">0</div>
          <div class="live-score-label">/100점</div>
        </div>
        <div style="text-align:right">
          <div class="live-score-label" style="margin-bottom:6px">판정 기준</div>
          <div style="font-size:11px;color:var(--green);margin-bottom:3px;">85점↑ 매수검토</div>
          <div style="font-size:11px;color:var(--amber);margin-bottom:3px;">71~84점 관망</div>
          <div style="font-size:11px;color:var(--red);">70점↓ 매수불가</div>
        </div>
        <div id="liveJudge" class="badge badge-no big">매수불가</div>
      </div>

      <!-- 체크리스트 -->
      <div id="checklistForm"></div>

      <div class="form-actions">
        <button class="btn-gold" onclick="saveRecord()" style="flex:1;padding:12px;">💾 저장</button>
        <button class="btn-ghost" onclick="showPage('list');editingId=null">취소</button>
      </div>
    </div>
  </div>

  <!-- ══ 상세 페이지 ══ -->
  <div id="pageDetail" class="hidden">
    <div style="display:flex;justify-content:flex-end;padding:12px 0 4px;">
      <button class="btn-ghost sm" onclick="showPage('list')">← 목록으로</button>
    </div>
    <div id="detailContent"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
// 체크리스트 폼 동적 생성 (모듈 밖에서도 접근 위해 window에 등록된 변수 사용)
// CHECKLIST_ITEMS는 첫 번째 모듈 블록에 정의됨 → 여기서 재정의
const ITEMS = [
  { id:'c01', cat:'수익성',    label:'영업이익 증가',       criteria:'최근 3년 연속 증가' },
  { id:'c02', cat:'수익성',    label:'순이익 증가',          criteria:'최근 3년 연속 증가' },
  { id:'c03', cat:'수익성',    label:'매출 증가',            criteria:'최근 3년 연속 증가' },
  { id:'c04', cat:'수익성',    label:'매출총이익률 추세',    criteria:'규모 확장과 함께 상승 추세' },
  { id:'c05', cat:'수익성',    label:'영업이익률',           criteria:'10% 이상' },
  { id:'c06', cat:'수익성',    label:'순이익률',             criteria:'8% 이상' },
  { id:'c07', cat:'수익성',    label:'1회성 이익 여부',      criteria:'일회성 이익 없음' },
  { id:'c08', cat:'밸류에이션',label:'업종 평균 PER 비교',   criteria:'업종 평균 이하' },
  { id:'c09', cat:'밸류에이션',label:'Forward PER',          criteria:'현재 PER보다 낮음' },
  { id:'c10', cat:'밸류에이션',label:'EPS 증가',             criteria:'최근 3년 증가' },
  { id:'c11', cat:'밸류에이션',label:'EPS 정확도',           criteria:'예상치와 큰 괴리 없음' },
  { id:'c12', cat:'재무건전성',label:'부채비율',             criteria:'100% 이하' },
  { id:'c13', cat:'재무건전성',label:'당좌비율',             criteria:'1.0 이상' },
  { id:'c14', cat:'재무건전성',label:'유동비율',             criteria:'1.5 이상' },
  { id:'c15', cat:'재무건전성',label:'자본 증가',            criteria:'최근 3년 증가' },
  { id:'c16', cat:'재무건전성',label:'현금흐름',             criteria:'영업CF 플러스' },
  { id:'c17', cat:'재무건전성',label:'운전자본 안정성',      criteria:'매출 대비 외상매출·매입 안정' },
  { id:'c18', cat:'재무건전성',label:'주식희석률',           criteria:'과도한 주식 발행 없음' },
  { id:'c19', cat:'경쟁력',   label:'브랜드 구축',          criteria:'강한 브랜드 인지도' },
  { id:'c20', cat:'경쟁력',   label:'시장 선도',            criteria:'업종 상위권' },
  { id:'c21', cat:'경쟁력',   label:'시장 점유율',          criteria:'상위 3위 이내' },
  { id:'c22', cat:'경쟁력',   label:'고객 충성도',          criteria:'높은 리텐션·재구매율' },
  { id:'c23', cat:'경쟁력',   label:'배당 성향',            criteria:'0~1% 이하 (재투자 선호)' },
  { id:'c24', cat:'신뢰도',   label:'내부자 매도',          criteria:'과도한 매도 없음' },
  { id:'c25', cat:'신뢰도',   label:'사업보고서 리스크',    criteria:'중대 리스크 없음' },
];

const catOrder = ['수익성','밸류에이션','재무건전성','경쟁력','신뢰도'];
const grouped = {};
catOrder.forEach(c=>grouped[c]=[]);
ITEMS.forEach(item=>grouped[item.cat].push(item));

let html = '';
catOrder.forEach(cat => {
  html += `<div class="cat-block">
    <div class="cat-label">— ${cat}</div>`;
  grouped[cat].forEach(item => {
    html += `
    <div class="check-item">
      <div class="check-header">
        <span class="check-label">${item.label}</span>
        <span class="check-criteria">${item.criteria}</span>
        <select class="verdict-sel" id="chk_${item.id}" onchange="updateLiveScore()">
          <option value="미달">미달</option>
          <option value="확인필요">확인필요</option>
          <option value="부합">부합</option>
        </select>
      </div>
      <textarea class="actual-input" id="act_${item.id}"
        placeholder="실제값 입력 (수치, 상황, 근거 등 자유롭게)..."></textarea>
    </div>`;
  });
  html += `</div>`;
});
document.getElementById('checklistForm').innerHTML = html;
</script>
</body>
</html>
