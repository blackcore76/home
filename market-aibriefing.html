<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#080c14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI 브리핑">
    <title>📈 AI 주식 분석 브리핑</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="home-bar.js"></script>
    <style>
        :root {
            --bg:      #080c14;
            --sf:      #0e1422;
            --sf2:     #131b2d;
            --sf3:     #181f30;
            --bd:      #1e2d45;
            --bd2:     #263548;
            --text:    #c8d6e8;
            --text2:   #7a91a8;
            --text3:   #4a5f74;
            --accent:  #00d4ff;
            --accent2: #0099cc;
            --green:   #00e676;
            --red:     #ff5252;
            --yellow:  #ffca28;
            --mono:    'JetBrains Mono', monospace;
            --sans:    'Noto Sans KR', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* ── HEADER ── */
        header {
            position: sticky; top: 36px; z-index: 50;
            background: rgba(8,12,20,.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--bd);
            padding: 0 16px;
            height: 52px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 8px; }
        .logo-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); animation: pulse 3s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 8px var(--accent)} 50%{opacity:.4;box-shadow:0 0 3px var(--accent)} }

        /* ── 메인 컨테이너 ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        /* ── 카드 스타일 ── */
        .card {
            background: var(--sf);
            border: 1px solid var(--bd);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            transition: border-color .2s, background .2s;
        }
        .card::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, var(--accent), transparent);
            border-radius: 3px 0 0 3px;
        }
        .card:hover { border-color: var(--bd2); background: var(--sf2); }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--bd);
        }
        .card-header .icon { font-size: 22px; }
        .card-header h2 {
            font-family: var(--mono);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: .05em;
            color: var(--accent);
        }
        .card-header .badge {
            margin-left: auto;
            background: rgba(0,212,255,.1);
            border: 1px solid rgba(0,212,255,.2);
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 9px;
            font-family: var(--mono);
            color: var(--accent);
        }

        /* ── API 키 관리 (토글) ── */
        .api-toggle {
            background: var(--sf2);
            border: 1px solid var(--bd);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .api-toggle-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background .2s;
        }
        .api-toggle-btn:hover { background: var(--sf3); }
        .api-toggle-left { display: flex; align-items: center; gap: 8px; }
        .api-toggle-left span:first-child { font-size: 18px; }
        .api-toggle-left .label { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--yellow); }
        .key-status {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 20px;
            background: rgba(0,230,118,.12);
            color: var(--green);
        }
        .key-status.warning { background: rgba(255,202,40,.12); color: var(--yellow); }
        .api-panel {
            display: none;
            padding: 14px 16px;
            border-top: 1px solid var(--bd);
            background: var(--sf);
        }
        .api-panel.open { display: block; }
        .api-input {
            width: 100%;
            background: var(--sf3);
            border: 1px solid var(--bd2);
            color: var(--text);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 12px;
            font-family: var(--mono);
            outline: none;
            margin-bottom: 10px;
        }
        .api-input:focus { border-color: var(--accent); }
        .api-hint { font-size: 10px; color: var(--text3); font-family: var(--mono); }

        /* ── 검색창 ── */
        .search-group {
            margin-bottom: 16px;
        }
        .search-label {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: .1em;
            color: var(--text3);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }
        .search-box {
            display: flex;
            gap: 8px;
        }
        .search-input {
            flex: 1;
            background: var(--sf2);
            border: 1px solid var(--bd2);
            color: var(--text);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 14px;
            font-family: var(--mono);
            outline: none;
            text-transform: uppercase;
        }
        .search-input:focus { border-color: var(--accent); }
        .btn-primary {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all .15s;
        }
        .btn-primary:hover { background: #33ddff; }
        .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

        /* ── 로딩 ── */
        .loader {
            border: 3px solid var(--bd2);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ── 가격 카드 3열 ── */
        .price-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .price-card {
            background: var(--sf3);
            border: 1px solid var(--bd);
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
        }
        .price-label {
            font-family: var(--mono);
            font-size: 9px;
            color: var(--text3);
            letter-spacing: .08em;
            margin-bottom: 6px;
        }
        .price-value {
            font-family: var(--mono);
            font-size: 18px;
            font-weight: 600;
        }
        .price-value.up { color: var(--red); }
        .price-value.down { color: var(--blue, var(--accent)); }

        /* ── 차트 영역 ── */
        .chart-area {
            background: var(--sf3);
            border: 1px solid var(--bd);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 20px;
        }
        .chart-title {
            font-family: var(--mono);
            font-size: 9px;
            color: var(--text3);
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        canvas { max-height: 200px; width: 100%; }

        /* ── AI 리포트 ── */
        .report-area {
            background: linear-gradient(135deg, var(--sf), var(--sf2));
            border: 1px solid rgba(0,212,255,.2);
            border-radius: 14px;
            padding: 18px;
        }
        .report-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--bd);
        }
        .report-header span:first-child { font-size: 20px; }
        .report-header h3 { font-family: var(--mono); font-size: 12px; color: var(--accent); }
        .report-content {
            font-size: 13px;
            line-height: 1.8;
            color: var(--text2);
            white-space: pre-line;
        }

        /* ── 에러 메시지 ── */
        .error-area {
            background: rgba(255,82,82,.1);
            border: 1px solid rgba(255,82,82,.3);
            border-radius: 10px;
            padding: 14px;
            color: var(--red);
            font-size: 12px;
            margin-top: 16px;
        }

        /* ── 푸터 노트 ── */
        .footer-note {
            text-align: center;
            font-size: 10px;
            color: var(--text3);
            font-family: var(--mono);
            margin-top: 20px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo"><div class="logo-dot"></div>AI 주식 분석 브리핑</div>
    <div class="logo" style="font-size: 11px; color: var(--text3);">PRO</div>
</header>

<div class="container">
    <!-- API 키 관리 카드 -->
    <div class="api-toggle">
        <div class="api-toggle-btn" id="toggleApiKeyBtn">
            <div class="api-toggle-left">
                <span>🔑</span>
                <span class="label">API 키 관리</span>
                <span id="keyStatusBadge" class="key-status">✓ 저장됨</span>
            </div>
            <span id="toggleIcon" style="color: var(--text3);">⚙️</span>
        </div>
        <div class="api-panel" id="apiKeyPanel">
            <input type="password" id="finnhubKey" class="api-input" placeholder="Finnhub API Key">
            <input type="password" id="geminiKey" class="api-input" placeholder="Google Gemini API Key">
            <p class="api-hint">🔒 API 키는 브라우저 로컬 저장소에만 안전하게 보관됩니다.</p>
        </div>
    </div>

    <!-- 검색 카드 -->
    <div class="card">
        <div class="card-header">
            <span class="icon">🔍</span>
            <h2>주식 심볼 검색</h2>
            <span class="badge">실시간 데이터</span>
        </div>
        <div class="search-group">
            <label class="search-label">심볼 (예: AAPL, TSLA, MSFT / 한국 티커 분석 불가!)</label>
            <div class="search-box">
                <input type="text" id="symbolInput" value="AAPL" class="search-input" placeholder="심볼 입력">
                <button id="fetchBtn" class="btn-primary">분석 시작</button>
            </div>
        </div>
    </div>

    <!-- 로딩 영역 -->
    <div id="loadingArea" class="card hidden" style="text-align: center;">
        <div class="loader"></div>
        <p style="font-size: 12px; color: var(--text3);">실시간 데이터 수신 및 AI 분석 리포트 생성 중...</p>
    </div>

    <!-- 결과 영역 -->
    <div id="resultArea" class="hidden">
        <!-- 가격 카드 3열 -->
        <div class="price-grid">
            <div class="price-card">
                <div class="price-label">현재가</div>
                <div class="price-value" id="currentPrice">-</div>
            </div>
            <div class="price-card">
                <div class="price-label">변동</div>
                <div class="price-value" id="changePercent">-</div>
            </div>
            <div class="price-card">
                <div class="price-label">변동폭</div>
                <div class="price-value" id="rangeValue">-</div>
            </div>
        </div>

        <!-- 차트 영역 -->
        <div class="chart-area">
            <div class="chart-title">
                <span>📉 일중 가격 범위</span>
                <span id="chartHelperText" style="color: var(--accent);">차트 자동 스케일링</span>
            </div>
            <canvas id="advancedChart"></canvas>
            <div class="chart-title" style="margin-top: 8px; justify-content: space-between;">
                <span>저가</span>
                <span>현재가</span>
                <span>고가</span>
            </div>
        </div>

        <!-- AI 리포트 카드 -->
        <div class="report-area">
            <div class="report-header">
                <span>🤵</span>
                <h3>AI 주식 분석 리포트</h3>
            </div>
            <div id="analysisText" class="report-content">
                분석 결과가 여기에 표시됩니다.
            </div>
        </div>
        <p class="footer-note">* 분석 데이터는 참고용이며, 투자 책임은 본인에게 있습니다.
        * Finnhub / Gemini-3-Flash</p>
    </div>

    <!-- 에러 영역 -->
    <div id="errorArea" class="error-area hidden">
        <span id="errorMsg"></span>
    </div>
</div>

<script>
    // ---------- 전역 변수 ----------
    let myChart = null;
    
    // ---------- API 키 관리 (로컬 스토리지) ----------
    const finnhubInput = document.getElementById('finnhubKey');
    const geminiInput = document.getElementById('geminiKey');
    const keyStatusBadge = document.getElementById('keyStatusBadge');
    const toggleBtn = document.getElementById('toggleApiKeyBtn');
    const panel = document.getElementById('apiKeyPanel');
    const toggleIcon = document.getElementById('toggleIcon');

    const savedFinnhub = localStorage.getItem('finnhub_key');
    const savedGemini = localStorage.getItem('gemini_key');
    if (savedFinnhub) finnhubInput.value = savedFinnhub;
    if (savedGemini) geminiInput.value = savedGemini;
    updateKeyStatus();

    function saveKeys() {
        localStorage.setItem('finnhub_key', finnhubInput.value);
        localStorage.setItem('gemini_key', geminiInput.value);
        updateKeyStatus();
    }

    function updateKeyStatus() {
        const hasBoth = finnhubInput.value && geminiInput.value;
        keyStatusBadge.className = hasBoth ? 'key-status' : 'key-status warning';
        keyStatusBadge.innerText = hasBoth ? '✓ 저장됨' : '⚠️ 입력 필요';
    }

    toggleBtn.addEventListener('click', () => {
        panel.classList.toggle('open');
        toggleIcon.textContent = panel.classList.contains('open') ? '▲' : '⚙️';
    });

    finnhubInput.addEventListener('input', saveKeys);
    geminiInput.addEventListener('input', saveKeys);

    // ---------- 분석 실행 함수 ----------
    async function fetchAndAnalyze() {
        const finnhubKey = finnhubInput.value.trim();
        const geminiKey = geminiInput.value.trim();
        const symbol = document.getElementById('symbolInput').value.trim().toUpperCase();

        if (!finnhubKey || !geminiKey) { 
            alert('API 키를 모두 입력하세요. ⚙️ 버튼을 클릭하여 입력할 수 있습니다.'); 
            return; 
        }
        if (!symbol) { 
            alert('심볼을 입력하세요.'); 
            return; 
        }

        document.getElementById('loadingArea').classList.remove('hidden');
        document.getElementById('resultArea').classList.add('hidden');
        document.getElementById('errorArea').classList.add('hidden');

        try {
            const stockUrl = `https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${finnhubKey}`;
            const stockResponse = await fetch(stockUrl);
            const stockData = await stockResponse.json();

            if (stockData.error || (stockData.c === 0 && stockData.h === 0)) {
                throw new Error('유효하지 않은 심볼이거나 데이터가 없습니다.');
            }

            const current = stockData.c;
            const change = stockData.d;
            const changePercent = stockData.dp;
            const high = stockData.h;
            const low = stockData.l;
            const range = (high - low).toFixed(2);
            const rangePercent = ((range / low) * 100).toFixed(2);

            document.getElementById('currentPrice').innerHTML = `$${current.toFixed(2)}`;
            const changeEl = document.getElementById('changePercent');
            changeEl.innerHTML = `${changePercent.toFixed(2)}% <span style="font-size: 11px;">($${change.toFixed(2)})</span>`;
            changeEl.className = `price-value ${changePercent >= 0 ? 'up' : 'down'}`;
            document.getElementById('rangeValue').innerHTML = `$${range}<span style="font-size: 10px;"> (${rangePercent}%)</span>`;

            // 차트
            const ctx = document.getElementById('advancedChart').getContext('2d');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['저가', '현재가', '고가'],
                    datasets: [{
                        label: '주가 추세 ($)',
                        data: [low, current, high],
                        borderColor: '#00d4ff',
                        backgroundColor: 'rgba(0,212,255,0.08)',
                        borderWidth: 2.5,
                        pointBackgroundColor: ['#10b981', '#fbbf24', '#ef4444'],
                        pointBorderColor: '#fff',
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        tension: 0.1,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: (ctx) => ` $${ctx.raw.toFixed(2)}` } }
                    },
                    scales: {
                        y: { min: low * 0.995, max: high * 1.005, grid: { color: '#1e2d45' }, ticks: { color: '#7a91a8', font: { size: 10 } } },
                        x: { grid: { display: false }, ticks: { color: '#7a91a8' } }
                    }
                }
            });

            // AI 분석
            const today = new Date();
            const dateStr = `${today.getFullYear()}년 ${today.getMonth() + 1}월 ${today.getDate()}일`;
            const prompt = `오늘은 ${dateStr}입니다. 당신은 AI 수석 기술적 애널리스트입니다. 
다음 주식 데이터를 바탕으로 개미 투자자에게 제공하는 심층 기술적 분석 리포트를 작성하세요.
"오늘 기분이 좋아요" 같은 주관적 표현은 절대 금지입니다.

분석 데이터:
- 심볼: ${symbol}
- 현재가: $${current.toFixed(2)}
- 변동률: ${changePercent.toFixed(2)}%
- 금일 레인지: $${range} (변동폭 ${rangePercent}%)

분석 리포트에 반드시 포함할 항목:
1. 현재 가격의 기술적 위치 (52주 신고가/신저가 대비, 또는 주요 이동평균선과의 관계를 추정하여 설명)
2. 오늘의 변동성 분석 (레인지 비율이 평소 대비 높은지 낮은지 평가)
3. 단기 추세 전망 (내일 또는 이번 주 예상 움직임)
4. 주요 지지선과 저항선 레벨 제시
5. 투자자들을 위한 액션 플랜 (관망, 분할 매수, 익절 등 구체적 제안)

반드시 전문가답게, 데이터 기반으로, 한국어로 상세히 작성하세요.`;

            const aiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${geminiKey}`;
            const aiResponse = await fetch(aiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.4, maxOutputTokens: 8192 }
                })
            });

            const aiData = await aiResponse.json();
            let aiText = '';
            if (aiData.candidates && aiData.candidates.length > 0) {
                aiText = aiData.candidates[0].content.parts[0].text;
            } else if (aiData.error) {
                aiText = `AI 분석 오류: ${aiData.error.message}`;
            } else {
                aiText = 'AI 분석 중 오류 발생. API 키 또는 모델명을 확인하세요.';
            }

            document.getElementById('analysisText').innerText = aiText;
            document.getElementById('loadingArea').classList.add('hidden');
            document.getElementById('resultArea').classList.remove('hidden');

        } catch (error) {
            console.error('Error:', error);
            document.getElementById('loadingArea').classList.add('hidden');
            document.getElementById('errorMsg').innerText = error.message || '네트워크 오류 또는 API 키 제한입니다.';
            document.getElementById('errorArea').classList.remove('hidden');
        }
    }

    document.getElementById('fetchBtn').addEventListener('click', fetchAndAnalyze);
    document.getElementById('symbolInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') fetchAndAnalyze();
    });
</script>
</body>
</html>
