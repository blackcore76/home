
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30분봉 글로벌 마켓 대시보드</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #131722;
        }

        /* ── PC: fixed 2×2 그리드 ── */
        .grid-container {
            position: fixed;
            inset: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 1px;
            background-color: #000;
        }

        .chart-box {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .swipe-left, .swipe-right { display: none; }
        .mobile-nav { display: none; }

        /* ── 모바일/태블릿 (≤1024px) ── */
        @media (max-width: 1024px) {

            .grid-container {
                position: fixed;
                inset: 0 0 52px 0;
                display: block;
                overflow-y: scroll;
                overflow-x: hidden;
                scroll-snap-type: y mandatory;
                -webkit-overflow-scrolling: touch;
                background-color: #131722;
            }

            .chart-box {
                width: 100%;
                height: 100%;
                scroll-snap-align: start;
                scroll-snap-stop: always;
            }

            .swipe-left, .swipe-right {
                display: block;
                position: absolute;
                top: 0; bottom: 0;
                width: 20px;
                z-index: 10;
            }
            .swipe-left  { left: 0; }
            .swipe-right { right: 0; }

            .mobile-nav {
                display: flex;
                position: fixed;
                bottom: 0; left: 0; right: 0;
                height: 52px;
                background: #131722;
                border-top: 1px solid #2a2e39;
                z-index: 100;
                align-items: center;
                justify-content: space-around;
                padding: 0 8px;
            }

            .nav-btn {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 4px 2px;
                cursor: pointer;
                border: none;
                background: transparent;
                -webkit-tap-highlight-color: transparent;
                min-width: 0;
            }

            .nav-btn .dot {
                width: 8px; height: 8px;
                border-radius: 50%;
                background: #2a2e39;
                border: 1.5px solid #4a5568;
                transition: all .25s ease;
                flex-shrink: 0;
            }

            .nav-btn.active .dot {
                width: 12px; height: 12px;
                background: #2196f3;
                border-color: #2196f3;
                box-shadow: 0 0 8px rgba(33,150,243,.7), 0 0 16px rgba(33,150,243,.3);
                animation: pulse 2s ease-in-out infinite;
            }

            @keyframes pulse {
                0%, 100% { box-shadow: 0 0 8px rgba(33,150,243,.7), 0 0 16px rgba(33,150,243,.3); }
                50%       { box-shadow: 0 0 12px rgba(33,150,243,1), 0 0 24px rgba(33,150,243,.5); }
            }
        }
    </style>
    <script src="home-bar.js"></script>
</head>
<body>

<div class="grid-container" id="scrollWrap">
    <!-- chart-box는 JS가 CHARTS 배열 기준으로 동적 생성 -->
</div>

<nav class="mobile-nav" id="mobileNav">
    <!-- 네비 버튼도 JS가 자동 생성 -->
</nav>

<script type="text/javascript">

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ★ 여기만 수정하면 차트+네비가 자동으로 바뀜
   symbol: "거래소:티커" 형식
   label : 생략 시 티커 부분을 자동 추출
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const CHARTS = [
    { symbol: "AMEX:SPY"         },
    { symbol: "NASDAQ:QQQ"       },
    { symbol: "FX_IDC:USDKRW"    },
    { symbol: "OANDA:XAUUSD"     },
];

/* ── 공통 TradingView 설정 ── */
const COMMON = {
    autosize: true,
    interval: "30",
    timezone: "Asia/Seoul",
    theme: "dark",
    style: "1",
    locale: "kr",
    enable_publishing: false,
    allow_symbol_change: true,
    hide_side_toolbar: false,
    details: false,
    hotlist: false,
    calendar: false,
};

/* ── DOM 생성 ── */
const wrap = document.getElementById('scrollWrap');
const nav  = document.getElementById('mobileNav');

const widgets = []; // 위젯 인스턴스 보관

CHARTS.forEach((chart, i) => {
    const id = `chart_tv_${i}`;

    // chart-box
    const box = document.createElement('div');
    box.className = 'chart-box';
    box.id = id;

    const sl = document.createElement('div'); sl.className = 'swipe-left';
    const sr = document.createElement('div'); sr.className = 'swipe-right';
    box.appendChild(sl);
    box.appendChild(sr);
    wrap.appendChild(box);

    // 네비 버튼 (dot만)
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
    btn.onclick = () => goTo(i);

    const dot = document.createElement('div');
    dot.className = 'dot';

    btn.appendChild(dot);
    nav.appendChild(btn);

    // TradingView 위젯 생성
    const w = new TradingView.widget({
        ...COMMON,
        symbol: chart.symbol,
        container_id: id,
    });
    widgets.push(w);
});

/* ── 네비게이션 ── */
const btns = [...nav.querySelectorAll('.nav-btn')];

function goTo(idx) {
    idx = Math.max(0, Math.min(CHARTS.length - 1, idx));
    wrap.scrollTo({ top: wrap.clientHeight * idx, behavior: 'smooth' });
}

function syncNav() {
    const idx = Math.round(wrap.scrollTop / wrap.clientHeight);
    btns.forEach((b, i) => b.classList.toggle('active', i === idx));
}
wrap.addEventListener('scroll', syncNav, { passive: true });

/* ── 엣지 오버레이 스와이프 ── */
let ty0 = null, tx0 = null;
document.querySelectorAll('.swipe-left, .swipe-right').forEach(el => {
    el.addEventListener('touchstart', e => {
        ty0 = e.touches[0].clientY;
        tx0 = e.touches[0].clientX;
    }, { passive: true });

    el.addEventListener('touchend', e => {
        if (ty0 === null) return;
        const dy = ty0 - e.changedTouches[0].clientY;
        const dx = Math.abs(tx0 - e.changedTouches[0].clientX);
        if (Math.abs(dy) > 40 && Math.abs(dy) > dx) {
            const cur = Math.round(wrap.scrollTop / wrap.clientHeight);
            goTo(cur + (dy > 0 ? 1 : -1));
        }
        ty0 = tx0 = null;
    }, { passive: true });
});

</script>
</body>
</html>
