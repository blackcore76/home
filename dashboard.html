
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30분봉 글로벌 마켓 대시보드</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #131722;
        }

        /* 핵심 수정: 100vh 대신 position:fixed + inset:0 사용
           → 브라우저 주소창/툴바 높이에 관계없이 정확히 보이는 영역만 채움 */
        .grid-container {
            position: fixed;
            inset: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 1px;
            background-color: #000;
        }

        .chart-box {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* 모바일: 1열 4행 스크롤 레이아웃 */
        @media (max-width: 768px) {
            .grid-container {
                position: static;
                display: flex;
                flex-direction: column;
                width: 100%;
                height: auto;
                gap: 1px;
            }
            .chart-box {
                width: 100%;
                height: 100svh;
                flex-shrink: 0;
            }
        }
    </style>
    <script src="home-bar.js"></script>
</head>
<body>
<div class="grid-container">
    <div class="chart-box" id="chart_spy"></div>
    <div class="chart-box" id="chart_qqq"></div>
    <div class="chart-box" id="chart_usdkrw"></div>
    <div class="chart-box" id="chart_gold"></div>
</div>
<script type="text/javascript">
    const commonConfig = {
        autosize: true,
        interval: "30",
        timezone: "Asia/Seoul",
        theme: "dark",
        style: "1",
        locale: "kr",
        enable_publishing: false,
        allow_symbol_change: true,
        hide_side_toolbar: false,
        details: false,
        hotlist: false,
        calendar: false
    };

    new TradingView.widget({ ...commonConfig, symbol: "AMEX:SPY",        container_id: "chart_spy"     });
    new TradingView.widget({ ...commonConfig, symbol: "NASDAQ:QQQ",      container_id: "chart_qqq"     });
    new TradingView.widget({ ...commonConfig, symbol: "FX_IDC:USDKRW",   container_id: "chart_usdkrw"  });
    new TradingView.widget({ ...commonConfig, symbol: "OANDA:XAUUSD",    container_id: "chart_gold"    });
</script>
</body>
</html>
