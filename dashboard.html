<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#080c14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="4분할 대시보드">
    <title>4분할 차트 — 글로벌 마켓 대시보드</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="site.webmanifest">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #080c14;
            --sf:      #0e1422;
            --sf2:     #131b2d;
            --sf3:     #181f30;
            --bd:      #1e2d45;
            --bd2:     #263548;
            --text:    #c8d6e8;
            --text2:   #7a91a8;
            --text3:   #4a5f74;
            --accent:  #00d4ff;
            --accent2: #0099cc;
            --green:   #00e676;
            --red:     #ff5252;
            --mono:    'JetBrains Mono', monospace;
            --sans:    'Noto Sans KR', sans-serif;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: var(--sans);
        }

        /* ── 헤더 (피드 스타일) ── */
        header {
            position: fixed;
            top: 36px;
            left: 0;
            right: 0;
            z-index: 50;
            background: rgba(8,12,20,.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--bd);
            padding: 0 16px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-family: var(--mono);
            font-size: 15px;
            font-weight: 600;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-dot {
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100%{opacity:1;box-shadow:0 0 8px var(--accent)}
            50%{opacity:.4;box-shadow:0 0 3px var(--accent)}
        }
        .header-badge {
            font-family: var(--mono);
            font-size: 9px;
            color: var(--accent);
            background: var(--sf);
            border: 1px solid var(--bd);
            border-radius: 20px;
            padding: 3px 10px;
        }

        /* ── 티커 테이프 ── */
        .ticker-wrap {
            position: fixed;
            top: 84px;
            left: 0; right: 0;
            height: 30px;
            z-index: 40;
            background: rgba(6,9,15,.97);
            border-bottom: 1px solid var(--bd);
            overflow: hidden;
            display: flex;
            align-items: center;
        }
        .ticker-track {
            display: flex;
            align-items: center;
            white-space: nowrap;
            animation: ticker-scroll 55s linear infinite;
            will-change: transform;
        }
        .ticker-track:hover { animation-play-state: paused; }
        @keyframes ticker-scroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 20px;
            font-family: var(--mono);
            font-size: 13px;
            border-right: 1px solid rgba(30,45,69,.6);
        }
        .tk-name  { color: #7a91a8; font-weight: 500; letter-spacing: .04em; }
        .tk-price { color: #c8d6e8; font-weight: 600; }
        .tk-chg   { font-size: 11px; font-weight: 500; }
        .tk-chg.c-up   { color: #ff3b5c; }   /* 상승: 빨강 (한국식) */
        .tk-chg.c-dn   { color: #448aff; }   /* 하락: 파랑 (한국식) */
        .tk-chg.c-vup  { color: #448aff; }   /* VIX/WTI 상승: 파랑 */
        .tk-chg.c-vdn  { color: #ff3b5c; }   /* VIX/WTI 하락: 빨강 */
        .tk-chg.c-nt   { color: #4a607a; }
        .ticker-sep { color: rgba(30,45,69,.8); padding: 0 4px; font-size: 10px; }

        /* ── PC: fixed 2×2 그리드 ── */
        .grid-container {
            position: fixed;
            top: 114px;
            left: 0;
            right: 0;
            bottom: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 1px;
            background-color: #000;
        }

        .chart-box {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            background: var(--sf2);
        }

        .swipe-left, .swipe-right { display: none; }
        .mobile-nav { display: none; }

        /* ── 모바일/태블릿 (≤1024px) ── */
        @media (max-width: 1024px) {
            header { top: 36px; }
            .ticker-wrap { top: 84px; }
            .grid-container {
                position: fixed;
                top: 114px;
                left: 0;
                right: 0;
                bottom: 52px;
                display: block;
                overflow-y: scroll;
                overflow-x: hidden;
                scroll-snap-type: y mandatory;
                -webkit-overflow-scrolling: touch;
                background-color: var(--bg);
            }

            .chart-box {
                width: 100%;
                height: 100%;
                scroll-snap-align: start;
                scroll-snap-stop: always;
                background: var(--sf2);
            }

            .swipe-left, .swipe-right {
                display: block;
                position: absolute;
                top: 0; bottom: 0;
                width: 20px;
                z-index: 10;
            }
            .swipe-left  { left: 0; }
            .swipe-right { right: 0; }

            .mobile-nav {
                display: flex;
                position: fixed;
                bottom: 0; left: 0; right: 0;
                height: 52px;
                background: var(--sf);
                border-top: 1px solid var(--bd);
                z-index: 100;
                align-items: center;
                justify-content: space-around;
                padding: 0 12px;
            }

            .nav-btn {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 8px 4px;
                cursor: pointer;
                border: none;
                background: transparent;
                -webkit-tap-highlight-color: transparent;
                flex-direction: column;
                gap: 4px;
            }

            .nav-label {
                font-family: var(--mono);
                font-size: 9px;
                color: var(--text3);
                transition: color .2s;
            }

            .nav-btn.active .nav-label {
                color: var(--accent);
            }

            .nav-btn .dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--text3);
                transition: all .25s ease;
            }

            .nav-btn.active .dot {
                width: 8px;
                height: 8px;
                background: var(--accent);
                box-shadow: 0 0 8px var(--accent);
            }
        }

        /* ── 작은 화면에서 헤더 여백 조정 ── */
        @media (max-width: 600px) {
            header { height: 44px; top: 36px; }
            .ticker-wrap { top: 80px; }
            .grid-container { top: 110px; }
        }
    </style>
    <script src="home-bar.js"></script>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-dot"></div>
        4분할 차트 대시보드
    </div>
    <div class="header-badge"> D 딜레이데이터 / ≈ 5초마다 업뎃 </div>
</header>

<div class="ticker-wrap" id="tickerWrap">
    <div class="ticker-track" id="tickerTrack">
        <span class="tk-name" style="padding:0 16px;opacity:.4">로딩 중…</span>
    </div>
</div>

<div class="grid-container" id="scrollWrap">
    <!-- chart-box는 JS가 CHARTS 배열 기준으로 동적 생성 -->
</div>

<nav class="mobile-nav" id="mobileNav">
    <!-- 네비 버튼도 JS가 자동 생성 -->
</nav>

<script type="text/javascript">

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ★ 여기만 수정하면 차트+네비가 자동으로 바뀜
   symbol: "거래소:티커" 형식
   label : 표시할 레이블 (생략 시 티커 부분 자동 추출)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const CHARTS = [
    { symbol: "AMEX:SPY",      label: "" },
    { symbol: "NASDAQ:QQQ",    label: "" },
    { symbol: "FX_IDC:USDKRW", label: "" },
    { symbol: "OANDA:XAUUSD",  label: "" },
];

/* ── 공통 TradingView 설정 ── */
const COMMON = {
    autosize: true,
    interval: "30",
    timezone: "Asia/Seoul",
    theme: "dark",
    style: "1",
    locale: "kr",
    enable_publishing: false,
    allow_symbol_change: true,
    hide_side_toolbar: false,
    details: false,
    hotlist: false,
    calendar: false,
};

/* ── DOM 생성 ── */
const wrap = document.getElementById('scrollWrap');
const nav  = document.getElementById('mobileNav');

const widgets = []; // 위젯 인스턴스 보관

CHARTS.forEach((chart, i) => {
    const id = `chart_tv_${i}`;
    const displayLabel = chart.label || chart.symbol.split(':')[1] || chart.symbol;

    // chart-box
    const box = document.createElement('div');
    box.className = 'chart-box';
    box.id = id;

    const sl = document.createElement('div'); sl.className = 'swipe-left';
    const sr = document.createElement('div'); sr.className = 'swipe-right';
    box.appendChild(sl);
    box.appendChild(sr);
    wrap.appendChild(box);

    // 네비 버튼 (dot + 레이블)
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
    btn.onclick = () => goTo(i);

    const dot = document.createElement('div');
    dot.className = 'dot';

    btn.appendChild(dot);
    nav.appendChild(btn);

    // TradingView 위젯 생성
    const w = new TradingView.widget({
        ...COMMON,
        symbol: chart.symbol,
        container_id: id,
    });
    widgets.push(w);
});

/* ── 네비게이션 ── */
const btns = [...nav.querySelectorAll('.nav-btn')];

function goTo(idx) {
    idx = Math.max(0, Math.min(CHARTS.length - 1, idx));
    wrap.scrollTo({ top: wrap.clientHeight * idx, behavior: 'smooth' });
}

function syncNav() {
    const idx = Math.round(wrap.scrollTop / wrap.clientHeight);
    btns.forEach((b, i) => b.classList.toggle('active', i === idx));
}
wrap.addEventListener('scroll', syncNav, { passive: true });

/* ── 엣지 오버레이 스와이프 ── */
let ty0 = null, tx0 = null;
document.querySelectorAll('.swipe-left, .swipe-right').forEach(el => {
    el.addEventListener('touchstart', e => {
        ty0 = e.touches[0].clientY;
        tx0 = e.touches[0].clientX;
    }, { passive: true });

    el.addEventListener('touchend', e => {
        if (ty0 === null) return;
        const dy = ty0 - e.changedTouches[0].clientY;
        const dx = Math.abs(tx0 - e.changedTouches[0].clientX);
        if (Math.abs(dy) > 40 && Math.abs(dy) > dx) {
            const cur = Math.round(wrap.scrollTop / wrap.clientHeight);
            goTo(cur + (dy > 0 ? 1 : -1));
        }
        ty0 = tx0 = null;
    }, { passive: true });
});

// 창 크기 변경 시 차트 리사이즈 대비
window.addEventListener('resize', () => {
    widgets.forEach(w => {
        try { w.resize(); } catch(e) {}
    });
});

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   티커 테이프 — Yahoo Finance 데이터
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const TICKER_INSTR = [
    { id:'nasdaq', name:'NASDAQ',   sym:'^IXIC', isVix:false, fmt:'int', pre:'' },
    { id:'sp500',  name:'S&P500',   sym:'^GSPC', isVix:false, fmt:'int', pre:'' },
    { id:'dow',    name:'DOW',      sym:'^DJI',  isVix:false, fmt:'int', pre:'' },
    { id:'vix',    name:'VIX',      sym:'^VIX',  isVix:true,  fmt:'d2',  pre:'' },
    { id:'kospi',  name:'KOSPI',    sym:'^KS11', isVix:false, fmt:'d2',  pre:'' },
    { id:'kosdaq', name:'KOSDAQ',   sym:'^KQ11', isVix:false, fmt:'d2',  pre:'' },
    { id:'gold',   name:'금 현물',  sym:'GC=F',  isVix:false, fmt:'d2',  pre:'$' },
    { id:'usdkrw', name:'환율',     sym:'KRW=X', isVix:false, fmt:'d2',  pre:'₩' },
    { id:'wti',    name:'WTI원유',  sym:'CL=F',  isVix:true,  fmt:'d2',  pre:'$' },
];

const TICKER_PX = [
    u => `https://lotto-proxy.blackcore-ff6.workers.dev/?url=${encodeURIComponent(u)}`,
    u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

let tkWinPx = null;

function tkFmt(val, fmt, pre) {
    if (val == null) return '—';
    let s;
    if (fmt === 'int') s = Math.round(val).toLocaleString('en-US');
    else s = val.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return pre + s;
}

async function tkFetchOne(pfn, sym) {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=2d`;
    const res = await fetch(pfn(url), { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const m = data?.chart?.result?.[0]?.meta;
    if (!m) throw new Error('no meta');
    return m;
}

async function tkFetch(sym) {
    const order = tkWinPx !== null
        ? [TICKER_PX[tkWinPx], ...TICKER_PX.filter((_, i) => i !== tkWinPx)]
        : TICKER_PX;
    for (let i = 0; i < order.length; i++) {
        try {
            const m = await tkFetchOne(order[i], sym);
            if (tkWinPx === null) tkWinPx = TICKER_PX.indexOf(order[i]);
            return m;
        } catch(e) {}
    }
    return null;
}

function buildTickerHTML(items) {
    const parts = items.map(it => {
        const { name, pre, fmt, isVix, px, prv } = it;
        if (px == null) return `<span class="ticker-item"><span class="tk-name">${name}</span><span class="tk-price tk-chg c-nt">—</span></span>`;
        const chg = px - prv;
        const pct = prv ? (chg / prv) * 100 : 0;
        const up  = chg >= 0;
        const sg  = up ? '+' : '';
        const cls = isVix ? (up ? 'c-vup' : 'c-vdn') : (up ? 'c-up' : 'c-dn');
        const arr = isVix ? (up ? '▲' : '▼') : (up ? '▲' : '▼');
        return `<span class="ticker-item">` +
            `<span class="tk-name">${name}</span>` +
            `<span class="tk-price">${tkFmt(px, fmt, pre)}</span>` +
            `<span class="tk-chg ${cls}">${arr} ${sg}${pct.toFixed(2)}%</span>` +
            `</span>`;
    });
    // 무한 스크롤을 위해 2배 복제
    const html = parts.join('') + parts.join('');
    return html;
}

async function loadTicker() {
    const results = await Promise.allSettled(
        TICKER_INSTR.map(inst => tkFetch(inst.sym))
    );
    const items = TICKER_INSTR.map((inst, i) => {
        const m = results[i].status === 'fulfilled' ? results[i].value : null;
        return {
            ...inst,
            px:  m?.regularMarketPrice ?? null,
            prv: m?.chartPreviousClose ?? m?.previousClose ?? null,
        };
    });

    const track = document.getElementById('tickerTrack');
    if (!track) return;
    track.innerHTML = buildTickerHTML(items);
}

// 초기 로드 + 60초마다 갱신
loadTicker();
setInterval(loadTicker, 60000);

</script>
</body>
</html>
