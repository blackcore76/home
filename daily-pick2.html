<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<meta name="theme-color" content="#080c14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="픽노트">
<title>픽노트 — 일일 주식 픽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  firebase.initializeApp({
    apiKey:            "AIzaSyCIQKMbhnQY2sIdDthFrm-dznnVMs5pb30",

    projectId:         "my-bp-tracker-3d595",
    storageBucket:     "my-bp-tracker-3d595.firebasestorage.app",
    messagingSenderId: "1016360206319",
    appId:             "1:1016360206319:web:5f5df2e2c45b30694a401a"
  });
</script>
<script src="home-bar.js"></script>
<style>
:root {
  --bg:      #080c14;
  --sf:      #0e1422;
  --sf2:     #131b2d;
  --sf3:     #181f30;
  --bd:      #1e2d45;
  --bd2:     #263548;
  --text:    #c8d6e8;
  --text2:   #7a91a8;
  --text3:   #4a5f74;
  --accent:  #00d4ff;
  --accent2: #0099cc;
  --green:   #00e676;
  --red:     #ff5252;
  --yellow:  #ffca28;
  --mono:    'JetBrains Mono', monospace;
  --sans:    'Noto Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* 헤더 */
header {
  position: sticky; top: 36px; z-index: 50;
  background: rgba(8,12,20,.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bd);
  padding: 0 16px;
  height: 52px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 8px; }
.logo-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); animation: pulse 3s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 8px var(--accent)} 50%{opacity:.4;box-shadow:0 0 3px var(--accent)} }

/* 동기화 배지 */
.sync-badge {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  background: var(--sf); border: 1px solid var(--bd);
  border-radius: 20px; padding: 3px 10px;
}
.sync-dot {
  width: 5px; height: 5px; border-radius: 50%;
  flex-shrink: 0;
}
.sync-dot.live     { background: var(--green); box-shadow: 0 0 5px var(--green); animation: bl 3s infinite; }
.sync-dot.loading  { background: var(--yellow); box-shadow: 0 0 5px var(--yellow); animation: bl .6s infinite; }
.sync-dot.offline  { background: var(--red); }
.sync-dot.saving   { background: var(--accent); box-shadow: 0 0 5px var(--accent); animation: bl .4s infinite; }
@keyframes bl { 0%,100%{opacity:1} 50%{opacity:.2} }
.sync-txt.live    { color: var(--green); }
.sync-txt.loading { color: var(--yellow); }
.sync-txt.offline { color: var(--red); }
.sync-txt.saving  { color: var(--accent); }

/* 사용자 배지 */
.user-badge {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10px;
  color: var(--text2); background: var(--sf2);
  border: 1px solid var(--bd); border-radius: 20px;
  padding: 3px 10px;
  cursor: pointer;
}
.user-badge:hover { border-color: var(--accent); color: var(--accent); }

/* 버튼 */
.btn-add {
  background: var(--accent); color: #000; border: none; border-radius: 8px;
  padding: 6px 14px; font-family: var(--sans); font-size: 12px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: background .15s;
}
.btn-add:hover { background: #33ddff; }

/* 필터바 */
.filter-bar {
  padding: 10px 16px;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  border-bottom: 1px solid var(--bd);
}
.filter-input {
  background: var(--sf2); border: 1px solid var(--bd2); color: var(--text);
  border-radius: 6px; padding: 6px 10px; font-size: 12px; font-family: var(--sans);
  outline: none; width: 150px;
  color-scheme: dark;
}
.filter-input:focus { border-color: var(--accent); }
.count-chip {
  margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--text3);
  background: var(--sf2); border: 1px solid var(--bd); border-radius: 20px;
  padding: 3px 10px;
}
.count-chip span { color: var(--accent); font-weight: 600; }

/* 피드 카드 */
.feed { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.date-group {
  display: flex; align-items: center; gap: 10px; margin: 6px 0 2px;
}
.date-group .date-label {
  font-family: var(--mono); font-size: 11px; color: var(--accent); white-space: nowrap;
}
.date-group .line {
  flex: 1; height: 1px; background: rgba(0,212,255,.1);
}
.date-group .count-badge {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
}
.feed-item {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 14px;
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s, background .2s;
  animation: fadeIn .3s ease both;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.feed-item::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, var(--accent), transparent);
  border-radius: 3px 0 0 3px;
}
.feed-item:hover { border-color: var(--bd2); background: var(--sf2); }
.item-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap;
}
.item-name { font-size: 16px; font-weight: 700; color: var(--text); }
.score-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-family: var(--mono); font-size: 11px; font-weight: 700;
}
.score-hi { background: rgba(0,230,118,.15); color: var(--green); border: 1px solid rgba(0,230,118,.3); }
.score-md { background: rgba(255,202,40,.12); color: var(--yellow); border: 1px solid rgba(255,202,40,.3); }
.score-lo { background: rgba(255,82,82,.12); color: var(--red); border: 1px solid rgba(255,82,82,.3); }
.item-author {
  font-family: var(--mono); font-size: 9px; color: var(--text3);
  background: var(--sf3); border: 1px solid var(--bd); border-radius: 5px;
  padding: 2px 6px;
}
.item-actions { margin-left: auto; display: flex; gap: 6px; }
.btn-icon {
  background: transparent; border: 1px solid var(--bd); color: var(--text3);
  border-radius: 6px; width: 28px; height: 28px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: all .15s;
}
.btn-icon.edit:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,.08); }
.btn-icon.del:hover  { border-color: var(--red); color: var(--red); background: rgba(255,82,82,.08); }
.row1-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px 12px;
  margin-bottom: 14px;
  background: var(--sf3);
  border-radius: 10px;
  padding: 10px 12px;
  border: 1px solid var(--bd2);
}
.row2-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 8px 12px;
  margin-bottom: 10px;
}
.info-cell { display: flex; flex-direction: column; gap: 2px; }
.info-label {
  font-size: 9px; font-family: var(--mono); letter-spacing: .6px;
  text-transform: uppercase; color: var(--text3);
}
.info-value { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--text); }
.info-value.accent { color: var(--accent); }
.info-value.green  { color: var(--green); }
.info-value.red    { color: var(--red); }
.info-value.yellow { color: var(--yellow); }
.pnl-pct {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px; border-radius: 3px;
  font-family: var(--mono); font-size: 11px; font-weight: 700;
}
.pnl-pct.pos { background: rgba(0,230,118,.12); border: 1px solid rgba(0,230,118,.25); color: var(--green); }
.pnl-pct.neg { background: rgba(255,82,82,.12); border: 1px solid rgba(255,82,82,.25); color: var(--red); }
.note-area {
  margin-top: 10px;
  padding: 8px 10px;
  background: var(--sf3);
  border-radius: 8px;
  font-size: 11px;
  line-height: 1.6;
  color: var(--text2);
  border-left: 2px solid var(--accent);
}
.empty-state { text-align: center; padding: 80px 20px; color: var(--text3); }
.empty-icon { font-size: 48px; opacity: .4; margin-bottom: 12px; }

/* 페이지네이션 */
.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin: 20px 16px 40px;
  flex-wrap: wrap;
}
.page-btn {
  background: var(--sf2);
  border: 1px solid var(--bd);
  color: var(--text2);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  min-width: 36px;
  text-align: center;
}
.page-btn:hover:not(:disabled) {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,212,255,.05);
}
.page-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  font-weight: 600;
}
.page-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
.page-ellipsis {
  color: var(--text3);
  font-family: var(--mono);
  font-size: 12px;
  padding: 0 4px;
}

/* 모달 */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal {
  background: var(--sf);
  border: 1px solid var(--bd2);
  border-radius: 16px;
  width: 100%;
  max-width: 680px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
  transform: translateY(20px);
  transition: transform .2s;
}
.overlay.open .modal {
  transform: translateY(0);
}
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--bd); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; font-family: var(--mono); color: var(--accent); }
.modal-title .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
.btn-close { background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 24px; padding: 0 6px; }
.btn-close:hover { color: var(--red); }
.modal-body { padding: 16px 20px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 10px; font-weight: 600; letter-spacing: .7px; text-transform: uppercase; color: var(--text3); font-family: var(--mono); }
input, textarea {
  background: var(--sf3); border: 1px solid var(--bd2); color: var(--text);
  border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: var(--sans);
  outline: none; width: 100%;
}
input:focus, textarea:focus { border-color: var(--accent); }
.form-section {
  margin-top: 14px; margin-bottom: 8px; font-size: 10px;
  font-family: var(--mono); font-weight: 700; letter-spacing: 1px;
  color: var(--accent); border-top: 1px solid var(--bd); padding-top: 12px;
}
.ma-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.score-row { display: flex; align-items: center; gap: 8px; }
.score-row input[type=range] { flex: 1; accent-color: var(--accent); }
.score-display { font-family: var(--mono); font-size: 14px; font-weight: 700; min-width: 40px; text-align: right; }
.pnl-strip { display: none; background: var(--sf3); border: 1px solid var(--bd2); border-radius: 6px; padding: 8px 12px; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
.pnl-strip.visible { display: flex; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--bd); display: flex; gap: 8px; justify-content: flex-end; }
.btn-cancel { background: transparent; border: 1px solid var(--bd2); color: var(--text2); border-radius: 6px; padding: 8px 16px; cursor: pointer; }
.btn-cancel:hover { border-color: var(--text2); color: var(--text); }
.btn-save { background: var(--accent); border: none; color: #000; border-radius: 6px; padding: 8px 22px; font-weight: 700; cursor: pointer; }

/* 로그인 모달 */
.login-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,.85);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.login-overlay.open { opacity: 1; pointer-events: all; }
.login-modal {
  background: var(--sf);
  border: 1px solid var(--bd2);
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  max-width: 320px;
  width: 90%;
}
.login-modal .btn-login {
  background: var(--accent); color: #000; border: none;
  border-radius: 10px; padding: 12px 24px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  width: 100%;
}
.login-modal .btn-cancel {
  margin-top: 12px;
  background: transparent;
  border: 1px solid var(--bd2);
  color: var(--text2);
  border-radius: 10px;
  padding: 10px 20px;
  width: 100%;
  cursor: pointer;
}

/* 팝오버 */
#globalPopover {
  display: none; position: fixed; z-index: 9999;
  background: var(--sf); border: 1px solid var(--bd2); border-radius: 8px;
  padding: 10px 14px; box-shadow: 0 8px 32px rgba(0,0,0,.7);
  min-width: 180px; max-width: 320px; font-size: 12px; line-height: 1.6;
  white-space: pre-wrap; pointer-events: none;
}
#globalPopover.open { display: block; }
.trunc-wrap { display: inline-flex; align-items: center; gap: 5px; }
.trunc-btn {
  background: var(--sf3); border: 1px solid var(--bd2); border-radius: 3px;
  padding: 1px 6px; font-size: 9px; font-family: var(--mono); cursor: pointer;
}
.trunc-btn:hover { border-color: var(--accent); color: var(--accent); }

.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--sf2); border: 1px solid var(--bd2);
  border-radius: 40px; padding: 8px 20px;
  font-size: 12px; opacity: 0;
  transition: all .2s; z-index: 9999;
  white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .row1-grid, .row2-grid { grid-template-columns: 1fr 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .ma-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>픽노트 / PICK NOTE</div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="sync-badge">
      <div class="sync-dot loading" id="syncDot"></div>
      <span class="sync-txt loading" id="syncTxt">연결 중...</span>
    </div>
    <div class="user-badge" id="userBadge" onclick="showLoginModal()">
      <span>👤</span>
      <span class="user-email" id="userEmail">로그인</span>
    </div>
    <button class="btn-add" id="addBtn" onclick="checkLoginAndOpenModal()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      새 픽 추가
    </button>
  </div>
</header>

<div class="filter-bar">
  <input class="filter-input" type="date" id="filterDate" oninput="resetToFirstPageAndRender()">
  <input class="filter-input" type="text" id="filterName" oninput="resetToFirstPageAndRender()" placeholder="종목 검색...">
  <div class="count-chip" id="statChips">총 <span>0</span>건</div>
</div>

<div class="feed" id="feedList"></div>

<!-- 페이지네이션 -->
<div id="paginationContainer" class="pagination"></div>

<!-- Add/Edit Modal -->
<div class="overlay" id="overlay" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title"><div class="dot"></div><span id="modalTitle">새 픽 추가</span></div>
      <button class="btn-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>날짜</label><input type="date" id="fDate"></div>
        <div class="form-group"><label>종목명</label><input type="text" id="fName" placeholder="예: 삼성전자, TSLA"></div>
        <div class="form-group"><label>현재가</label><input type="text" id="fPrice" placeholder="예: 166,700 / $359.76" oninput="updatePnlStrip()"></div>
        <div class="form-group"><label>점수 (0~100)</label><div class="score-row"><input type="range" id="fScore" min="0" max="100" value="75" oninput="updateScoreDisplay()"><span class="score-display" id="scoreDisplay">75</span></div></div>
      </div>
      <div class="form-section">보유 포지션</div>
      <div class="form-grid">
        <div class="form-group"><label>평단가</label><input type="text" id="fAvg" placeholder="예: 155,000" oninput="updatePnlStrip()"></div>
        <div class="form-group"><label>수량 (주)</label><input type="number" id="fQty" placeholder="예: 100" min="0" step="1" oninput="updatePnlStrip()"></div>
        <div class="pnl-strip" id="pnlStrip"><span class="pnl-strip-label">수익 미리보기</span><span id="pnlStripVal"></span></div>
      </div>
      <div class="form-section">이동평균선 (MA)</div>
      <div class="ma-grid">
        <div class="form-group"><label>5일</label><input type="text" id="fMa5"></div>
        <div class="form-group"><label>20일</label><input type="text" id="fMa20"></div>
        <div class="form-group"><label>60일</label><input type="text" id="fMa60"></div>
        <div class="form-group"><label>120일</label><input type="text" id="fMa120"></div>
      </div>
      <div class="form-section">매매 정보</div>
      <div class="form-grid">
        <div class="form-group"><label>매수밴드</label><input type="text" id="fBand" placeholder="예: 172k~177k"></div>
        <div class="form-group"><label>손절라인</label><input type="text" id="fStop" placeholder="예: 158,000"></div>
        <div class="form-group"><label>목표가</label><input type="text" id="fTarget" placeholder="예: 225,000"></div>
        <div class="form-group full"><label>비고</label><textarea id="fNote" rows="2" placeholder="분석 메모..."></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="savePick()">저장</button>
    </div>
  </div>
</div>

<!-- 로그인 모달 -->
<div class="login-overlay" id="loginModal" onclick="if(event.target===this) closeLoginModal()">
  <div class="login-modal">
    <div class="icon" style="font-size:48px;margin-bottom:16px;">🔐</div>
    <h3 style="margin-bottom:8px;">로그인이 필요합니다</h3>
    <p style="font-size:12px;color:var(--text3);margin-bottom:24px;">픽을 추가/수정/삭제하려면<br>Google 계정으로 로그인해주세요</p>
    <button class="btn-login" onclick="triggerLogin()">Google 계정으로 로그인</button>
    <button class="btn-cancel" onclick="closeLoginModal()">취소</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="globalPopover">
  <div style="font-size:10px;opacity:.5;margin-bottom:4px;font-family:var(--mono)" id="popoverLabel"></div>
  <div id="popoverContent"></div>
</div>

<script>
const db = firebase.firestore();
const COL = 'picknote';

let picks = [];
let editId = null;
let currentUser = null;
let pendingAction = null;
let pendingData = null;

// 페이지네이션 변수
let currentPage = 1;
const itemsPerPage = 10;

// 동기화 배지
function setSyncStatus(state) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncTxt');
  const map = { loading:'연결 중...', live:'● 실시간', saving:'저장 중...', offline:'오프라인' };
  dot.className = `sync-dot ${state}`;
  txt.className = `sync-txt ${state}`;
  txt.textContent = map[state] || '—';
}

// Firestore 실시간
function initSync() {
  setSyncStatus('loading');
  db.collection(COL).orderBy('date', 'desc').onSnapshot(snap => {
    picks = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    setSyncStatus('live');
    resetToFirstPageAndRender();
  }, err => {
    console.error(err);
    setSyncStatus('offline');
    resetToFirstPageAndRender();
  });
}

// 로그인 관련 함수
function showLoginModal() {
  document.getElementById('loginModal').classList.add('open');
}
function closeLoginModal() {
  document.getElementById('loginModal').classList.remove('open');
  pendingAction = null;
  pendingData = null;
}

async function triggerLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await firebase.auth().signInWithPopup(provider);
    closeLoginModal();
  } catch(e) {
    toast('❌ 로그인 실패: ' + e.message);
  }
}

function formatEmail(email) {
  return email ? email.split('@')[0] : '익명';
}

function updateUIForUser(user) {
  currentUser = user;
  const userEmailSpan = document.getElementById('userEmail');
  if (user) {
    userEmailSpan.textContent = formatEmail(user.email);
    toast(`✅ ${user.email} 님 환영합니다!`);
    
    if (pendingAction) {
      setTimeout(() => {
        if (pendingAction === 'add') {
          openModal();
        } else if (pendingAction === 'edit' && pendingData) {
          openModal(pendingData.id);
        } else if (pendingAction === 'delete' && pendingData) {
          deletePick(pendingData.id);
        }
        pendingAction = null;
        pendingData = null;
      }, 300);
    }
  } else {
    userEmailSpan.textContent = '로그인';
  }
}

// 권한 체크 함수
function checkLoginAndOpenModal(id) {
  if (!currentUser) {
    pendingAction = id ? 'edit' : 'add';
    if (id) pendingData = { id };
    showLoginModal();
    return;
  }
  openModal(id);
}

function checkLoginAndDelete(id) {
  if (!currentUser) {
    pendingAction = 'delete';
    pendingData = { id };
    showLoginModal();
    return;
  }
  deletePick(id);
}

// CRUD
async function savePick() {
  if (!currentUser) return;
  const date = document.getElementById('fDate').value;
  const name = document.getElementById('fName').value.trim();
  if (!date || !name) { toast('날짜와 종목명은 필수입니다.'); return; }
  const entry = {
    date, name,
    price: document.getElementById('fPrice').value.trim(),
    avg: document.getElementById('fAvg').value.trim(),
    qty: document.getElementById('fQty').value.trim(),
    ma5: document.getElementById('fMa5').value.trim(),
    ma20: document.getElementById('fMa20').value.trim(),
    ma60: document.getElementById('fMa60').value.trim(),
    ma120: document.getElementById('fMa120').value.trim(),
    band: document.getElementById('fBand').value.trim(),
    stop: document.getElementById('fStop').value.trim(),
    target: document.getElementById('fTarget').value.trim(),
    score: parseInt(document.getElementById('fScore').value) || 0,
    note: document.getElementById('fNote').value.trim(),
    userId: currentUser.uid,
    userEmail: currentUser.email,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  };
  setSyncStatus('saving');
  try {
    const docId = editId || String(Date.now());
    await db.collection(COL).doc(docId).set(entry);
    closeModal();
    toast('✅ 저장 완료!');
  } catch(err) { toast('❌ 저장 실패: ' + err.message); setSyncStatus('offline'); }
  finally { setSyncStatus('live'); }
}

async function deletePick(id) {
  if (!currentUser) return;
  const pick = picks.find(p => p.id === id);
  if (!pick || pick.userId !== currentUser.uid) {
    toast('⚠️ 본인이 작성한 픽만 삭제할 수 있습니다!');
    return;
  }
  if (!confirm('이 픽을 삭제하시겠습니까?')) return;
  try { await db.collection(COL).doc(id).delete(); toast('🗑️ 삭제 완료'); }
  catch(err) { toast('❌ 삭제 실패: ' + err.message); }
}

  if (!str) return '—';
  if (str.includes('$')) return str;
  let n = parseFloat(str.replace(/[$,원]/g,''));
  if (isNaN(n)) return str;
  if (str.includes('.') && n % 1 !== 0) {
    return n.toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  return Math.round(n).toLocaleString('ko-KR');
}

  let n = parseFloat(s);
  return isNaN(n) ? null : n;
}
