<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대박 행운의 로또 추첨기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #f5c842;
      --gold-glow: #f5c84266;
      --bg: #0b0c14;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.09);
      --text-muted: #7a7d99;
      --c1: #fbc400; /* 1-10 */
      --c2: #4db8ff; /* 11-20 */
      --c3: #ff6b6b; /* 21-30 */
      --c4: #aaaaaa; /* 31-40 */
      --c5: #7ed957; /* 41-45 */
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--bg);
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Starfield ── */
    #stars-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 44px;
    }
    .hero-badge {
      display: inline-block;
      background: linear-gradient(135deg, #f5c842, #e0a800);
      color: #0b0c14;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 100px;
      margin-bottom: 14px;
    }
    .hero h1 {
      font-family: 'Noto Serif KR', serif;
      font-weight: 900;
      font-size: clamp(26px, 5.5vw, 46px);
      line-height: 1.25;
      letter-spacing: -0.5px;
      background: linear-gradient(180deg, #fff 30%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(245,200,66,0.35));
    }
    .hero p {
      margin-top: 10px;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* ── Stage (ball container) ── */
    .stage-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      backdrop-filter: blur(16px);
      padding: 36px 24px 32px;
      margin-bottom: 32px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 24px 64px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.07);
    }

    .stage-label {
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 24px;
    }

    #numbers {
      display: flex;
      gap: clamp(8px, 2vw, 14px);
      justify-content: center;
      min-height: 72px;
      align-items: center;
    }

    .ball {
      width: clamp(48px, 10vw, 66px);
      height: clamp(48px, 10vw, 66px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 900;
      font-size: clamp(18px, 3.8vw, 25px);
      color: white;
      text-shadow: 0 1px 0 rgba(0,0,0,0.25), 0 2px 8px rgba(0,0,0,0.45);
      position: relative;
      opacity: 0;
      transform: translateY(20px) scale(0.7);
      transition: opacity 0.45s cubic-bezier(.34,1.56,.64,1),
                  transform 0.45s cubic-bezier(.34,1.56,.64,1),
                  box-shadow 0.3s ease;
    }
    .ball::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.45), transparent 60%);
      pointer-events: none;
    }
    .ball.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* ── Ball Slots ── */
    .ball-slots {
      display: flex;
      gap: clamp(6px, 1.8vw, 12px);
      justify-content: center;
      align-items: flex-start;
    }
    .ball-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* placeholder shown before first draw */
    .placeholder-ball {
      width: clamp(48px, 10vw, 66px);
      height: clamp(48px, 10vw, 66px);
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 2px dashed rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: rgba(255,255,255,0.15);
      transition: border-color 0.2s, background 0.2s;
    }
    /* highlight placeholder when a number is pinned */
    .ball-slot.pinned .placeholder-ball {
      border-color: rgba(245,200,66,0.5);
      background: rgba(245,200,66,0.08);
    }

    /* ── Slot Select ── */
    .slot-wrap {
      position: relative;
      width: clamp(48px, 10vw, 66px);
    }
    .slot-select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.13);
      border-radius: 10px;
      color: var(--text-muted);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 700;
      font-size: clamp(10px, 2vw, 13px);
      text-align: center;
      padding: 5px 2px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s, color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .slot-select:hover {
      border-color: rgba(245,200,66,0.4);
      background: rgba(245,200,66,0.06);
    }
    .slot-select:focus {
      border-color: var(--gold);
      color: var(--gold);
      box-shadow: 0 0 0 2px rgba(245,200,66,0.15);
    }
    /* Pinned state — has a real value selected */
    .slot-select.is-pinned {
      border-color: rgba(245,200,66,0.6);
      background: rgba(245,200,66,0.10);
      color: var(--gold);
      box-shadow: 0 0 8px rgba(245,200,66,0.2);
    }
    /* Conflict / duplicate error */
    .slot-select.is-error {
      border-color: #ff6b6b !important;
      background: rgba(255,107,107,0.12) !important;
      color: #ff6b6b !important;
      box-shadow: 0 0 8px rgba(255,107,107,0.25) !important;
    }

    /* caret icon inside select wrap */
    .slot-wrap::after {
      content: '▾';
      position: absolute;
      right: 5px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 9px;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* select option dark background */
    .slot-select option {
      background: #1a1c2a;
      color: #e8e8f0;
    }

    /* hint + reset row */
    .slot-hint-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      padding: 0 2px;
    }
    .slot-hint {
      font-size: 11px;
      color: var(--text-muted);
    }
    .slot-hint .hl { color: var(--gold); }
    .reset-btn {
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .reset-btn:hover { color: #ff6b6b; border-color: rgba(255,107,107,0.4); }

    /* error toast */
    .error-toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(255,107,107,0.15);
      border: 1px solid rgba(255,107,107,0.4);
      color: #ff6b6b;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 100px;
      backdrop-filter: blur(12px);
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
    }
    .error-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Draw Button ── */
    .btn-wrap {
      position: relative;
      z-index: 1;
      margin-bottom: 44px;
    }

    #drawBtn {
      position: relative;
      padding: 18px 52px;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 800;
      font-size: 19px;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #f5c842 0%, #e09d00 100%);
      color: #0b0c14;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s;
      box-shadow: 0 0 28px rgba(245,200,66,0.45), 0 8px 24px rgba(0,0,0,0.4);
    }
    #drawBtn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 40% 30%, rgba(255,255,255,0.35), transparent 60%);
      border-radius: inherit;
      pointer-events: none;
    }
    #drawBtn:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 0 44px rgba(245,200,66,0.65), 0 12px 32px rgba(0,0,0,0.45);
    }
    #drawBtn:active:not(:disabled) { transform: translateY(0) scale(0.98); }
    #drawBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }
    .btn-ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transform: scale(0);
      animation: ripple 0.6s linear;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* ── History Section ── */
    .history-section {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 0 4px;
    }
    .history-title {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .history-count {
      font-size: 12px;
      color: var(--gold);
      font-weight: 700;
      background: rgba(245,200,66,0.1);
      border: 1px solid rgba(245,200,66,0.2);
      padding: 3px 10px;
      border-radius: 100px;
    }

    .history-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      margin-bottom: 10px;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      animation: slideIn 0.4s cubic-bezier(.34,1.56,.64,1);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .history-row:hover {
      border-color: rgba(255,255,255,0.14);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .history-index {
      font-size: 11px;
      color: var(--text-muted);
      min-width: 20px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .history-balls {
      display: flex;
      gap: 7px;
      flex: 1;
      justify-content: center;
    }
    .mini-ball {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 900;
      font-size: 13px;
      color: white;
      text-shadow: 0 1px 0 rgba(0,0,0,0.25), 0 2px 6px rgba(0,0,0,0.4);
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .mini-ball::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 28%, rgba(255,255,255,0.4), transparent 55%);
      pointer-events: none;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-16px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ── Confetti burst ── */
    .confetti-piece {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 9999;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(60vh) rotate(720deg); opacity: 0; }
    }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
      font-size: 13px;
      border: 1px dashed var(--border);
      border-radius: 18px;
    }
    .empty-state span { font-size: 28px; display: block; margin-bottom: 8px; }
  </style>
<script src="home-bar.js"></script>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<!-- Hero -->
<div class="hero">
  <div class="hero-badge">🎰 Lucky Draw</div>
  <h1>대박 행운의<br>로또 추첨기</h1>
  <p>1~45 중 행운의 번호 6개를 뽑으세요</p>
</div>

<!-- Stage -->
<div class="stage-wrap">
  <div class="stage-label">✦ 추첨 번호 ✦</div>

  <!-- 6 ball slots -->
  <div class="ball-slots" id="ball-slots">
    <!-- slots injected by JS -->
  </div>

  <div class="slot-hint-row">
    <div class="slot-hint">드롭다운으로 번호를 <span class="hl">고정</span>하면 반자동 추첨</div>
    <button class="reset-btn" onclick="resetAllSlots()">↺ 전체 초기화</button>
  </div>
</div>

<div id="error-toast" class="error-toast"></div>

<!-- Button -->
<div class="btn-wrap">
  <button id="drawBtn" onclick="drawLotto(event)">🍀 운명의 번호 뽑기</button>
</div>

<!-- History -->
<div class="history-section">
  <div class="history-header">
    <div class="history-title">📋 추첨 기록</div>
    <div class="history-count" id="count-badge">0 / 10</div>
  </div>
  <div id="history-list">
    <div class="empty-state">
      <span>🎱</span>
      아직 추첨 기록이 없어요.<br>버튼을 눌러 행운의 번호를 뽑아보세요!
    </div>
  </div>
</div>

<script>
// ── Starfield ──────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function initStars() {
    stars = Array.from({ length: 140 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      speed: Math.random() * 0.004 + 0.002,
      phase: Math.random() * Math.PI * 2,
    }));
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.phase += s.speed;
      ctx.globalAlpha = 0.3 + 0.7 * ((Math.sin(s.phase) + 1) / 2);
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  resize(); initStars(); draw();
  window.addEventListener('resize', () => { resize(); initStars(); });
})();

// ── Helpers ────────────────────────────────────────────────
const historyData = [];

function getBallColor(num) {
  if (num <= 10) return '#fbc400';
  if (num <= 20) return '#4db8ff';
  if (num <= 30) return '#ff6b6b';
  if (num <= 40) return '#aaaaaa';
  return '#7ed957';
}
function getBallShadow(num) {
  if (num <= 10) return '0 0 14px rgba(251,196,0,0.7)';
  if (num <= 20) return '0 0 14px rgba(77,184,255,0.7)';
  if (num <= 30) return '0 0 14px rgba(255,107,107,0.7)';
  if (num <= 40) return '0 0 14px rgba(170,170,170,0.5)';
  return '0 0 14px rgba(126,217,87,0.7)';
}

function showToast(msg) {
  const t = document.getElementById('error-toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

function spawnConfetti(x, y) {
  const colors = ['#f5c842','#ff6b6b','#4db8ff','#7ed957','#fff'];
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${x+(Math.random()-.5)*160}px;top:${y}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation:confettiFall ${0.8+Math.random()*0.8}s ease-out ${Math.random()*0.3}s forwards;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1600);
  }
}

// ── Build Slots ────────────────────────────────────────────
function buildSlots() {
  const wrap = document.getElementById('ball-slots');
  wrap.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const slot = document.createElement('div');
    slot.className = 'ball-slot';
    slot.dataset.idx = i;

    // Placeholder ball
    const ph = document.createElement('div');
    ph.className = 'placeholder-ball';
    ph.textContent = '?';
    ph.id = `ph-${i}`;
    slot.appendChild(ph);

    // Select wrap
    const sw = document.createElement('div');
    sw.className = 'slot-wrap';

    const sel = document.createElement('select');
    sel.className = 'slot-select';
    sel.id = `sel-${i}`;

    // "자동" option
    const autoOpt = document.createElement('option');
    autoOpt.value = '';
    autoOpt.textContent = '자동';
    sel.appendChild(autoOpt);

    // 1~45 options
    for (let n = 1; n <= 45; n++) {
      const opt = document.createElement('option');
      opt.value = n;
      opt.textContent = n;
      sel.appendChild(opt);
    }

    sel.addEventListener('change', () => onSlotChange(i));
    sw.appendChild(sel);
    slot.appendChild(sw);
    wrap.appendChild(slot);
  }
}

function onSlotChange(idx) {
  const sel = document.getElementById(`sel-${idx}`);
  const slot = sel.closest('.ball-slot');
  const val = sel.value;

  // Update pinned state
  sel.classList.toggle('is-pinned', val !== '');
  slot.classList.toggle('pinned', val !== '');

  // Clear error states then re-validate
  clearErrors();
  validatePinnedNums();
}

function clearErrors() {
  document.querySelectorAll('.slot-select').forEach(s => s.classList.remove('is-error'));
}

function validatePinnedNums() {
  const vals = getPinnedValues();
  // Find duplicates
  const seen = {};
  vals.forEach(({ idx, num }) => {
    if (!seen[num]) seen[num] = [];
    seen[num].push(idx);
  });
  let hasDup = false;
  Object.values(seen).forEach(idxList => {
    if (idxList.length > 1) {
      hasDup = true;
      idxList.forEach(i => document.getElementById(`sel-${i}`).classList.add('is-error'));
    }
  });
  return !hasDup;
}

function getPinnedValues() {
  const result = [];
  for (let i = 0; i < 6; i++) {
    const sel = document.getElementById(`sel-${i}`);
    if (sel.value !== '') result.push({ idx: i, num: parseInt(sel.value) });
  }
  return result;
}

function resetAllSlots() {
  for (let i = 0; i < 6; i++) {
    const sel = document.getElementById(`sel-${i}`);
    sel.value = '';
    sel.classList.remove('is-pinned', 'is-error');
    document.getElementById(`ph-${i}`).closest('.ball-slot').classList.remove('pinned');
    // Reset ball display to placeholder
    const ph = document.getElementById(`ph-${i}`);
    ph.className = 'placeholder-ball';
    ph.textContent = '?';
    ph.style.cssText = '';
  }
}

// ── Draw Logic ─────────────────────────────────────────────
function drawLotto(e) {
  const btn = document.getElementById('drawBtn');

  // Ripple
  if (e) {
    const rect = btn.getBoundingClientRect();
    const rip = document.createElement('span');
    rip.className = 'btn-ripple';
    rip.style.cssText = `width:${btn.offsetWidth}px;height:${btn.offsetWidth}px;left:${e.clientX-rect.left-btn.offsetWidth/2}px;top:${e.clientY-rect.top-btn.offsetWidth/2}px`;
    btn.appendChild(rip);
    setTimeout(() => rip.remove(), 650);
  }

  // Validate no duplicate pinned numbers
  clearErrors();
  if (!validatePinnedNums()) {
    showToast('⚠️ 중복된 고정 번호가 있어요!');
    return;
  }

  const pinned = getPinnedValues(); // [{idx, num}, ...]
  const pinnedNums = pinned.map(p => p.num);
  const autoCount = 6 - pinned.length;

  // Generate random numbers for auto slots
  const autoNums = [];
  while (autoNums.length < autoCount) {
    const r = Math.floor(Math.random() * 45) + 1;
    if (!pinnedNums.includes(r) && !autoNums.includes(r)) autoNums.push(r);
  }

  // Build final 6-number array per slot order
  const finalNums = new Array(6);
  pinned.forEach(p => { finalNums[p.idx] = p.num; });
  let autoIdx = 0;
  for (let i = 0; i < 6; i++) {
    if (finalNums[i] === undefined) { finalNums[i] = autoNums[autoIdx++]; }
  }

  btn.disabled = true;
  btn.textContent = '🎲 추첨 중…';

  // Animate each slot
  let completedCount = 0;

  finalNums.forEach((num, slotIdx) => {
    const isFixed = pinnedNums.includes(num) && pinned.some(p => p.idx === slotIdx);
    const delay = slotIdx * 750;

    setTimeout(() => {
      const ph = document.getElementById(`ph-${slotIdx}`);

      // Swap placeholder → ball
      const ball = document.createElement('div');
      ball.className = 'ball';
      ball.textContent = num;
      ball.style.backgroundColor = getBallColor(num);
      ball.style.boxShadow = getBallShadow(num);

      // Pinned balls get a golden ring
      if (isFixed) {
        ball.style.outline = '3px solid rgba(245,200,66,0.75)';
        ball.style.outlineOffset = '3px';
      }

      ph.replaceWith(ball);
      ball.id = `ph-${slotIdx}`; // keep same id for reset

      requestAnimationFrame(() => {
        setTimeout(() => ball.classList.add('show'), 10);
      });

      completedCount++;
      if (completedCount === 6) {
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = '🍀 운명의 번호 뽑기';
          updateHistory(finalNums);
          const r = btn.getBoundingClientRect();
          spawnConfetti(r.left + r.width / 2, r.top);
        }, 500);
      }
    }, delay);
  });
}

// ── History ────────────────────────────────────────────────
function updateHistory(nums) {
  historyData.unshift([...nums]);
  if (historyData.length > 10) historyData.pop();
  document.getElementById('count-badge').textContent = `${historyData.length} / 10`;

  const list = document.getElementById('history-list');
  list.innerHTML = '';

  historyData.forEach((set, i) => {
    const row = document.createElement('div');
    row.className = 'history-row';
    row.style.animationDelay = i === 0 ? '0ms' : `${i * 30}ms`;

    const idx = document.createElement('div');
    idx.className = 'history-index';
    idx.textContent = `#${i + 1}`;
    row.appendChild(idx);

    const ballWrap = document.createElement('div');
    ballWrap.className = 'history-balls';
    // Sort for display
    [...set].sort((a,b) => a-b).forEach(n => {
      const mini = document.createElement('div');
      mini.className = 'mini-ball';
      mini.style.backgroundColor = getBallColor(n);
      mini.style.boxShadow = getBallShadow(n);
      mini.textContent = n;
      ballWrap.appendChild(mini);
    });

    row.appendChild(ballWrap);
    list.appendChild(row);
  });
}

// ── Init ───────────────────────────────────────────────────
buildSlots();
</script>
