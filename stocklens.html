<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>StockLens</title>
<meta name="theme-color" content="#07090f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockLens">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#07090f;--sf:#111727;--card:#161e30;--card2:#1c2540;--bd:#1d2a45;--bd2:#263554;--gold:#f5b731;--green:#05d89e;--red:#ff4d72;--blue:#5ba3ff;--purple:#a78bfa;--tx:#e2e8f8;--tx2:#94a3c0;--tx3:#546080;--num:'DM Mono',monospace;--kr:'Noto Sans KR',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--tx);font-family:var(--kr);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.hd{position:sticky;top:0;z-index:100;background:rgba(7,9,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#f5b731,#ff8c42);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 12px rgba(245,183,49,.35)}
.logo-txt{font-family:var(--num);font-size:18px;font-weight:500;letter-spacing:-.3px}
.logo-txt span{color:var(--gold)}
.hbtns{display:flex;gap:8px}
.hbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--tx2);transition:all .2s}
.hbtn:hover{border-color:var(--gold);color:var(--gold)}
.hbtn:disabled{opacity:.4;pointer-events:none}
/* Firebase 동기화 뱃지 */
.sync-badge{display:flex;align-items:center;gap:5px;font-size:10px;font-family:var(--num);color:var(--tx3);background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:20px;padding:3px 10px;white-space:nowrap}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .3s}
.sync-dot.live{background:#05d89e;box-shadow:0 0 6px #05d89e;animation:sp 3s infinite}
.sync-dot.loading{background:#f5b731;box-shadow:0 0 6px #f5b731;animation:sp .8s infinite}
.sync-dot.offline{background:#ff4d72;box-shadow:0 0 6px #ff4d72}
.sync-dot.saving{background:#5ba3ff;box-shadow:0 0 6px #5ba3ff;animation:sp .4s infinite}
@keyframes sp{0%,100%{opacity:1}50%{opacity:.3}}
.sync-txt.live{color:#05d89e}.sync-txt.loading{color:#f5b731}.sync-txt.offline{color:#ff4d72}.sync-txt.saving{color:#5ba3ff}
.summary{padding:18px 18px 0}
.hero{background:linear-gradient(135deg,#0e1830,#0c1422);border:1px solid var(--bd);border-radius:18px;padding:20px;margin-bottom:10px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;right:-40px;width:220px;height:220px;background:radial-gradient(circle,rgba(245,183,49,.09),transparent 70%);pointer-events:none}
.hero-lbl{font-size:12px;color:var(--tx3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px}
.hero-val{font-family:var(--num);font-size:32px;font-weight:500;letter-spacing:-1.5px;line-height:1}
.hero-sub{font-size:14px;margin-top:7px;color:var(--tx3)}
.chips{display:flex;gap:8px;margin-top:14px}
.chip{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--bd2);border-radius:10px;padding:10px 12px}
.chip-lbl{font-size:12px;color:var(--tx3);margin-bottom:3px}
.chip-val{font-family:var(--num);font-size:16px;font-weight:500}
.fxbar{display:flex;align-items:center;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:11px 14px;margin-bottom:14px}
.fx-item{flex:1}
.fx-lbl{font-size:12px;color:var(--tx3);margin-bottom:2px}
.fx-val{font-family:var(--num);font-size:16px;font-weight:500;color:var(--gold)}
.fx-time{font-family:var(--num);font-size:12px;color:var(--tx3)}
.fx-div{width:1px;height:30px;background:var(--bd);margin:0 14px;flex-shrink:0}
.fx-btn{background:none;border:1px solid var(--bd2);color:var(--tx3);border-radius:8px;padding:8px 13px;font-size:13px;cursor:pointer;font-family:var(--kr);display:flex;align-items:center;gap:5px;transition:all .2s;flex-shrink:0;white-space:nowrap}
.fx-btn:hover{border-color:var(--gold);color:var(--gold)}
.fx-btn.busy{opacity:.4;pointer-events:none}
.tabs{display:flex;gap:6px;padding:0 18px 12px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 18px;border-radius:20px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;background:none;color:var(--tx3);font-family:var(--kr);transition:all .2s}
.tab.on{background:var(--gold);color:#07090f;font-weight:700}
.tab:not(.on):hover{background:var(--card);border-color:var(--bd);color:var(--tx2)}
.list-wrap{padding:0 18px 120px}
.list-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.list-count{font-size:14px;color:var(--tx3)}
.sort-btn{font-size:13px;color:var(--tx3);background:none;border:none;cursor:pointer;font-family:var(--kr)}
.sort-btn:hover{color:var(--gold)}
.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:background .2s,border-color .2s,transform .15s;animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card:hover{background:var(--card2);border-color:var(--bd2)}
.card:active{transform:scale(.99)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.card-left{flex:1;min-width:0}
.card-badges{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.b-ticker{font-family:var(--num);font-size:13px;font-weight:500;background:rgba(91,163,255,.12);border:1px solid rgba(91,163,255,.2);color:var(--blue);border-radius:6px;padding:3px 8px}
.b-mkt{font-size:12px;padding:3px 7px;border-radius:5px}
.b-mkt.us{color:var(--blue);background:rgba(91,163,255,.12);border:1px solid rgba(91,163,255,.15)}
.b-mkt.kr{color:var(--purple);background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.15)}
.b-broker{font-size:12px;color:var(--tx3);background:var(--sf);padding:3px 7px;border-radius:5px;border:1px solid var(--bd)}
.card-name{font-size:16px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-memo{font-size:12px;color:var(--tx3);margin-top:3px}
.card-pnl{text-align:right;flex-shrink:0;margin-left:12px}
.pnl-num{font-family:var(--num);font-size:17px;font-weight:500;white-space:nowrap}
.pnl-pct{font-family:var(--num);font-size:13px;margin-top:2px}
.card-bot{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding-top:12px;border-top:1px solid var(--bd)}
.s-lbl{font-size:12px;color:var(--tx3);margin-bottom:3px}
.s-val{font-family:var(--num);font-size:14px;color:var(--tx2)}
.bar-wrap{margin-top:7px}
.bar-track{height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .5s}
.pos{color:var(--green)}.neg{color:var(--red)}
.empty{text-align:center;padding:60px 32px}
.empty-ico{font-size:52px;margin-bottom:14px;opacity:.4}
.empty-t{font-size:17px;font-weight:500;color:var(--tx2);margin-bottom:7px}
.empty-d{font-size:14px;color:var(--tx3);line-height:1.7}
.fab{position:fixed;bottom:28px;right:22px;z-index:60;width:58px;height:58px;border-radius:18px;background:linear-gradient(140deg,var(--gold),#e89320);border:none;color:#07090f;font-size:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 28px rgba(245,183,49,.4);transition:all .25s}
.fab:hover{transform:scale(1.06) translateY(-2px)}
.fab:active{transform:scale(.95)}
.ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s}
.ov.open{opacity:1;pointer-events:all}
.modal{background:var(--sf);border:1px solid var(--bd);border-radius:22px 22px 0 0;padding:0 18px 44px;width:100%;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.ov.open .modal{transform:translateY(0)}
.m-sticky{position:sticky;top:0;background:var(--sf);padding:16px 0 14px;z-index:10;border-bottom:1px solid var(--bd);margin-bottom:18px}
.m-handle{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 14px}
.m-title{font-size:20px;font-weight:700}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;font-family:var(--kr)}
.fi,.fs{width:100%;background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;color:var(--tx);font-size:15px;font-family:var(--kr);outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.fi:focus,.fs:focus{border-color:var(--gold)}
.fi::placeholder{color:var(--tx3)}
.fs option{background:var(--card);color:var(--tx)}
.fhint{font-size:12px;color:var(--tx3);margin-top:4px}
.brow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.brow3{grid-template-columns:1fr 1fr 1fr}
.btn{padding:14px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:var(--kr)}
.btn-gold{background:linear-gradient(135deg,var(--gold),#e89320);color:#07090f}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,183,49,.35)}
.btn-ghost{background:var(--card);color:var(--tx2);border:1px solid var(--bd)}
.btn-ghost:hover{border-color:var(--bd2)}
.btn-red{background:rgba(255,77,114,.12);color:var(--red);border:1px solid rgba(255,77,114,.25)}
.det-sec{margin-bottom:16px}
.det-t{font-size:12px;color:var(--tx3);letter-spacing:1.2px;text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid var(--bd);margin-bottom:10px}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.det-lbl{font-size:14px;color:var(--tx3)}
.det-val{font-family:var(--num);font-size:14px;color:var(--tx2)}
.det-hero{background:var(--card);border:1px solid var(--bd);border-radius:13px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.det-price{font-family:var(--num);font-size:26px;font-weight:500}
.adj-box{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:14px}
.adj-lbl{font-size:12px;color:var(--tx3);margin-bottom:8px;letter-spacing:.5px}
.adj-row{display:flex;align-items:center;gap:8px}
.adj-step{width:44px;height:44px;border-radius:10px;border:1px solid var(--bd2);background:var(--card2);color:var(--tx);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.adj-step:hover{border-color:var(--gold);color:var(--gold)}
.adj-num{flex:1;text-align:center;font-family:var(--num);font-size:18px;font-weight:600;padding:10px 6px;border-radius:10px;border:1px solid var(--bd2);background:var(--bg);color:var(--tx);outline:none}
.adj-num:focus{border-color:var(--gold)}
.fetch-btn{width:100%;background:var(--card);border:1px dashed var(--bd2);border-radius:10px;padding:13px;color:var(--tx3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;font-family:var(--kr);margin-bottom:10px}
.fetch-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(245,183,49,.08)}
.fetch-btn.busy{opacity:.4;pointer-events:none}
.manual-row{display:flex;gap:8px;margin-bottom:14px}
.manual-row .fi{flex:1}
.apply-btn{background:var(--card2);border:1px solid var(--bd2);border-radius:10px;padding:0 16px;font-size:14px;color:var(--tx2);cursor:pointer;font-family:var(--kr);white-space:nowrap;transition:all .2s}
.apply-btn:hover{border-color:var(--gold);color:var(--gold)}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--card2);border:1px solid var(--bd2);border-radius:10px;padding:10px 18px;font-size:14px;color:var(--tx2);opacity:0;transition:all .3s;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* CONFIRM DIALOG */
.cfm-ov{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s}
.cfm-ov.open{opacity:1;pointer-events:all}
.cfm-box{background:var(--sf);border:1px solid var(--bd2);border-radius:18px;padding:26px 22px;width:100%;max-width:300px;transform:scale(.92);transition:transform .2s;text-align:center}
.cfm-ov.open .cfm-box{transform:scale(1)}
.cfm-ico{font-size:38px;margin-bottom:12px}
.cfm-msg{font-size:16px;font-weight:500;line-height:1.55;margin-bottom:22px;color:var(--tx)}
.cfm-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:520px){.modal{max-width:520px;margin:0 auto}}
</style>
</head>
<body>

<header class="hd">
  <div class="logo">
    <div class="logo-icon">📈</div>
    <span class="logo-txt">Stock<span>Lens</span></span>
  </div>
  <div class="hbtns">
    <div class="sync-badge" id="syncBadge"><div class="sync-dot loading" id="syncDot"></div><span class="sync-txt loading" id="syncTxt">연결 중...</span></div>
    <button class="hbtn" id="btn-refresh" onclick="refreshAll()" title="전체 현재가 갱신"><span id="refresh-icon">↻</span></button>
    <button class="hbtn" onclick="exportCSV()" title="CSV 내보내기">⬇</button>
  </div>
</header>

<section class="summary">
  <div class="hero">
    <div class="hero-lbl">총 평가금액 (KRW)</div>
    <div class="hero-val" id="total-val">—</div>
    <div class="hero-sub" id="total-sub">종목을 추가하고 현재가를 업데이트해주세요</div>
    <div class="chips">
      <div class="chip"><div class="chip-lbl">총 손익</div><div class="chip-val" id="total-pnl">—</div></div>
      <div class="chip"><div class="chip-lbl">수익률</div><div class="chip-val" id="total-pct">—</div></div>
      <div class="chip"><div class="chip-lbl">종목 · 증권사</div><div class="chip-val" id="total-counts">0 · 0</div></div>
    </div>
  </div>
  <div class="fxbar">
    <div class="fx-item"><div class="fx-lbl">USD / KRW</div><div class="fx-val" id="fx-display">—</div></div>
    <div class="fx-div"></div>
    <div class="fx-item"><div class="fx-lbl">업데이트</div><div class="fx-time" id="fx-time">—</div></div>
    <div class="fx-div"></div>
    <button class="fx-btn" id="fx-btn" onclick="doFetchFX()"><span id="fx-icon">↺</span> 환율 갱신</button>
  </div>
</section>

<div class="tabs">
  <button class="tab on" onclick="setTab('all',this)">전체</button>
  <button class="tab" onclick="setTab('KR',this)">🇰🇷 국내</button>
  <button class="tab" onclick="setTab('US',this)">🇺🇸 해외</button>
</div>

<div class="list-wrap">
  <div class="list-head">
    <span class="list-count" id="list-count">종목 0개</span>
    <button class="sort-btn" onclick="cycleSort()">정렬: <span id="sort-lbl">수익률순</span> ↕</button>
  </div>
  <div id="list"></div>
</div>

<button class="fab" onclick="openAdd()">＋</button>
<div class="toast" id="toast"></div>

<!-- ADD/EDIT OVERLAY -->
<div class="ov" id="ov-add" onclick="bgClose(event,'ov-add')">
  <div class="modal">
    <div class="m-sticky">
      <div class="m-handle"></div>
      <div class="m-title" id="add-title">종목 추가</div>
    </div>
    <div class="f2">
      <div class="fg">
        <label class="fl">시장</label>
        <select class="fs" id="f-market" onchange="onMarketChange()">
          <option value="KR">🇰🇷 국내 (KRW)</option>
          <option value="US">🇺🇸 해외 (USD)</option>
        </select>
      </div>
      <div class="fg" id="wrap-exch">
        <label class="fl">거래소</label>
        <select class="fs" id="f-exch">
          <option value="KS">코스피 (KS)</option>
          <option value="KQ">코스닥 (KQ)</option>
        </select>
      </div>
      <div class="fg" id="wrap-buyfx" style="display:none">
        <label class="fl">매수 당시 환율 (₩)</label>
        <input class="fi" type="number" id="f-buyfx" placeholder="예: 1350.00" step="any">
      </div>
    </div>
    <div class="f2">
      <div class="fg">
        <label class="fl">증권사</label>
        <select class="fs" id="f-broker" onchange="onBrokerChange()">
          <option>토스증권</option><option>메리츠증권</option><option>키움증권</option>
          <option>삼성증권</option><option>NH투자증권</option><option>미래에셋증권</option>
          <option>한국투자증권</option><option>KB증권</option><option>신한투자증권</option>
          <option>하나증권</option><option>대신증권</option><option>카카오페이증권</option>
          <option value="__custom__">직접입력</option>
        </select>
      </div>
      <div class="fg" id="wrap-broker-custom" style="display:none">
        <label class="fl">증권사명</label>
        <input class="fi" type="text" id="f-broker-custom" placeholder="증권사명 직접입력">
      </div>
    </div>
    <div class="f2">
      <div class="fg">
        <label class="fl">티커 / 종목코드</label>
        <input class="fi" type="text" id="f-ticker" placeholder="예: 005930, AAPL" oninput="this.value=this.value.toUpperCase().replace(/\.(KS|KQ|T|L|AX)$/i,'')">
        <div class="fhint" id="ticker-hint">숫자만 입력 — .KS/.KQ 불필요</div>
      </div>
      <div class="fg">
        <label class="fl">종목명</label>
        <input class="fi" type="text" id="f-name" placeholder="예: 삼성전자, 애플">
      </div>
    </div>
    <div class="f2">
      <div class="fg">
        <label class="fl">매수일</label>
        <input class="fi" type="date" id="f-date">
      </div>
      <div class="fg">
        <label class="fl">수량</label>
        <input class="fi" type="number" id="f-qty" placeholder="0" min="0" step="any">
      </div>
    </div>
    <div class="fg">
      <label class="fl" id="f-price-lbl">매수가 (KRW)</label>
      <input class="fi" type="number" id="f-price" placeholder="0" min="0" step="any">
    </div>
    <div class="fg">
      <label class="fl">메모 (선택)</label>
      <input class="fi" type="text" id="f-memo" placeholder="예: 분할매수 1차, 적립식">
    </div>
    <div class="brow">
      <button class="btn btn-ghost" onclick="closeOv('ov-add')">취소</button>

<script>
/* ══════════════════════════════════════════════
   Firebase 초기화
══════════════════════════════════════════════ */
firebase.initializeApp({
  apiKey:            "AIzaSyCIQKMbhnQY2sIdDthFrm-dznnVMs5pb30",
  authDomain:        "my-bp-tracker-3d595.firebaseapp.com",
  projectId:         "my-bp-tracker-3d595",
  storageBucket:     "my-bp-tracker-3d595.firebasestorage.app",
  messagingSenderId: "1016360206319",
  appId:             "1:1016360206319:web:5f5df2e2c45b30694a401a"
});
var db  = firebase.firestore();
var COL = 'stocklens';   // picknote, bloodPressure 와 별도 컬렉션

/* ── 상태 ── */
var H     = [];
var fx    = parseFloat(localStorage.getItem('sl-fx')||'0');  // 환율은 로컬 유지
var fxT   = localStorage.getItem('sl-fxt')||'';
var tab   = 'all';
var sortM = 'pnl';
var editId= null;
var cfmCB = null;
var _syncing = false;  // 자체 저장 중 onSnapshot 무시 방지

/* ── 동기화 뱃지 ── */
function setSyncStatus(state){
  var dot=document.getElementById('syncDot'), txt=document.getElementById('syncTxt');
  var labels={connecting:'연결 중...',live:'● Firebase 실시간',saving:'저장 중...',offline:'오프라인 (캐시)'};
  dot.className='sync-dot '+state;
  txt.className='sync-txt '+state;
  txt.textContent=labels[state]||labels.offline;
}

/* ── Firestore 실시간 리스너 ── */
function initSync(){
  setSyncStatus('connecting');
  db.collection(COL).onSnapshot(function(snap){
    if(_syncing) return;  // 자체 저장 직후 무시
    H = snap.docs.map(function(doc){ return Object.assign({id:doc.id},doc.data()); });
    // 로컬 캐시 갱신
    try{ localStorage.setItem('sl-h', JSON.stringify(H)); }catch(e){}
    setSyncStatus('live');
    renderAll();
    if(fx) showFX(fx,fxT);
  }, function(err){
    console.error('[Firestore]', err);
    setSyncStatus('offline');
    // 로컬 캐시 폴백
    try{ H = JSON.parse(localStorage.getItem('sl-h')||'[]'); }catch(e){ H=[]; }
    renderAll();
  });
}

/* ── persist: H 배열 전체를 Firestore에 배치 저장 ── */
async function persist(){
  _syncing = true;
  setSyncStatus('saving');
  try{
    var batch = db.batch();
    // 기존 문서 목록과 비교해 삭제/추가/수정 처리
    var currentIds = H.map(function(h){ return h.id; });

    H.forEach(function(h){
      var ref = db.collection(COL).doc(h.id);
      var data = Object.assign({}, h);
      delete data.id;  // id는 문서 키로 사용
      batch.set(ref, data);
    });

    await batch.commit();
    // 로컬 캐시도 갱신
    try{ localStorage.setItem('sl-h', JSON.stringify(H)); }catch(e){}
    setSyncStatus('live');
  }catch(err){
    console.error('persist:', err);
    setSyncStatus('offline');
    // 오프라인 시 로컬에만 저장
    try{ localStorage.setItem('sl-h', JSON.stringify(H)); }catch(e){}
    toast('⚠️ 오프라인 — 로컬에 임시 저장됨');
  }finally{
    setTimeout(function(){ _syncing = false; }, 800);
  }
}

/* ── 삭제: Firestore 문서 직접 삭제 ── */
async function persistDelete(id){
  _syncing = true;
  setSyncStatus('saving');
  try{
    await db.collection(COL).doc(id).delete();
    try{ localStorage.setItem('sl-h', JSON.stringify(H)); }catch(e){}
    setSyncStatus('live');
  }catch(err){
    setSyncStatus('offline');
    toast('⚠️ 삭제 실패: '+err.message);
  }finally{
    setTimeout(function(){ _syncing = false; }, 800);
  }
}

document.addEventListener('DOMContentLoaded',function(){

function todayStr(){return new Date().toISOString().split('T')[0];}

function pwaInit(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register(URL.createObjectURL(new Blob(['self.addEventListener("fetch",function(){});'],{type:'application/javascript'}))).catch(function(){});
  }
  var m={name:'StockLens',short_name:'StockLens',start_url:location.href,display:'standalone',background_color:'#07090f',theme_color:'#07090f',icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23f5b731'/%3E%3Ctext y='.9em' font-size='72'%3E📈%3C/text%3E%3C/svg%3E",sizes:'192x192',type:'image/svg+xml'}]};
  var l=document.createElement('link');l.rel='manifest';l.href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));document.head.appendChild(l);
}

/* CONFIRM (native confirm 대체) */
function cfmShow(ico,msg,okLabel,okCls,cb){
  cfmCB=cb;
  document.getElementById('cfm-ico').textContent=ico;
  document.getElementById('cfm-msg').textContent=msg;
  var ok=document.getElementById('cfm-ok');
  ok.textContent=okLabel; ok.className='btn '+okCls;
  document.getElementById('cfm-ov').classList.add('open');
}
function cfmOK(){document.getElementById('cfm-ov').classList.remove('open'); if(cfmCB) cfmCB(); cfmCB=null;}
function cfmCancel(){document.getElementById('cfm-ov').classList.remove('open'); cfmCB=null;}

/* FORMATTERS */
function fKRW(n){if(n==null||isNaN(n))return'—';var a=Math.abs(n),s=n<0?'-':'';if(a>=1e8)return s+(a/1e8).toFixed(2)+'억원';return s+Math.round(a).toLocaleString('ko-KR')+'원';}
function fNum(n,d){d=d===undefined?2:d;if(n==null||isNaN(n))return'—';return n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fP(h,p){if(p==null||isNaN(p))return'—';return h.market==='US'?'$'+fNum(p):fKRW(p);}
function esc(s){return String(s||'').replace(/[<>&"]/g,function(c){return{'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];});}

/* CALC */
function buyKRW(h){return h.market==='US'?h.buyPrice*h.qty*(h.buyFX||fx||1):h.buyPrice*h.qty;}
function curKRW(h){if(!h.curPrice)return null;return h.market==='US'?h.curPrice*h.qty*(fx||h.buyFX||1):h.curPrice*h.qty;}
function calcPnl(h){var bk=buyKRW(h),ck=curKRW(h);if(!ck)return null;var d=ck-bk,pct=bk>0?d/bk*100:0;return{d:d,pct:pct,bk:bk,ck:ck};}

/* SUMMARY */
function updateSummary(){
  var priced=H.filter(function(h){return h.curPrice;});
  var bset=new Set(); H.forEach(function(h){(h.brokers||[h.broker]).forEach(function(b){bset.add(b);});});
  document.getElementById('total-counts').textContent=H.length+' · '+bset.size;
  if(!priced.length){
    document.getElementById('total-val').textContent=H.length?fKRW(H.reduce(function(s,h){return s+buyKRW(h);},0)):'—';
    ['total-pnl','total-pct'].forEach(function(id){document.getElementById(id).textContent='—';document.getElementById(id).className='chip-val';});
    var sub=document.getElementById('total-sub');sub.textContent=H.length?'현재가를 업데이트하면 수익/손실이 표시됩니다':'+ 버튼을 눌러 첫 종목을 추가해보세요';sub.className='hero-sub';
    return;
  }
  var tB=priced.reduce(function(s,h){return s+buyKRW(h);},0);
  var tC=priced.reduce(function(s,h){return s+(curKRW(h)||0);},0);
  var d=tC-tB,pct=tB>0?d/tB*100:0,up=d>=0,cls='chip-val '+(up?'pos':'neg');
  document.getElementById('total-val').textContent=fKRW(tC);
  document.getElementById('total-pnl').textContent=(up?'+':'')+fKRW(d);document.getElementById('total-pnl').className=cls;
  document.getElementById('total-pct').textContent=(up?'+':'')+pct.toFixed(2)+'%';document.getElementById('total-pct').className=cls;
  var sub=document.getElementById('total-sub');sub.textContent=(up?'▲ 수익 ':'▼ 손실 ')+Math.abs(pct).toFixed(2)+'% · 매수금액 '+fKRW(tB);sub.className='hero-sub '+(up?'pos':'neg');
}

/* RENDER LIST */
function renderList(){
  var list=H.filter(function(h){return tab==='all'||h.market===tab;});
  list=list.slice().sort(function(a,b){
    if(sortM==='name')return a.name.localeCompare(b.name,'ko');
    if(sortM==='broker')return(a.brokers||[a.broker])[0].localeCompare((b.brokers||[b.broker])[0],'ko');
    if(sortM==='value')return(curKRW(b)||buyKRW(b))-(curKRW(a)||buyKRW(a));
    var pa=calcPnl(a),pb=calcPnl(b);return(pb?pb.pct:-9999)-(pa?pa.pct:-9999);
  });
  document.getElementById('list-count').textContent='종목 '+list.length+'개';
  var el=document.getElementById('list');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-ico">📊</div><div class="empty-t">보유 종목이 없습니다</div><div class="empty-d">아래 ＋ 버튼으로<br>첫 번째 종목을 추가해보세요</div></div>';return;}
  el.innerHTML=list.map(function(h,i){
    var p=calcPnl(h),cls=p?(p.d>=0?'pos':'neg'):'',sgn=p?(p.d>=0?'+':''):'';
    var bw=p?Math.min(Math.abs(p.pct),50)*2:0,bc=p?(p.d>=0?'var(--green)':'var(--red)'):'var(--bd2)';
    var bl=esc((h.brokers||[h.broker]).join(' · '));
    return '<div class="card" onclick="openDet(\''+h.id+'\')" style="animation-delay:'+i*.04+'s"><div class="card-top"><div class="card-left"><div class="card-badges"><span class="b-ticker">'+esc(h.ticker)+'</span><span class="b-mkt '+h.market.toLowerCase()+'">'+(h.market==='US'?'🇺🇸 US':'🇰🇷 KR')+'</span><span class="b-broker">'+bl+'</span></div><div class="card-name">'+esc(h.name)+'</div>'+(h.memo?'<div class="card-memo">📝 '+esc(h.memo)+'</div>':'')+'</div><div class="card-pnl">'+(p?'<div class="pnl-num '+cls+'">'+sgn+fKRW(p.d)+'</div><div class="pnl-pct '+cls+'">'+sgn+p.pct.toFixed(2)+'%</div>':'<div style="font-size:13px;color:var(--tx3)">현재가 없음</div>')+'</div></div>'+(p?'<div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:'+bw+'%;background:'+bc+'"></div></div></div>':'')+'<div class="card-bot"><div><div class="s-lbl">수량</div><div class="s-val">'+h.qty.toLocaleString()+'</div></div><div><div class="s-lbl">평균매수가</div><div class="s-val">'+fP(h,h.buyPrice)+'</div></div><div><div class="s-lbl">'+(p?'현재가':'매수금액')+'</div><div class="s-val">'+(p?fP(h,h.curPrice):fKRW(buyKRW(h)))+'</div></div></div></div>';
  }).join('');
}
function renderAll(){updateSummary();renderList();}

/* TABS / SORT */
function setTab(t,el){tab=t;document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});el.classList.add('on');renderList();}
function cycleSort(){var m=['pnl','value','name','broker'],l={pnl:'수익률순',value:'평가액순',name:'이름순',broker:'증권사순'};sortM=m[(m.indexOf(sortM)+1)%m.length];document.getElementById('sort-lbl').textContent=l[sortM];renderList();}

/* SAVE */
function doSave(){
  var market=document.getElementById('f-market').value;
  var exchange=market==='KR'?document.getElementById('f-exch').value:null;
  var bSel=document.getElementById('f-broker').value;
  var broker=bSel==='__custom__'?document.getElementById('f-broker-custom').value.trim():bSel;
  /* 티커에서 .KS/.KQ 등 suffix 자동 제거 */
  var ticker=document.getElementById('f-ticker').value.trim().toUpperCase().replace(/\.(KS|KQ|T|L|AX|HK)$/,'');
  var name=document.getElementById('f-name').value.trim();
  var date=document.getElementById('f-date').value;
  var qty=parseFloat(document.getElementById('f-qty').value);
  var price=parseFloat(document.getElementById('f-price').value);
  var buyfx=parseFloat(document.getElementById('f-buyfx').value);
  var memo=document.getElementById('f-memo').value.trim();
  if(!broker||!ticker||!name||!date||!(qty>0)||!(price>0)){toast('⚠️ 필수 항목을 모두 입력해주세요');return;}
  if(market==='US'&&!(buyfx>0)){toast('⚠️ 해외주식은 매수 당시 환율을 입력해주세요');return;}
  if(editId){
    var idx=H.findIndex(function(x){return x.id===editId;}),prev=H[idx];
    H[idx]={id:editId,market:market,exchange:exchange,broker:broker,brokers:prev.brokers||[prev.broker||broker],ticker:ticker,name:name,date:date,lastBuyDate:date,qty:qty,buyPrice:price,buyFX:market==='US'?buyfx:null,memo:memo,curPrice:prev.curPrice,lastUpd:prev.lastUpd};
    toast('✅ 수정되었습니다');
  } else {
    var ex=H.find(function(x){return x.ticker===ticker&&x.market===market;});
    if(ex){
      var total=ex.qty+qty;
      ex.buyPrice=parseFloat(market==='US'?((ex.buyPrice*ex.qty+price*qty)/total).toFixed(4):Math.round((ex.buyPrice*ex.qty+price*qty)/total));
      if(market==='US')ex.buyFX=parseFloat(((ex.buyFX||buyfx)*ex.qty+buyfx*qty)/total).toFixed(2);
      ex.qty=total;ex.lastBuyDate=date;
      var bl=ex.brokers||[ex.broker];if(!bl.includes(broker))bl.push(broker);ex.brokers=bl;ex.broker=bl[0];
      if(memo)ex.memo=[ex.memo,memo].filter(Boolean).join(' · ').slice(0,100);
      toast('🔀 '+ticker+' 병합 완료 · '+total.toLocaleString()+'주 · 평균가 '+fP(ex,ex.buyPrice));
    } else {
      H.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),market:market,exchange:exchange,broker:broker,brokers:[broker],ticker:ticker,name:name,date:date,lastBuyDate:date,qty:qty,buyPrice:price,buyFX:market==='US'?buyfx:null,memo:memo,curPrice:null,lastUpd:null});
      toast('✅ 종목이 추가되었습니다');
    }
  }
  persist();renderAll();closeOv('ov-add');
}

/* DETAIL */
function openDet(id){buildDet(id);openOv('ov-det');}
function buildDet(id){
  var h=H.find(function(x){return x.id===id;});if(!h)return;
  var p=calcPnl(h),cls=p?(p.d>=0?'pos':'neg'):'',sgn=p?(p.d>=0?'+':''):'';
  var bl=esc((h.brokers||[h.broker]).join(', '));
  document.getElementById('det-body').innerHTML=
    '<div class="m-sticky"><div class="m-handle"></div><div style="display:flex;justify-content:space-between;align-items:flex-start;">'
    +'<div><div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap;"><span class="b-ticker">'+esc(h.ticker)+'</span><span class="b-mkt '+h.market.toLowerCase()+'">'+(h.market==='US'?'🇺🇸 US':'🇰🇷 KR')+'</span><span class="b-broker">'+bl+'</span></div>'
    +'<div style="font-size:19px;font-weight:700;">'+esc(h.name)+'</div>'+(h.memo?'<div style="font-size:13px;color:var(--tx3);margin-top:3px;">📝 '+esc(h.memo)+'</div>':'')+'</div>'
    +(p?'<div style="text-align:right;flex-shrink:0;margin-left:12px;"><div class="pnl-num '+cls+'" style="font-size:20px;">'+sgn+fKRW(p.d)+'</div><div class="pnl-pct '+cls+'" style="font-size:15px;">'+sgn+p.pct.toFixed(2)+'%</div></div>':'')
    +'</div></div>'
    +(h.curPrice?'<div class="det-hero"><div><div style="font-size:12px;color:var(--tx3);margin-bottom:4px;letter-spacing:.8px;text-transform:uppercase;">현재가</div><div class="det-price">'+fP(h,h.curPrice)+'</div>'+(h.market==='US'?'<div style="font-size:12px;color:var(--tx3);margin-top:3px;font-family:var(--num);">= '+fKRW(h.curPrice*(fx||h.buyFX||1))+' (환율 '+(fx?fx.toFixed(0):'미설정')+')</div>':'')+'</div><div style="text-align:right;"><div style="font-size:12px;color:var(--tx3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.8px;">평가금액</div><div style="font-family:var(--num);font-size:17px;">'+fKRW(curKRW(h))+'</div>'+(h.lastUpd?'<div style="font-size:12px;color:var(--tx3);margin-top:3px;">'+new Date(h.lastUpd).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})+'</div>':'')+'</div></div>':'')
    +'<button class="fetch-btn" id="fbtn-'+h.id+'" onclick="doFetchPrice(\''+h.id+'\')"><span id="ficon-'+h.id+'">📡</span><span id="flbl-'+h.id+'">현재가 조회 <span style="font-size:12px;opacity:.6;">(네이버금융·야후)</span></span></button>'
    +'<div class="manual-row"><input class="fi" type="number" id="mprice-'+h.id+'" placeholder="'+(h.market==='US'?'USD 직접 입력':'KRW 직접 입력')+'" step="any"><button class="apply-btn" onclick="applyManual(\''+h.id+'\')">적용</button></div>'
    +'<div class="adj-box"><div class="det-t">✏️ 수량 · 평균가 조정</div>'
    +'<div style="margin-bottom:12px;"><div class="adj-lbl">보유 수량 <span style="color:var(--tx2);font-family:var(--num);">(현재 '+h.qty.toLocaleString()+'주)</span></div><div class="adj-row"><button class="adj-step" onclick="step(\'aqty-'+h.id+'\',-1)">−</button><input class="adj-num" type="number" id="aqty-'+h.id+'" value="'+h.qty+'" min="0" step="any"><button class="adj-step" onclick="step(\'aqty-'+h.id+'\',1)">＋</button></div></div>'
    +'<div style="margin-bottom:12px;"><div class="adj-lbl">평균 매수가 <span style="color:var(--tx2);font-family:var(--num);">(현재 '+fP(h,h.buyPrice)+')</span></div><input class="fi" type="number" id="aprice-'+h.id+'" value="'+h.buyPrice+'" step="any"></div>'
    +(h.market==='US'?'<div style="margin-bottom:12px;"><div class="adj-lbl">평균 매수환율 <span style="color:var(--tx2);font-family:var(--num);">(현재 '+(h.buyFX?parseFloat(h.buyFX).toFixed(2):'—')+' ₩)</span></div><input class="fi" type="number" id="afx-'+h.id+'" value="'+(h.buyFX||'')+'" step="any" placeholder="예: 1350.00"></div>':'')
    +'<button class="btn btn-gold" style="width:100%;" onclick="applyAdj(\''+h.id+'\')">조정 완료</button></div>'
    +'<div class="det-sec"><div class="det-t">매수 정보</div>'
    +'<div class="det-row"><span class="det-lbl">증권사</span><span class="det-val">'+bl+'</span></div>'
    +'<div class="det-row"><span class="det-lbl">거래소</span><span class="det-val">'+(h.market==='KR'?(h.exchange==='KQ'?'코스닥':'코스피'):'해외 (US)')+'</span></div>'
    +'<div class="det-row"><span class="det-lbl">최초 매수일</span><span class="det-val">'+h.date+'</span></div>'
    +'<div class="det-row"><span class="det-lbl">최근 매수일</span><span class="det-val">'+(h.lastBuyDate||h.date)+'</span></div>'
    +'<div class="det-row"><span class="det-lbl">보유 수량</span><span class="det-val">'+h.qty.toLocaleString()+'주</span></div>'
    +'<div class="det-row"><span class="det-lbl">평균 매수가</span><span class="det-val">'+fP(h,h.buyPrice)+'</span></div>'
    +(h.market==='US'&&h.buyFX?'<div class="det-row"><span class="det-lbl">평균 매수환율</span><span class="det-val">'+parseFloat(h.buyFX).toFixed(2)+' ₩/USD</span></div>':'')
    +'<div class="det-row"><span class="det-lbl">매수금액 (KRW)</span><span class="det-val" style="color:var(--tx);">'+fKRW(buyKRW(h))+'</span></div></div>'
    +(p?'<div class="det-sec"><div class="det-t">수익 / 손실 분석</div>'
    +'<div class="det-row"><span class="det-lbl">매수금액</span><span class="det-val">'+fKRW(p.bk)+'</span></div>'
    +'<div class="det-row"><span class="det-lbl">현재평가</span><span class="det-val">'+fKRW(p.ck)+'</span></div>'
    +'<div class="det-row"><span class="det-lbl">손익</span><span class="det-val '+cls+'" style="font-size:16px;font-weight:700;">'+sgn+fKRW(p.d)+'</span></div>'
    +'<div class="det-row"><span class="det-lbl">수익률</span><span class="det-val '+cls+'" style="font-size:16px;font-weight:700;">'+sgn+p.pct.toFixed(2)+'%</span></div>'
    +(h.market==='US'?'<div class="det-row"><span class="det-lbl" style="font-size:13px;">환율</span><span class="det-val" style="font-size:13px;">매수 '+(h.buyFX?parseFloat(h.buyFX).toFixed(0):'—')+' → 현재 '+(fx?fx.toFixed(0):'미설정')+' ₩/USD</span></div>':'')
    +'</div>':'')
    +'<div class="brow brow3">'
    +'<button class="btn btn-red" onclick="doDelete(\''+h.id+'\')">삭제</button>'
    +'<button class="btn btn-ghost" onclick="openEdit(\''+h.id+'\')">전체수정</button>'
    +'<button class="btn btn-ghost" onclick="closeOv(\'ov-det\')">닫기</button>'
    +'</div>';
}

function doDelete(id){
  var h=H.find(function(x){return x.id===id;});if(!h)return;
  cfmShow('🗑️','['+esc(h.ticker)+'] '+esc(h.name)+'\n을(를) 삭제하시겠습니까?','삭제','btn-red',function(){
    H=H.filter(function(x){return x.id!==id;});
    persistDelete(id);  // Firestore 문서 직접 삭제
    renderAll();closeOv('ov-det');toast('🗑️ 삭제되었습니다');
  });
}

/* MANUAL PRICE */
function applyManual(id){
  var v=parseFloat(document.getElementById('mprice-'+id).value);
  if(!v||v<=0){toast('⚠️ 올바른 가격을 입력해주세요');return;}
  var idx=H.findIndex(function(x){return x.id===id;});if(idx<0)return;
  H[idx].curPrice=v;H[idx].lastUpd=new Date().toISOString();
  persist();renderAll();buildDet(id);toast('✅ 현재가 업데이트 완료');
}

/* ADJUST */
function step(inputId,delta){
  var el=document.getElementById(inputId);if(!el)return;
  el.value=Math.max(0,parseFloat(((parseFloat(el.value)||0)+delta).toFixed(4)));
}
function applyAdj(id){
  var idx=H.findIndex(function(x){return x.id===id;});if(idx<0)return;
  var h=H[idx];
  var newQty=parseFloat(document.getElementById('aqty-'+id).value);
  var newPrice=parseFloat(document.getElementById('aprice-'+id).value);
  var newFXEl=document.getElementById('afx-'+id);
  var newFX=newFXEl?parseFloat(newFXEl.value):h.buyFX;
  if(!(newQty>=0)){toast('⚠️ 수량을 올바르게 입력해주세요');return;}
  if(!(newPrice>0)){toast('⚠️ 평균 매수가를 올바르게 입력해주세요');return;}
  if(h.market==='US'&&!(newFX>0)){toast('⚠️ 평균 매수환율을 입력해주세요');return;}
  if(newQty===0){
    cfmShow('📤',h.ticker+' 전량 정리하시겠습니까?\n(종목이 삭제됩니다)','삭제','btn-red',function(){
      H.splice(idx,1);persistDelete(id);renderAll();closeOv('ov-det');toast('🗑️ '+h.ticker+' 전량 정리 완료');
    });return;
  }
  H[idx].qty=newQty;
  H[idx].buyPrice=h.market==='US'?parseFloat(newPrice.toFixed(4)):Math.round(newPrice);
  if(h.market==='US')H[idx].buyFX=parseFloat(newFX.toFixed(2));
  persist();renderAll();buildDet(id);toast('✅ '+h.ticker+' 조정 완료 · '+newQty.toLocaleString()+'주 · 평균가 '+fP(H[idx],H[idx].buyPrice));
}

/* ═══════════════════════════════
   가격 조회 엔진
   KR: 네이버 금융 (1차) → 야후 파이낸스 (2차)
   US: 야후 파이낸스 v7/v8
   환율: Frankfurter → 야후 파이낸스
═══════════════════════════════ */

/* CORS 프록시 목록 (순서대로 시도) */
var PROXIES=[
  function(u){return'https://corsproxy.io/?url='+encodeURIComponent(u);},
  function(u){return'https://api.allorigins.win/raw?url='+encodeURIComponent(u);},
  function(u){return'https://thingproxy.freeboard.io/fetch/'+u;},
  function(u){return'https://cors.eu.org/'+u;}
];

/* 공통 fetch 래퍼: 프록시 순회 */
async function proxyFetch(url, parseOk, timeout){
  timeout = timeout || 7000;
  for(var i=0;i<PROXIES.length;i++){
    try{
      var r=await fetch(PROXIES[i](url),{signal:AbortSignal.timeout(timeout)});
      if(!r.ok) continue;
      var d=await r.json();
      var val=parseOk(d);
      if(val && val>0) return val;
    }catch(e){ continue; }
  }
  return null;
}

/* ── 네이버 금융 (국내주식) ── */
async function naverPrice(code){
  /* 네이버 모바일 API: 응답에 closePrice(장중엔 현재가) */
  var url='https://m.stock.naver.com/api/stock/'+code+'/basic';
  return await proxyFetch(url, function(d){
    /* closePrice 는 "74,100" 형태, 쉼표 제거 후 파싱 */
    var raw = d.closePrice || d.currentPrice || d.dealTranPrice || '';
    var n = parseFloat(String(raw).replace(/,/g,''));
    return isNaN(n)?0:n;
  }, 8000);
}

/* ── 네이버 폴링 API (실시간 보조) ── */
async function naverRealtimePrice(code){
  var url='https://polling.finance.naver.com/api/realtime/domestic/stock/'+code;
  return await proxyFetch(url, function(d){
    var item = d && d.datas && d.datas[code];
    if(!item) return 0;
    var raw = item.dealTranPrice || item.closePrice || '';
    var n = parseFloat(String(raw).replace(/,/g,''));
    return isNaN(n)?0:n;
  }, 7000);
}

/* ── 야후 파이낸스 (해외주식 + KR 대체) ── */
async function yahooPrice(sym){
  /* v7 quote API (더 안정적) */
  var url7='https://query1.finance.yahoo.com/v7/finance/quote?symbols='+encodeURIComponent(sym)+'&fields=regularMarketPrice';
  var p7=await proxyFetch(url7, function(d){
    var r=d&&d.quoteResponse&&d.quoteResponse.result&&d.quoteResponse.result[0];
    return r?r.regularMarketPrice:0;
  }, 8000);
  if(p7) return p7;

  /* v8 chart API (fallback) */
  var url8='https://query2.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(sym)+'?interval=1d&range=1d';
  return await proxyFetch(url8, function(d){
    var r=d&&d.chart&&d.chart.result&&d.chart.result[0];
    return r?(r.meta&&r.meta.regularMarketPrice)||0:0;
  }, 8000);
}

/* ── 종목별 가격 조회 메인 ── */
async function getPrice(h){
  var ticker=h.ticker.replace(/\.(KS|KQ|T|L|AX|HK)$/i,'');

  if(h.market==='KR'){
    /* 1차: 네이버 금융 basic */
    var p1=await naverPrice(ticker);
    if(p1>0) return p1;
    /* 2차: 네이버 폴링 */
    var p2=await naverRealtimePrice(ticker);
    if(p2>0) return p2;
    /* 3차: 야후 파이낸스 (KS/KQ suffix) */
    var exch=h.exchange||'KS';
    var p3=await yahooPrice(ticker+'.'+exch);
    if(p3>0){h.exchange=exch;return p3;}
    var other=exch==='KS'?'KQ':'KS';
    var p4=await yahooPrice(ticker+'.'+other);
    if(p4>0){h.exchange=other;return p4;}
    return null;
  }

  /* 해외주식 */
  return await yahooPrice(ticker);
}

/* ── 단일 종목 조회 ── */
async function doFetchPrice(id){
  var h=H.find(function(x){return x.id===id;});if(!h)return;
  var btn=document.getElementById('fbtn-'+id),icon=document.getElementById('ficon-'+id),lbl=document.getElementById('flbl-'+id);
  if(btn)btn.classList.add('busy');
  if(icon)icon.innerHTML='<span class="spin">⟳</span>';
  if(lbl)lbl.textContent=h.market==='KR'?'네이버 금융 조회 중...':'야후 파이낸스 조회 중...';
  var price=await getPrice(h);
  if(price){
    var idx=H.findIndex(function(x){return x.id===id;});
    H[idx].curPrice=price;H[idx].lastUpd=new Date().toISOString();
    if(h.exchange)H[idx].exchange=h.exchange;
    persist();renderAll();buildDet(id);
    toast('✅ '+h.ticker+' : '+fP(h,price)+' ('+(h.market==='KR'?'네이버 금융':'야후 파이낸스')+')');
  }else{
    if(btn)btn.classList.remove('busy');
    if(icon)icon.textContent='📡';
    if(lbl)lbl.innerHTML='현재가 조회 <span style="font-size:12px;opacity:.6;">(네이버/야후)</span>';
    toast('⚠️ ['+h.ticker+'] 조회 실패 · 아래 직접입력란에 수동으로 입력해주세요');
  }
}

/* ── 전체 일괄 조회 ── */
async function refreshAll(){
  if(!H.length){toast('보유 종목이 없습니다');return;}
  var icon=document.getElementById('refresh-icon'),btn=document.getElementById('btn-refresh');
  icon.innerHTML='<span class="spin">⟳</span>';btn.disabled=true;
  toast('⏳ '+H.length+'개 조회 중...',10000);
  var ok=0,fails=[];
  for(var i=0;i<H.length;i++){
    var h=H[i];
    var price=await getPrice(h);
    var idx=H.findIndex(function(x){return x.id===h.id;});
    if(price){
      H[idx].curPrice=price;H[idx].lastUpd=new Date().toISOString();
      if(h.exchange)H[idx].exchange=h.exchange;
      ok++;
    }else{ fails.push(h.ticker); }
  }
  persist();renderAll();icon.textContent='↻';btn.disabled=false;
  if(fails.length){
    toast('✅ '+ok+'개 완료 · ⚠️ 실패: '+fails.join(', '),5000);
  }else{
    toast('✅ 전체 '+ok+'개 업데이트 완료');
  }
}

/* EXCHANGE RATE */
async function doFetchFX(){
  var btn=document.getElementById('fx-btn'),icon=document.getElementById('fx-icon');
  btn.classList.add('busy');icon.innerHTML='<span class="spin">⟳</span>';
  /* 1차: Frankfurter (ECB 환율, CORS 허용) */
  try{
    var r=await fetch('https://api.frankfurter.app/latest?from=USD&to=KRW',{signal:AbortSignal.timeout(5000)});
    var d=await r.json();
    if(d.rates&&d.rates.KRW){saveFX(d.rates.KRW,'Frankfurter');return;}
  }catch(e){}
  /* 2차: 야후 파이낸스 KRW=X */
  try{var p=await yahooPrice('KRW=X');if(p&&p>100){saveFX(p,'야후 파이낸스');return;}}catch(e){}
  toast('⚠️ 환율 조회 실패');btn.classList.remove('busy');icon.textContent='↺';
}
function saveFX(rate,src){
  fx=rate;fxT=new Date().toISOString();
  localStorage.setItem('sl-fx',rate);localStorage.setItem('sl-fxt',fxT);
  showFX(rate,fxT);renderAll();
  document.getElementById('fx-btn').classList.remove('busy');
  document.getElementById('fx-icon').textContent='↺';
  toast('✅ USD/KRW '+rate.toLocaleString('ko-KR',{maximumFractionDigits:2})+'원 · '+src);
}
function showFX(rate,time){
  document.getElementById('fx-display').textContent=rate.toLocaleString('ko-KR',{maximumFractionDigits:2})+' ₩';
  if(time)document.getElementById('fx-time').textContent=new Date(time).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}

/* CSV */
function exportCSV(){
  var rows=[['티커','종목명','시장','거래소','증권사','최초매수일','최근매수일','수량','평균매수가','매수환율','현재가','매수금액(KRW)','현재평가(KRW)','손익(KRW)','수익률(%)','메모']];
  H.forEach(function(h){var p=calcPnl(h);rows.push([h.ticker,h.name,h.market,h.market==='KR'?(h.exchange==='KQ'?'KOSDAQ':'KOSPI'):'US',(h.brokers||[h.broker]).join('/'),h.date,h.lastBuyDate||h.date,h.qty,h.buyPrice,h.buyFX||'',h.curPrice||'',Math.round(buyKRW(h)),p?Math.round(p.ck):'',p?Math.round(p.d):'',p?p.pct.toFixed(2):'',h.memo||'']);});
  var csv=rows.map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download='stocklens-'+todayStr()+'.csv';a.click();
  toast('📋 CSV 내보내기 완료');
}

/* TOAST */
var toastT;
function toast(msg,dur){dur=dur||3000;var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove('show');},dur);}
</script>
