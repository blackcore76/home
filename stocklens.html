<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">

<title>StockLens — 주식 포트폴리오</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg:      #080c14;
  --sf:      #0e1422;
  --sf2:     #131b2d;
  --sf3:     #181f30;
  --bd:      #1e2d45;
  --bd2:     #263548;
  --text:    #c8d6e8;
  --text2:   #7a91a8;
  --text3:   #4a5f74;
  --accent:  #00d4ff;
  --accent2: #0099cc;
  --green:   #00e676;
  --red:     #ff5252;
  --yellow:  #ffca28;
  --mono:    'JetBrains Mono', monospace;
  --sans:    'Noto Sans KR', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* 헤더 */
header {
  position: sticky; top: 36px; z-index: 50;
  background: rgba(8,12,20,.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bd);
  padding: 0 16px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo { font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 8px; }
.logo-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); animation: pulse 3s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 8px var(--accent)} 50%{opacity:.4;box-shadow:0 0 3px var(--accent)} }
.hbtn-group { display: flex; gap: 8px; align-items: center; }

/* 동기화 배지 */
.sync-badge {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  background: var(--sf); border: 1px solid var(--bd);
  border-radius: 20px; padding: 3px 10px;
}
.sync-dot {
  width: 5px; height: 5px; border-radius: 50%;
  flex-shrink: 0;
}
.sync-dot.live     { background: var(--green); box-shadow: 0 0 5px var(--green); animation: bl 3s infinite; }
.sync-dot.loading  { background: var(--yellow); box-shadow: 0 0 5px var(--yellow); animation: bl .6s infinite; }
.sync-dot.offline  { background: var(--red); }
.sync-dot.saving   { background: var(--accent); box-shadow: 0 0 5px var(--accent); animation: bl .4s infinite; }
@keyframes bl { 0%,100%{opacity:1} 50%{opacity:.2} }
.sync-txt.live    { color: var(--green); }
.sync-txt.loading { color: var(--yellow); }
.sync-txt.offline { color: var(--red); }
.sync-txt.saving  { color: var(--accent); }

/* 사용자 배지 */
.user-badge {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10px;
  color: var(--text2); background: var(--sf2);
  border: 1px solid var(--bd); border-radius: 20px;
  padding: 3px 10px;
  cursor: pointer;
}
.user-badge:hover { border-color: var(--accent); color: var(--accent); }

.hbtn {
  background: var(--sf); border: 1px solid var(--bd);
  border-radius: 6px; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; color: var(--text2);
  transition: all .15s;
}
.hbtn:hover { border-color: var(--accent); color: var(--accent); }
.hbtn:disabled { opacity: .4; pointer-events: none; }

/* 메인 컨테이너 */
.container {
  width: 100%;
  padding: 20px 16px;
}

/* 카드 */
.card {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s, background .2s;
  width: 100%;
}
.card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, var(--accent), transparent);
  border-radius: 3px 0 0 3px;
}
.card:hover { border-color: var(--bd2); background: var(--sf2); }
.card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--bd);
}
.card-header .icon { font-size: 20px; }
.card-header h3 {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--accent);
}
.card-header .badge {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
}

.hero-val {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -1px;
  margin-bottom: 8px;
}
.hero-sub { font-size: 12px; color: var(--text3); }
.chips { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.chip {
  flex: 1;
  min-width: 100px;
  background: var(--sf2);
  border: 1px solid var(--bd);
  border-radius: 10px;
  padding: 10px 12px;
}
.chip-lbl { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: .08em; margin-bottom: 6px; }
.chip-val { font-family: var(--mono); font-size: 15px; font-weight: 600; }
.chip-val.pos { color: var(--green); }
.chip-val.neg { color: var(--red); }

/* 환율 바 */
.fxbar {
  background: var(--sf2);
  border: 1px solid var(--bd);
  border-radius: 12px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 16px;
}
.fx-item { display: flex; align-items: baseline; gap: 8px; }
.fx-lbl { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.fx-val { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--accent); }
.fx-time { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.fx-btn {
  background: var(--sf3); border: 1px solid var(--bd2);
  border-radius: 6px; padding: 6px 12px;
  font-family: var(--mono); font-size: 10px;
  color: var(--text2); cursor: pointer;
  transition: all .15s;
}
.fx-btn:hover { border-color: var(--accent); color: var(--accent); }

/* 탭 */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  background: var(--sf2);
  border: 1px solid var(--bd);
  border-radius: 20px;
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text3);
  cursor: pointer;
  transition: all .15s;
}
.tab.on {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}
.tab:not(.on):hover { border-color: var(--accent); color: var(--accent); }

/* 리스트 헤더 */
.list-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.list-count { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.sort-btn {
  background: none;
  border: none;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  cursor: pointer;
  transition: color .15s;
}
.sort-btn:hover { color: var(--accent); }

/* 종목 카드 */
.stock-card {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all .2s;
  animation: fadeIn .3s ease both;
  position: relative;
  overflow: hidden;
  width: 100%;
}
.stock-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, var(--accent), transparent);
  border-radius: 3px 0 0 3px;
}
.stock-card:hover { border-color: var(--bd2); background: var(--sf2); }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 8px;
}
.card-badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}
.b-ticker {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  background: rgba(0,212,255,.1);
  border: 1px solid rgba(0,212,255,.2);
  border-radius: 4px;
  padding: 2px 8px;
  color: var(--accent);
}
.b-mkt {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--sf3);
  border: 1px solid var(--bd);
}
.b-mkt.kr { color: var(--yellow); }
.b-mkt.us { color: var(--green); }
.b-author {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  background: var(--sf3);
  border: 1px solid var(--bd);
  border-radius: 4px;
  padding: 2px 6px;
}
.card-name {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 2px;
}
.card-memo { font-size: 11px; color: var(--text3); }
.card-pnl { text-align: right; flex-shrink: 0; }
.pnl-num { font-family: var(--mono); font-size: 15px; font-weight: 600; }
.pnl-pct { font-family: var(--mono); font-size: 12px; }
.pos { color: var(--green); }
.neg { color: var(--red); }

.bar-wrap { margin-top: 10px; margin-bottom: 12px; }
.bar-track { height: 3px; background: var(--bd2); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; transition: width .3s; }

.card-bot {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--bd);
}
.s-lbl { font-family: var(--mono); font-size: 9px; color: var(--text3); margin-bottom: 3px; }
.s-val { font-family: var(--mono); font-size: 12px; font-weight: 500; }

/* 페이지네이션 */
.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin: 20px 16px 40px;
  flex-wrap: wrap;
}
.page-btn {
  background: var(--sf2);
  border: 1px solid var(--bd);
  color: var(--text2);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  min-width: 36px;
  text-align: center;
}
.page-btn:hover:not(:disabled) {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,212,255,.05);
}
.page-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  font-weight: 600;
}
.page-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
.page-ellipsis {
  color: var(--text3);
  font-family: var(--mono);
  font-size: 12px;
  padding: 0 4px;
}

/* FAB 버튼 */
.fab {
  position: fixed;
  bottom: 24px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  color: #000;
  font-size: 28px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,212,255,.4);
  transition: all .2s;
  z-index: 60;
}
.fab:hover { transform: scale(1.05) translateY(-2px); }
.fab:active { transform: scale(.95); }

/* 모달 (화면 중앙 고정) */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal {
  background: var(--sf);
  border: 1px solid var(--bd2);
  border-radius: 16px;
  width: 100%;
  max-width: 500px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
  transform: translateY(20px);
  transition: transform .2s;
}
.overlay.open .modal {
  transform: translateY(0);
}
.m-sticky {
  position: sticky; top: 0;
  background: var(--sf);
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--bd);
  z-index: 10;
}
.m-handle {
  width: 40px;
  height: 4px;
  background: var(--bd2);
  border-radius: 2px;
  margin: 0 auto 14px;
}
.m-title {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
}
.modal-body { padding: 20px; }

/* 폼 */
.f2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.fg { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.fl {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
}
.fi, .fs {
  background: var(--sf3);
  border: 1px solid var(--bd2);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--text);
  font-size: 13px;
  font-family: var(--sans);
  outline: none;
  width: 100%;
}
.fi:focus, .fs:focus { border-color: var(--accent); }
.fs option { background: var(--sf2); }
.fhint { font-size: 10px; color: var(--text3); margin-top: 4px; }
.brow { display: flex; gap: 10px; margin-top: 20px; }
.btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .15s;
}
.btn-gold { background: var(--accent); color: #000; }
.btn-gold:hover { background: #33ddff; }
.btn-ghost { background: var(--sf3); border: 1px solid var(--bd2); color: var(--text2); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-red { background: rgba(255,82,82,.12); border: 1px solid rgba(255,82,82,.3); color: var(--red); }
.btn-red:hover { background: rgba(255,82,82,.2); }

/* 상세 모달 내부 */
.det-hero {
  background: var(--sf2);
  border: 1px solid var(--bd);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.det-price { font-family: var(--mono); font-size: 22px; font-weight: 600; }
.fetch-btn {
  width: 100%;
  background: var(--sf3);
  border: 1px dashed var(--bd2);
  border-radius: 10px;
  padding: 12px;
  color: var(--text3);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 12px;
}
.fetch-btn:hover { border-color: var(--accent); color: var(--accent); }
.manual-row { display: flex; gap: 8px; margin-bottom: 16px; }
.manual-row .fi { flex: 1; }
.apply-btn {
  background: var(--sf3);
  border: 1px solid var(--bd2);
  border-radius: 8px;
  padding: 0 16px;
  color: var(--text2);
  cursor: pointer;
}
.adj-box {
  background: var(--sf2);
  border: 1px solid var(--bd);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}
.adj-lbl { font-size: 11px; color: var(--text3); margin-bottom: 8px; }
.adj-row { display: flex; align-items: center; gap: 8px; }
.adj-step {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  border: 1px solid var(--bd2);
  background: var(--sf3);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
}
.adj-step:hover { border-color: var(--accent); color: var(--accent); }
.adj-num {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--bd2);
  border-radius: 8px;
  padding: 10px;
  color: var(--text);
  font-family: var(--mono);
  text-align: center;
}
.det-sec { margin-bottom: 20px; }
.det-t {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--accent);
  padding-bottom: 6px;
  border-bottom: 1px solid var(--bd);
  margin-bottom: 10px;
}
.det-row { display: flex; justify-content: space-between; padding: 6px 0; }
.det-lbl { font-size: 12px; color: var(--text3); }
.det-val { font-family: var(--mono); font-size: 12px; }
.brow3 { display: flex; gap: 8px; margin-top: 16px; }

/* 컨펌 다이얼로그 */
.cfm-ov {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,.85);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.cfm-ov.open { opacity: 1; pointer-events: all; }
.cfm-box {
  background: var(--sf);
  border: 1px solid var(--bd2);
  border-radius: 20px;
  padding: 24px;
  width: 280px;
  text-align: center;
}
.cfm-ico { font-size: 36px; margin-bottom: 12px; }
.cfm-msg { font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
.cfm-btns { display: flex; gap: 10px; }

/* 토스트 */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--sf2);
  border: 1px solid var(--bd2);
  color: var(--text2);
  border-radius: 40px;
  padding: 8px 20px;
  font-size: 12px;
  opacity: 0;
  transition: all .2s;
  z-index: 999;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 로그인 모달 */
.login-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,.85);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.login-overlay.open { opacity: 1; pointer-events: all; }
.login-modal {
  background: var(--sf);
  border: 1px solid var(--bd2);
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  max-width: 320px;
  width: 90%;
}
.login-modal .btn-login {
  background: var(--accent); color: #000; border: none;
  border-radius: 10px; padding: 12px 24px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  width: 100%;
}
.login-modal .btn-cancel {
  margin-top: 12px;
  background: transparent;
  border: 1px solid var(--bd2);
  color: var(--text2);
  border-radius: 10px;
  padding: 10px 20px;
  width: 100%;
  cursor: pointer;
}

.empty {
  text-align: center;
  padding: 60px 20px;
}
.empty-ico { font-size: 48px; opacity: .4; margin-bottom: 12px; }
.empty-t { font-size: 15px; font-weight: 500; margin-bottom: 6px; }

<div class="toast" id="toast"></div>

<script>
const db = firebase.firestore();
const COL = 'stocklens';

let H = [];
let fx = parseFloat(localStorage.getItem('sl-fx')||'0');
let fxT = localStorage.getItem('sl-fxt')||'';
let tab = 'all';
let sortM = 'pnl';
let editId = null;
let cfmCB = null;
let _syncing = false;
let currentUser = null;
let pendingAction = null;
let pendingData = null;

// 페이지네이션 변수
let currentPage = 1;
const itemsPerPage = 10;

// 동기화 배지
function setSyncStatus(state) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncTxt');
  const labels = { connecting:'연결 중...', live:'● 실시간', saving:'저장 중...', offline:'오프라인' };
  dot.className = 'sync-dot ' + state;
  txt.className = 'sync-txt ' + state;
  txt.textContent = labels[state] || labels.offline;
}

// Firestore 실시간
function initSync() {
  setSyncStatus('connecting');
  db.collection(COL).onSnapshot(snap => {
    if(_syncing) return;
    H = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    try{ localStorage.setItem('sl-h', JSON.stringify(H)); }catch(e){}
    setSyncStatus('live');
    resetToFirstPageAndRender();
    if(fx) showFX(fx, fxT);
  }, err => {
    console.error('[Firestore]', err);
    setSyncStatus('offline');
    try{ H = JSON.parse(localStorage.getItem('sl-h')||'[]'); }catch(e){ H=[]; }
    resetToFirstPageAndRender();
  });
}

// 저장
async function persist() {
  _syncing = true;
  setSyncStatus('saving');
  try {
    const batch = db.batch();
    H.forEach(h => {
      const ref = db.collection(COL).doc(h.id);
      const data = { ...h };
      delete data.id;
      batch.set(ref, data);
    });
    await batch.commit();
    try{ localStorage.setItem('sl-h', JSON.stringify(H)); }catch(e){}
    setSyncStatus('live');
  } catch(err) {
    console.error('persist:', err);
    setSyncStatus('offline');
    try{ localStorage.setItem('sl-h', JSON.stringify(H)); }catch(e){}
    toast('⚠️ 오프라인 — 로컬에 임시 저장됨');
  } finally {
    setTimeout(() => { _syncing = false; }, 800);
  }
}

// 삭제
async function persistDelete(id) {
  _syncing = true;
  setSyncStatus('saving');
  try {
    await db.collection(COL).doc(id).delete();
    try{ localStorage.setItem('sl-h', JSON.stringify(H)); }catch(e){}
    setSyncStatus('live');
  } catch(err) {
    setSyncStatus('offline');
    toast('⚠️ 삭제 실패: '+err.message);
  } finally {
    setTimeout(() => { _syncing = false; }, 800);
  }
}

// 로그인 관련
function showLoginModal() {
  document.getElementById('loginModal').classList.add('open');
}
function closeLoginModal() {
  document.getElementById('loginModal').classList.remove('open');
  pendingAction = null;
  pendingData = null;
}

async function triggerLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await firebase.auth().signInWithPopup(provider);
    closeLoginModal();
  } catch(e) {
    toast('❌ 로그인 실패: ' + e.message);
  }
}

function formatEmail(email) {
  return email ? email.split('@')[0] : '익명';
}

function updateUIForUser(user) {
  currentUser = user;
  const userEmailSpan = document.getElementById('userEmail');
  if (user) {
    userEmailSpan.textContent = formatEmail(user.email);
    toast(`✅ ${user.email} 님 환영합니다!`);
    
    if (pendingAction) {
      setTimeout(() => {
        if (pendingAction === 'add') {
          openAdd();
        } else if (pendingAction === 'edit' && pendingData) {
          openEdit(pendingData.id);
        } else if (pendingAction === 'delete' && pendingData) {
          doDelete(pendingData.id);
        }
        pendingAction = null;
        pendingData = null;
      }, 300);
    }
  } else {
    userEmailSpan.textContent = '로그인';
  }
}

// 권한 체크
function checkLoginAndOpenAdd() {
  if (!currentUser) {
    pendingAction = 'add';
    showLoginModal();
    return;
  }
  openAdd();
}

function checkLoginAndOpenEdit(id) {
  if (!currentUser) {
    pendingAction = 'edit';
    pendingData = { id };
    showLoginModal();
    return;
  }
  openEdit(id);
}

function checkLoginAndDelete(id) {
  if (!currentUser) {
    pendingAction = 'delete';
    pendingData = { id };
    showLoginModal();
    return;
  }
  doDelete(id);
}

// 유틸 함수
function fKRW(n) { if(n==null||isNaN(n)) return '—'; const a=Math.abs(n), s=n<0?'-':''; if(a>=1e8) return s+(a/1e8).toFixed(2)+'억'; return s+Math.round(a).toLocaleString('ko-KR')+'원'; }
function fNum(n,d) { d=d===undefined?2:d; if(n==null||isNaN(n)) return '—'; return n.toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d}); }
function fP(h,p) { if(p==null||isNaN(p)) return '—'; return h.market==='US'?'$'+fNum(p):fKRW(p); }
function esc(s) { return String(s||'').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'})[c]); }

function buyKRW(h) { return h.market==='US' ? h.buyPrice*h.qty*(h.buyFX||fx||1) : h.buyPrice*h.qty; }
function curKRW(h) { if(!h.curPrice) return null; return h.market==='US' ? h.curPrice*h.qty*(fx||h.buyFX||1) : h.curPrice*h.qty; }
function calcPnl(h) { const bk=buyKRW(h), ck=curKRW(h); if(!ck) return null; const d=ck-bk, pct=bk>0?d/bk*100:0; return { d, pct, bk, ck }; }

// 요약 업데이트
function updateSummary() {
  const priced = H.filter(h => h.curPrice);
  const bset = new Set(); H.forEach(h => (h.brokers||[h.broker]).forEach(b => bset.add(b)));
  document.getElementById('total-counts').textContent = H.length + ' 종목';
  if(!priced.length) {
    document.getElementById('total-val').textContent = H.length ? fKRW(H.reduce((s,h)=>s+buyKRW(h),0)) : '—';
    ['total-pnl','total-pct'].forEach(id => { document.getElementById(id).textContent = '—'; document.getElementById(id).className = 'chip-val'; });
    const sub = document.getElementById('total-sub'); sub.textContent = H.length ? '현재가를 업데이트하면 수익률이 표시됩니다' : '+ 버튼으로 첫 종목을 추가하세요';
    return;
  }
  const tB = priced.reduce((s,h)=>s+buyKRW(h),0);
  const tC = priced.reduce((s,h)=>s+(curKRW(h)||0),0);
  const d = tC-tB, pct = tB>0 ? d/tB*100 : 0, up = d>=0, cls = 'chip-val '+(up?'pos':'neg');
  document.getElementById('total-val').textContent = fKRW(tC);
  document.getElementById('total-pnl').textContent = (up?'+':'')+fKRW(d); document.getElementById('total-pnl').className = cls;
  document.getElementById('total-pct').textContent = (up?'+':'')+pct.toFixed(2)+'%'; document.getElementById('total-pct').className = cls;
  document.getElementById('total-sub').innerHTML = (up?'▲ 수익 ':'▼ 손실 ')+Math.abs(pct).toFixed(2)+'% · 매수금액 '+fKRW(tB);
}

// 필터 및 페이지네이션
function getFiltered() {
  let list = H.filter(h => tab==='all' || h.market===tab);
  list = list.slice().sort((a,b) => {
    if(sortM==='name') return a.name.localeCompare(b.name,'ko');
    if(sortM==='broker') return (a.brokers||[a.broker])[0].localeCompare((b.brokers||[b.broker])[0],'ko');
    if(sortM==='value') return (curKRW(b)||buyKRW(b)) - (curKRW(a)||buyKRW(a));
    const pa = calcPnl(a), pb = calcPnl(b);
    return (pb?pb.pct:-9999) - (pa?pa.pct:-9999);
  });
  return list;
}

function resetToFirstPageAndRender() {
  currentPage = 1;
  renderListWithPagination();
}

function renderListWithPagination() {
  const filtered = getFiltered();
  const totalItems = filtered.length;
  const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
  
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
  
  const startIdx = (currentPage - 1) * itemsPerPage;
  const endIdx = startIdx + itemsPerPage;
  const pageItems = filtered.slice(startIdx, endIdx);
  
  document.getElementById('list-count').textContent = '종목 '+filtered.length+'개';
  
  const el = document.getElementById('list');
  if(!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">📊</div><div class="empty-t">보유 종목이 없습니다</div><div class="empty-d">아래 ＋ 버튼으로 첫 번째 종목을 추가해보세요</div></div>';
    document.getElementById('paginationContainer').innerHTML = '';
    updateSummary();
    return;
  }
  
  el.innerHTML = pageItems.map((h,i) => {
    const p = calcPnl(h), cls = p ? (p.d>=0?'pos':'neg') : '', sgn = p ? (p.d>=0?'+':'') : '';
    const bw = p ? Math.min(Math.abs(p.pct),50)*2 : 0, bc = p ? (p.d>=0?'var(--green)':'var(--red)') : 'var(--bd2)';
    const bl = esc((h.brokers||[h.broker]).join(' · '));
    return `<div class="stock-card" onclick="openDet('${h.id}')" style="animation-delay:${i*.04}s">
      <div class="card-top">
        <div class="card-left">
          <div class="card-badges">
            <span class="b-ticker">${esc(h.ticker)}</span>
            <span class="b-mkt ${h.market.toLowerCase()}">${h.market==='US'?'🇺🇸 US':'🇰🇷 KR'}</span>
            <span class="b-mkt" style="background:var(--sf2);">${bl}</span>
            <span class="b-author">👤 ${formatEmail(h.userEmail)}</span>
          </div>
          <div class="card-name">${esc(h.name)}</div>
          ${h.memo ? `<div class="card-memo">📝 ${esc(h.memo)}</div>` : ''}
        </div>
        <div class="card-pnl">
          ${p ? `<div class="pnl-num ${cls}">${sgn+fKRW(p.d)}</div><div class="pnl-pct ${cls}">${sgn+p.pct.toFixed(2)}%</div>` : '<div style="font-size:12px;color:var(--text3)">현재가 없음</div>'}
        </div>
      </div>
      ${p ? `<div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${bw}%;background:${bc}"></div></div></div>` : ''}
      <div class="card-bot">
        <div><div class="s-lbl">수량</div><div class="s-val">${h.qty.toLocaleString()}</div></div>
        <div><div class="s-lbl">평균매수가</div><div class="s-val">${fP(h, h.buyPrice)}</div></div>
        <div><div class="s-lbl">${p ? '현재가' : '매수금액'}</div><div class="s-val">${p ? fP(h, h.curPrice) : fKRW(buyKRW(h))}</div></div>
      </div>
    </div>`;
  }).join('');
  
  updateSummary();
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const container = document.getElementById('paginationContainer');
  if (totalPages <= 1) {
    container.innerHTML = '';
    return;
  }
  
  let pagesHTML = '';
  pagesHTML += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;
  
  const maxVisible = 5;
  let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
  let endPage = Math.min(totalPages, startPage + maxVisible - 1);
  if (endPage - startPage + 1 < maxVisible) {
    startPage = Math.max(1, endPage - maxVisible + 1);
  }
  
  if (startPage > 1) {
    pagesHTML += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
    if (startPage > 2) pagesHTML += `<span class="page-ellipsis">...</span>`;
  }
  
  for (let i = startPage; i <= endPage; i++) {
    pagesHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
  }
  
  if (endPage < totalPages) {
    if (endPage < totalPages - 1) pagesHTML += `<span class="page-ellipsis">...</span>`;
    pagesHTML += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
  }
  
  pagesHTML += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>›</button>`;
  
  container.innerHTML = pagesHTML;
}

function goToPage(page) {
  const filtered = getFiltered();
  const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  renderListWithPagination();
}

function setTab(t, el) { 
  tab=t; 
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); 
  el.classList.add('on'); 
  resetToFirstPageAndRender(); 
}

function cycleSort() { 
  const m=['pnl','value','name','broker'], l={pnl:'수익률순',value:'평가액순',name:'이름순',broker:'증권사순'};

// 모달 관련
function openOv(id) { 
  const el = document.getElementById(id);
  if(el) {
    el.classList.remove('hidden');
    el.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
}
function closeOv(id) { 
  const el = document.getElementById(id);
  if(el) {
    el.classList.remove('open');
    setTimeout(() => el.classList.add('hidden'), 300);
    document.body.style.overflow = '';
    if(id==='ov-add') editId = null;
  }
}

function onMarketChange() {
  const m = document.getElementById('f-market').value;
  document.getElementById('wrap-exch').style.display = m==='KR' ? 'block' : 'none';
  document.getElementById('wrap-buyfx').style.display = m==='US' ? 'block' : 'none';

}
function onBrokerChange() {
  const v = document.getElementById('f-broker').value;

}

function doSave() {
  if (!currentUser) return;
  const market = document.getElementById('f-market').value;
  const exchange = market==='KR' ? document.getElementById('f-exch').value : null;
  const bSel = document.getElementById('f-broker').value;
  const broker = bSel==='__custom__' ? document.getElementById('f-broker-custom').value.trim() : bSel;
  let ticker = document.getElementById('f-ticker').value.trim().toUpperCase();
  const name = document.getElementById('f-name').value.trim();
  const date = document.getElementById('f-date').value;
  const qty = parseFloat(document.getElementById('f-qty').value);
  const price = parseFloat(document.getElementById('f-price').value);
  const buyfx = parseFloat(document.getElementById('f-buyfx').value);
  const memo = document.getElementById('f-memo').value.trim();
  if(!broker || !ticker || !name || !date || !(qty>0) || !(price>0)) { toast('⚠️ 필수 항목을 모두 입력해주세요'); return; }
  if(market==='US' && !(buyfx>0)) { toast('⚠️ 해외주식은 매수 당시 환율을 입력해주세요'); return; }
  if(editId) {
    const idx = H.findIndex(x => x.id === editId);
    const prev = H[idx];
    H[idx] = { id: editId, market, exchange, broker, brokers: prev.brokers || [prev.broker || broker], ticker, name, date, lastBuyDate: date, qty, buyPrice: price, buyFX: market==='US' ? buyfx : null, memo, curPrice: prev.curPrice, lastUpd: prev.lastUpd, userId: currentUser.uid, userEmail: currentUser.email };
    toast('✅ 수정되었습니다');
  } else {
    const ex = H.find(x => x.ticker === ticker && x.market === market);
    if(ex) {
      const total = ex.qty + qty;
      ex.buyPrice = parseFloat(market==='US' ? ((ex.buyPrice*ex.qty+price*qty)/total).toFixed(4) : Math.round((ex.buyPrice*ex.qty+price*qty)/total));
      if(market==='US') ex.buyFX = parseFloat(((ex.buyFX||buyfx)*ex.qty+buyfx*qty)/total).toFixed(2);
      ex.qty = total;
      ex.lastBuyDate = date;
      const bl = ex.brokers || [ex.broker];
      if(!bl.includes(broker)) bl.push(broker);
      ex.brokers = bl;
      ex.broker = bl[0];
      if(memo) ex.memo = [ex.memo, memo].filter(Boolean).join(' · ').slice(0,100);
      toast('🔀 '+ticker+' 병합 완료 · '+total.toLocaleString()+'주');
    } else {
      H.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,6), market, exchange, broker, brokers: [broker], ticker, name, date, lastBuyDate: date, qty, buyPrice: price, buyFX: market==='US' ? buyfx : null, memo, curPrice: null, lastUpd: null, userId: currentUser.uid, userEmail: currentUser.email });
      toast('✅ 종목이 추가되었습니다');
    }
  }
  persist();
  resetToFirstPageAndRender();
  closeOv('ov-add');
}

function applyManual(id) {
  const v = parseFloat(document.getElementById('mprice-'+id).value);
  if(!v || v<=0) { toast('⚠️ 올바른 가격을 입력해주세요'); return; }
  const idx = H.findIndex(x => x.id === id);
  if(idx<0) return;
  H[idx].curPrice = v;
  H[idx].lastUpd = new Date().toISOString();
  persist();
  resetToFirstPageAndRender();
  buildDet(id);
  toast('✅ 현재가 업데이트 완료');
}

function step(inputId, delta) {
  const el = document.getElementById(inputId);
  if(!el) return;
  el.value = Math.max(0, parseFloat(((parseFloat(el.value)||0)+delta).toFixed(4)));
}
function applyAdj(id) {
  const idx = H.findIndex(x => x.id === id);
  if(idx<0) return;
  const h = H[idx];
  const newQty = parseFloat(document.getElementById('aqty-'+id).value);
  const newPrice = parseFloat(document.getElementById('aprice-'+id).value);
  const newFXEl = document.getElementById('afx-'+id);
  const newFX = newFXEl ? parseFloat(newFXEl.value) : h.buyFX;
  if(!(newQty>=0)) { toast('⚠️ 수량을 올바르게 입력해주세요'); return; }
  if(!(newPrice>0)) { toast('⚠️ 평균 매수가를 올바르게 입력해주세요'); return; }
  if(h.market==='US' && !(newFX>0)) { toast('⚠️ 평균 매수환율을 입력해주세요'); return; }
  if(newQty===0) {
    cfmShow('📤', h.ticker+' 전량 정리하시겠습니까?\n(종목이 삭제됩니다)', '삭제', 'btn-red', () => {
      H.splice(idx,1);
      persistDelete(id);
      resetToFirstPageAndRender();
      closeOv('ov-det');
      toast('🗑️ '+h.ticker+' 전량 정리 완료');
    });
    return;
  }
  H[idx].qty = newQty;
  H[idx].buyPrice = h.market==='US' ? parseFloat(newPrice.toFixed(4)) : Math.round(newPrice);
  if(h.market==='US') H[idx].buyFX = parseFloat(newFX.toFixed(2));
  persist();
  resetToFirstPageAndRender();
  buildDet(id);
  toast('✅ '+h.ticker+' 조정 완료');
}

// 현재가 조회 관련
const PROXIES = [
  u => 'https://corsproxy.io/?url='+encodeURIComponent(u),
  u => 'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
  u => 'https://thingproxy.freeboard.io/fetch/'+u
];

async function proxyFetch(url, parseOk, timeout) {
  timeout = timeout || 7000;
  for(let i=0; i<PROXIES.length; i++) {
    try {
      const r = await fetch(PROXIES[i](url), { signal: AbortSignal.timeout(timeout) });
      if(!r.ok) continue;
      const d = await r.json();
      const val = parseOk(d);
      if(val && val>0) return val;
    } catch(e) { continue; }
  }
  return null;
}

async function naverPrice(code) {
  const url = 'https://m.stock.naver.com/api/stock/'+code+'/basic';
  return await proxyFetch(url, d => {
    const raw = d.closePrice || d.currentPrice || d.dealTranPrice || '';
    const n = parseFloat(String(raw).replace(/,/g,''));
    return isNaN(n) ? 0 : n;
  }, 8000);
}

async function yahooPrice(sym) {
  const url7 = 'https://query1.finance.yahoo.com/v7/finance/quote?symbols='+encodeURIComponent(sym)+'&fields=regularMarketPrice';
  let p7 = await proxyFetch(url7, d => {
    const r = d && d.quoteResponse && d.quoteResponse.result && d.quoteResponse.result[0];
    return r ? r.regularMarketPrice : 0;
  }, 8000);
  if(p7) return p7;
  const url8 = 'https://query2.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(sym)+'?interval=1d&range=1d';
  return await proxyFetch(url8, d => {
    const r = d && d.chart && d.chart.result && d.chart.result[0];
    return r ? (r.meta && r.meta.regularMarketPrice) || 0 : 0;
  }, 8000);
}

async function getPrice(h) {
  const ticker = h.ticker;
  if(h.market==='KR') {
    let p1 = await naverPrice(ticker);
    if(p1>0) return p1;
    const exch = h.exchange || 'KS';
    let p3 = await yahooPrice(ticker+'.'+exch);
    if(p3>0) { h.exchange = exch; return p3; }
    const other = exch==='KS' ? 'KQ' : 'KS';
    let p4 = await yahooPrice(ticker+'.'+other);
    if(p4>0) { h.exchange = other; return p4; }
    return null;
  }
  return await yahooPrice(ticker);
}

async function doFetchPrice(id) {
  const h = H.find(x => x.id === id);
  if(!h) return;
  const btn = document.getElementById('fbtn-'+id), icon = document.getElementById('ficon-'+id), lbl = document.getElementById('flbl-'+id);
  if(btn) btn.classList.add('busy');
  if(icon) icon.innerHTML = '<span class="spin">⟳</span>';
  if(lbl) lbl.textContent = '조회 중...';
  const price = await getPrice(h);
  if(price) {
    const idx = H.findIndex(x => x.id === id);
    H[idx].curPrice = price;
    H[idx].lastUpd = new Date().toISOString();
    if(h.exchange) H[idx].exchange = h.exchange;
    persist();
    resetToFirstPageAndRender();
    buildDet(id);
    toast('✅ '+h.ticker+' : '+fP(h, price));
  } else {
    if(btn) btn.classList.remove('busy');
    if(icon) icon.textContent = '📡';
    if(lbl) lbl.textContent = '현재가 조회';
    toast('⚠️ ['+h.ticker+'] 조회 실패 · 직접 입력해주세요');
  }
}

async function refreshAll() {
  if(!H.length) { toast('보유 종목이 없습니다'); return; }
  const icon = document.getElementById('refresh-icon'), btn = document.getElementById('btn-refresh');
  icon.innerHTML = '<span class="spin">⟳</span>';
  btn.disabled = true;
  toast('⏳ '+H.length+'개 조회 중...', 10000);
  let ok = 0, fails = [];
  for(let i=0; i<H.length; i++) {
    const h = H[i];
    const price = await getPrice(h);
    const idx = H.findIndex(x => x.id === h.id);
    if(price) {
      H[idx].curPrice = price;
      H[idx].lastUpd = new Date().toISOString();
      if(h.exchange) H[idx].exchange = h.exchange;
      ok++;
    } else { fails.push(h.ticker); }
  }
  persist();
  resetToFirstPageAndRender();
  icon.textContent = '↻';
  btn.disabled = false;
  if(fails.length) { toast('✅ '+ok+'개 완료 · ⚠️ 실패: '+fails.join(', '), 5000); }
  else { toast('✅ 전체 '+ok+'개 업데이트 완료'); }
}

async function doFetchFX() {
  const btn = document.getElementById('fx-btn'), icon = document.getElementById('fx-icon');
  btn.classList.add('busy');
  icon.innerHTML = '<span class="spin">⟳</span>';
  try {
    const r = await fetch('https://api.frankfurter.app/latest?from=USD&to=KRW', { signal: AbortSignal.timeout(5000) });
    const d = await r.json();
    if(d.rates && d.rates.KRW) { saveFX(d.rates.KRW, 'Frankfurter'); return; }
  } catch(e) {}
  try { const p = await yahooPrice('KRW=X'); if(p && p>100) { saveFX(p, '야후'); return; } } catch(e) {}
  toast('⚠️ 환율 조회 실패');
  btn.classList.remove('busy');
  icon.textContent = '↺';
}
function saveFX(rate, src) {
  fx = rate;
  fxT = new Date().toISOString();
  localStorage.setItem('sl-fx', rate);
  localStorage.setItem('sl-fxt', fxT);
  showFX(rate, fxT);
  resetToFirstPageAndRender();
  document.getElementById('fx-btn').classList.remove('busy');
  document.getElementById('fx-icon').textContent = '↺';
  toast('✅ USD/KRW '+rate.toLocaleString('ko-KR',{maximumFractionDigits:2})+'원');
}
function showFX(rate, time) {
  document.getElementById('fx-display').textContent = rate.toLocaleString('ko-KR',{maximumFractionDigits:2})+' ₩';
  if(time) document.getElementById('fx-time').textContent = new Date(time).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}

function exportCSV() {
  const rows = [['티커','종목명','시장','증권사','최초매수일','수량','평균매수가','매수환율','현재가','매수금액(KRW)','현재평가(KRW)','손익(KRW)','수익률(%)','메모']];
  H.forEach(h => {
    const p = calcPnl(h);
    rows.push([h.ticker, h.name, h.market, (h.brokers||[h.broker]).join('/'), h.date, h.qty, h.buyPrice, h.buyFX||'', h.curPrice||'', Math.round(buyKRW(h)), p ? Math.round(p.ck) : '', p ? Math.round(p.d) : '', p ? p.pct.toFixed(2) : '', h.memo||'']);
  });
  const csv = rows.map(r => r.map(v => '"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'}));
  a.download = 'stocklens-'+todayStr()+'.csv';
  a.click();
  toast('📋 CSV 내보내기 완료');
}

function todayStr() { return new Date().toISOString().split('T')[0]; }

function cfmShow(ico, msg, okLabel, okCls, cb) {
  cfmCB = cb;
  document.getElementById('cfm-ico').textContent = ico;
  document.getElementById('cfm-msg').textContent = msg;
  const ok = document.getElementById('cfm-ok');
  ok.textContent = okLabel;
  ok.className = 'btn '+okCls;
  document.getElementById('cfm-ov').classList.remove('hidden');
  document.getElementById('cfm-ov').classList.add('open');
}
function cfmOK() {
  document.getElementById('cfm-ov').classList.remove('open');
  setTimeout(() => document.getElementById('cfm-ov').classList.add('hidden'), 300);
  if(cfmCB) cfmCB();
  cfmCB = null;
}
function cfmCancel() {
  document.getElementById('cfm-ov').classList.remove('open');
  setTimeout(() => document.getElementById('cfm-ov').classList.add('hidden'), 300);
  cfmCB = null;
}

let toastTimer;
function toast(msg, dur) {
  dur = dur || 3000;
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('f-date').value = todayStr();
  onMarketChange();
  if(fx) showFX(fx, fxT);
  initSync();
});

firebase.auth().onAuthStateChanged(user => { updateUIForUser(user); });
</script>
