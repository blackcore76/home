<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="manifest" href="flip-clock-manifest.json">
<title>Dual Market Clock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#0a0a0a;color:#f0f0f0;
  font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(12px,3vh,32px);user-select:none;-webkit-user-select:none}

.clock-block{text-align:center}
.region{font-size:clamp(11px,1.6vw,18px);color:#888;letter-spacing:.2em;
  text-transform:uppercase;margin-bottom:clamp(2px,0.5vh,6px)}
.time{font-size:clamp(48px,12vw,120px);font-weight:900;letter-spacing:.04em;
  line-height:1;color:#fff;font-variant-numeric:tabular-nums}
.time .sec{font-size:.45em;color:#666;vertical-align:baseline;margin-left:4px}
.date{font-size:clamp(11px,1.6vw,16px);color:#666;margin-top:clamp(2px,0.5vh,6px);
  font-weight:700;letter-spacing:.08em}

.badges{display:flex;gap:clamp(4px,0.8vw,8px);justify-content:center;
  margin-top:clamp(4px,1vh,10px);flex-wrap:wrap}
.badge{padding:clamp(3px,0.5vh,6px) clamp(8px,1.2vw,14px);
  border-radius:20px;font-size:clamp(9px,1.2vw,13px);font-weight:700;
  letter-spacing:.05em;border:1.5px solid transparent;
  transition:none}
.badge.off{background:#1a1a1a;color:#444;border-color:#222}
.badge.on{color:#fff}

.badge.on[data-c="pre"]{background:#1a3a2a;border-color:#2d7a4f;color:#4ade80}
.badge.on[data-c="regular"]{background:#1a2a3a;border-color:#2563eb;color:#60a5fa}
.badge.on[data-c="post"]{background:#3a2a1a;border-color:#d97706;color:#fbbf24}
.badge.on[data-c="single"]{background:#2a1a2a;border-color:#9333ea;color:#c084fc}
.badge.on[data-c="preUS"]{background:#1a3a2a;border-color:#2d7a4f;color:#4ade80}
.badge.on[data-c="regularUS"]{background:#1a2a3a;border-color:#2563eb;color:#60a5fa}
.badge.on[data-c="afterUS"]{background:#3a2a1a;border-color:#d97706;color:#fbbf24}
.badge.on[data-c="dayUS"]{background:#2a1a2a;border-color:#9333ea;color:#c084fc}

.divider{width:clamp(200px,60vw,600px);height:1px;background:#1a1a1a}
</style>
</head>
<body>

<div class="clock-block" id="krBlock">
  <div class="region">KOREA · KRX</div>
  <div class="time" id="krTime">--:--<span class="sec">--</span></div>
  <div class="date" id="krDate"></div>
  <div class="badges" id="krBadges">
    <span class="badge off" data-c="pre" data-s="30600" data-e="32400">장전 시간외</span>
    <span class="badge off" data-c="regular" data-s="32400" data-e="55800">정규장</span>
    <span class="badge off" data-c="post" data-s="56400" data-e="57600">장후 시간외</span>
    <span class="badge off" data-c="single" data-s="57600" data-e="64800">시간외 단일가</span>
  </div>
</div>

<div class="divider"></div>

<div class="clock-block" id="usBlock">
  <div class="region">USA · NYSE</div>
  <div class="time" id="usTime">--:--<span class="sec">--</span></div>
  <div class="date" id="usDate"></div>
  <div class="badges" id="usBadges">
    <span class="badge off" data-c="dayUS" data-s="14400" data-e="25200">데이마켓</span>
    <span class="badge off" data-c="preUS" data-s="25200" data-e="34200">프리마켓</span>
    <span class="badge off" data-c="regularUS" data-s="34200" data-e="57600">정규장</span>
    <span class="badge off" data-c="afterUS" data-s="57600" data-e="72000">애프터마켓</span>
  </div>
</div>

<script>
const KR_TZ = 'Asia/Seoul';
const US_TZ = 'America/New_York';

const krTimeEl = document.getElementById('krTime');
const usTimeEl = document.getElementById('usTime');
const krDateEl = document.getElementById('krDate');
const usDateEl = document.getElementById('usDate');
const krBadges = document.querySelectorAll('#krBadges .badge');
const usBadges = document.querySelectorAll('#usBadges .badge');

function getTimeParts(tz) {
  const d = new Date();
  const h = d.toLocaleString('en-GB', {timeZone: tz, hour: '2-digit', hour12: false});
  const m = d.toLocaleString('en-GB', {timeZone: tz, minute: '2-digit'});
  const s = d.toLocaleString('en-GB', {timeZone: tz, second: '2-digit'});
  return {h: h.padStart(2,'0'), m: m.padStart(2,'0'), s: s.padStart(2,'0')};
}

function getSecondsOfDay(tz) {
  const d = new Date();
  const p = getTimeParts(tz);
  return parseInt(p.h)*3600 + parseInt(p.m)*60 + parseInt(p.s);
}

function formatDate(tz) {
  const d = new Date();
  return d.toLocaleDateString('ko-KR', {
    timeZone: tz, month: 'long', day: 'numeric', weekday: 'short'
  });
}

function updateBadges(badges, sod) {
  badges.forEach(b => {
    const s = parseInt(b.dataset.s);
    const e = parseInt(b.dataset.e);
    const isOn = sod >= s && sod < e;
    if (isOn && b.classList.contains('off')) {
      b.classList.remove('off');
      b.classList.add('on');
    } else if (!isOn && b.classList.contains('on')) {
      b.classList.remove('on');
      b.classList.add('off');
    }
  });
}

let lastKrDate = '', lastUsDate = '';

function tick() {
  const kr = getTimeParts(KR_TZ);
  const us = getTimeParts(US_TZ);

  krTimeEl.innerHTML = kr.h + ':' + kr.m + '<span class="sec">' + kr.s + '</span>';
  usTimeEl.innerHTML = us.h + ':' + us.m + '<span class="sec">' + us.s + '</span>';

  const krSod = parseInt(kr.h)*3600 + parseInt(kr.m)*60 + parseInt(kr.s);
  const usSod = parseInt(us.h)*3600 + parseInt(us.m)*60 + parseInt(us.s);

  updateBadges(krBadges, krSod);
  updateBadges(usBadges, usSod);

  if (kr.m + kr.s === '0000' || lastKrDate === '') {
    const kd = formatDate(KR_TZ);
    if (kd !== lastKrDate) { krDateEl.textContent = kd; lastKrDate = kd; }
  }
  if (us.m + us.s === '0000' || lastUsDate === '') {
    const ud = formatDate(US_TZ);
    if (ud !== lastUsDate) { usDateEl.textContent = ud; lastUsDate = ud; }
  }
}

tick();
setInterval(tick, 1000);

if ('wakeLock' in navigator) {
  (async () => {
    try {
      let wl = await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible') {
          try { wl = await navigator.wakeLock.request('screen'); } catch(e) {}
        }
      });
    } catch(e) {}
  })();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('flip-clock-sw.js').catch(() => {});
}
</script>
</body>
</html>
