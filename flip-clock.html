<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="manifest" href="flip-clock-manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600&display=swap" rel="stylesheet">
<title>Dual Market Clock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#0a0a0a;color:#f0f0f0;
  font-family:'Noto Sans KR',sans-serif;font-weight:600;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none}

.ticker-wrap{position:fixed;top:0;left:0;right:0;height:30px;z-index:95;
  background:rgba(10,10,10,.97);border-bottom:1px solid #1a1a1a;
  overflow:hidden;display:flex;align-items:center}
.ticker-track{display:flex;align-items:center;white-space:nowrap;
  animation:ticker-scroll 55s linear infinite;will-change:transform}
.ticker-track:hover{animation-play-state:paused}
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{display:inline-flex;align-items:center;gap:6px;padding:0 20px;
  font-family:'Noto Sans KR',sans-serif;font-size:13px;
  border-right:1px solid rgba(255,255,255,.06)}
.tk-name{color:#7a91a8;font-weight:500;letter-spacing:.04em}
.tk-price{color:#c8d6e8;font-weight:600}
.tk-chg{font-size:11px;font-weight:500}
.tk-chg.c-up{color:#ff3b5c}
.tk-chg.c-dn{color:#448aff}
.tk-chg.c-vup{color:#448aff}
.tk-chg.c-vdn{color:#ff3b5c}
.tk-chg.c-nt{color:#4a607a}

.wrap{display:flex;width:100%;max-width:1080px;height:300px;gap:0;padding:0 8px}

.clock{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center}
.clock:first-child{border-right:1px solid #1a1a1a}

.header{display:flex;align-items:baseline;gap:12px;margin-bottom:10px}
.region{font-size:24px;color:#bbb;letter-spacing:.15em}
.date{font-size:24px;color:#999;letter-spacing:.06em}

.time-row{display:flex;align-items:center;gap:16px}
.time{font-size:84px;font-weight:600;color:#fff;letter-spacing:.02em;
  line-height:1;font-variant-numeric:tabular-nums;white-space:nowrap}
.time .sec{font-size:36px;color:#666;margin-left:4px}

.badge-col{display:flex;flex-direction:column;gap:3px}
.badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;
  letter-spacing:.02em;white-space:nowrap;
  border:1px solid transparent}
.badge.off{background:#141414;color:#3a3a3a;border-color:#1a1a1a}
.badge.on{color:#fff}

.badge.on[data-c="pre"]{background:#1a3a2a;border-color:#2d7a4f;color:#4ade80}
.badge.on[data-c="regular"]{background:#1a2a3a;border-color:#2563eb;color:#60a5fa}
.badge.on[data-c="post"]{background:#3a2a1a;border-color:#d97706;color:#fbbf24}
.badge.on[data-c="single"]{background:#2a1a2a;border-color:#9333ea;color:#c084fc}
.badge.on[data-c="preUS"]{background:#1a3a2a;border-color:#2d7a4f;color:#4ade80}
.badge.on[data-c="regularUS"]{background:#1a2a3a;border-color:#2563eb;color:#60a5fa}
.badge.on[data-c="afterUS"]{background:#3a2a1a;border-color:#d97706;color:#fbbf24}
.badge.on[data-c="dayUS"]{background:#2a1a2a;border-color:#9333ea;color:#c084fc}

/* ── 전체화면 버튼 ── */
#fsBtn{position:fixed;right:12px;bottom:12px;z-index:99;
  width:44px;height:44px;line-height:44px;text-align:center;
  border-radius:22px;background:rgba(255,255,255,.08);
  color:#8a9bb0;font-size:20px;cursor:pointer;
  -webkit-transition:opacity .4s;transition:opacity .4s;opacity:.35}
#fsBtn:active{background:rgba(255,255,255,.18)}
#fsBtn.hide{opacity:0;pointer-events:none}

@media(max-width:760px){
  .ticker-wrap{height:24px}
  .ticker-item{font-size:11px;padding:0 12px;gap:4px}
  .tk-chg{font-size:9px}
  .wrap{height:auto;padding:0 4px}
  .header{gap:6px;margin-bottom:4px}
  .region{font-size:14px!important}
  .date{font-size:14px!important}
  .time-row{gap:8px}
  .time{font-size:48px}
  .time .sec{font-size:20px;margin-left:2px}
  .badge-col{gap:2px}
  .badge{padding:2px 6px;font-size:9px;border-radius:6px}
  #fsBtn{width:38px;height:38px;line-height:38px;font-size:17px;right:8px;bottom:8px}
}
@media(max-width:480px){
  .region{font-size:11px!important}
  .date{font-size:11px!important}
  .time{font-size:36px}
  .time .sec{font-size:16px}
  .badge{padding:1px 5px;font-size:8px}
}
</style>
</head>
<body>

<div class="ticker-wrap" id="tickerWrap">
  <div class="ticker-track" id="tickerTrack">
    <span class="tk-name" style="padding:0 16px;opacity:.4">로딩 중…</span>
  </div>
</div>

<div class="wrap">
  <div class="clock">
    <div class="header">
      <span class="region">KOREA · KRX</span>
      <span class="date" id="krDate"></span>
    </div>
    <div class="time-row">
      <div class="time" id="krTime">--:--<span class="sec">--</span></div>
      <div class="badge-col" id="krBadges">
        <span class="badge off" data-c="pre" data-s="30600" data-e="32400">장전 시간외</span>
        <span class="badge off" data-c="regular" data-s="32400" data-e="55800">정규장</span>
        <span class="badge off" data-c="post" data-s="56400" data-e="57600">장후 시간외</span>
        <span class="badge off" data-c="single" data-s="57600" data-e="64800">시간외 단일가</span>
      </div>
    </div>
  </div>

  <div class="clock">
    <div class="header">
      <span class="region">USA · NYSE</span>
      <span class="date" id="usDate"></span>
    </div>
    <div class="time-row">
      <div class="time" id="usTime">--:--<span class="sec">--</span></div>
      <div class="badge-col" id="usBadges">
        <span class="badge off" data-c="dayUS" data-s="72000" data-e="14400" data-wrap="1">데이마켓</span>
        <span class="badge off" data-c="preUS" data-s="14400" data-e="34200">프리마켓</span>
        <span class="badge off" data-c="regularUS" data-s="34200" data-e="57600">정규장</span>
        <span class="badge off" data-c="afterUS" data-s="57600" data-e="72000">애프터마켓</span>
      </div>
    </div>
  </div>
</div>

<div id="fsBtn" title="전체화면">⛶</div>

<script>
var KR_TZ = 'Asia/Seoul';
var US_TZ = 'America/New_York';

var krTimeEl = document.getElementById('krTime');
var usTimeEl = document.getElementById('usTime');
var krDateEl = document.getElementById('krDate');
var usDateEl = document.getElementById('usDate');
var krBadges = document.querySelectorAll('#krBadges .badge');
var usBadges = document.querySelectorAll('#usBadges .badge');

function getTimeParts(tz) {
  var d = new Date();
  var f = new Intl.DateTimeFormat('en-GB', {timeZone:tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
  var p = f.formatToParts(d);
  var obj = {};
  for (var i = 0; i < p.length; i++) {
    if (p[i].type !== 'literal') obj[p[i].type] = p[i].value;
  }
  return obj;
}

function formatDate(tz) {
  return new Date().toLocaleDateString('ko-KR', {
    timeZone:tz, month:'long', day:'numeric', weekday:'short'
  });
}

function updateBadges(badges, sod) {
  for (var i = 0; i < badges.length; i++) {
    var b = badges[i];
    var s = parseInt(b.getAttribute('data-s'), 10);
    var e = parseInt(b.getAttribute('data-e'), 10);
    var wrap = b.getAttribute('data-wrap') === '1';
    var isOn = wrap ? (sod >= s || sod < e) : (sod >= s && sod < e);
    if (isOn && b.className.indexOf('off') !== -1) {
      b.className = 'badge on';
    } else if (!isOn && b.className.indexOf('on') !== -1) {
      b.className = 'badge off';
    }
  }
}

var lastKrDate = '', lastUsDate = '';

function tick() {
  var kr = getTimeParts(KR_TZ);
  var us = getTimeParts(US_TZ);

  krTimeEl.innerHTML = kr.hour + ':' + kr.minute + '<span class="sec">' + kr.second + '</span>';
  usTimeEl.innerHTML = us.hour + ':' + us.minute + '<span class="sec">' + us.second + '</span>';

  var krSod = parseInt(kr.hour,10)*3600 + parseInt(kr.minute,10)*60 + parseInt(kr.second,10);
  var usSod = parseInt(us.hour,10)*3600 + parseInt(us.minute,10)*60 + parseInt(us.second,10);

  updateBadges(krBadges, krSod);
  updateBadges(usBadges, usSod);

  if (kr.second === '00' || lastKrDate === '') {
    var kd = formatDate(KR_TZ);
    if (kd !== lastKrDate) { krDateEl.textContent = kd; lastKrDate = kd; }
  }
  if (us.second === '00' || lastUsDate === '') {
    var ud = formatDate(US_TZ);
    if (ud !== lastUsDate) { usDateEl.textContent = ud; lastUsDate = ud; }
  }
}

tick();
setInterval(tick, 1000);

// ── 화면 꺼짐 방지 (지원하는 기기에서만) ──
if (navigator.wakeLock && navigator.wakeLock.request) {
  (function(){
    var wl = null;
    function req(){
      try {
        navigator.wakeLock.request('screen').then(function(s){ wl = s; }, function(){});
      } catch(e) {}
    }
    req();
    document.addEventListener('visibilitychange', function(){
      if (document.visibilityState === 'visible') req();
    });
  })();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('flip-clock-sw.js')['catch'](function(){});
}

// ── 티커 테이프 (구형 WebView 호환판) ──
(function(){
    var DEBUG = location.search.indexOf('debug') !== -1;
    var lastErr = '';

    var TICKER_INSTR = [
        { name:'NASDAQ',  sym:'^IXIC', isVix:false, fmt:'int', pre:'' },
        { name:'S&P500',  sym:'^GSPC', isVix:false, fmt:'int', pre:'' },
        { name:'DOW',     sym:'^DJI',  isVix:false, fmt:'int', pre:'' },
        { name:'VIX',     sym:'^VIX',  isVix:true,  fmt:'d2',  pre:'' },
        { name:'KOSPI',   sym:'^KS11', isVix:false, fmt:'d2',  pre:'' },
        { name:'KOSDAQ',  sym:'^KQ11', isVix:false, fmt:'d2',  pre:'' },
        { name:'금 현물', sym:'GC=F',  isVix:false, fmt:'d2',  pre:'$' },
        { name:'환율',    sym:'KRW=X', isVix:false, fmt:'d2',  pre:'₩' },
        { name:'WTI원유', sym:'CL=F',  isVix:true,  fmt:'d2',  pre:'$' }
    ];

    var PROXIES = [
        function(u){ return 'https://lotto-proxy.blackcore-ff6.workers.dev/?url=' + encodeURIComponent(u); },
        function(u){ return 'https://corsproxy.io/?url=' + encodeURIComponent(u); },
        function(u){ return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
        function(u){ return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u); }
    ];
    var winPx = null;

    function tkFmt(val, f, pre) {
        if (val === null || val === undefined) return '—';
        var s = (f === 'int')
            ? Math.round(val).toLocaleString('en-US')
            : val.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        return pre + s;
    }

    // fetch / AbortSignal.timeout 유무와 무관하게 동작하는 GET
    function httpGet(url, ms) {
        return new Promise(function(resolve, reject){
            var done = false, ctrl = null, xhr = null;
            var timer = setTimeout(function(){
                if (done) return;
                done = true;
                try { if (ctrl) ctrl.abort(); } catch(e){}
                try { if (xhr) xhr.abort(); } catch(e){}
                reject(new Error('timeout'));
            }, ms);

            function ok(v){ if (done) return; done = true; clearTimeout(timer); resolve(v); }
            function ng(e){ if (done) return; done = true; clearTimeout(timer); reject(e); }

            if (typeof fetch === 'function') {
                var opt = {};
                if (typeof AbortController === 'function') {
                    ctrl = new AbortController();
                    opt.signal = ctrl.signal;
                }
                fetch(url, opt).then(function(res){
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.text();
                }).then(ok, ng);
            } else {
                xhr = new XMLHttpRequest();
                xhr.open('GET', url, true);
                xhr.onreadystatechange = function(){
                    if (xhr.readyState !== 4) return;
                    if (xhr.status >= 200 && xhr.status < 300) ok(xhr.responseText);
                    else ng(new Error('HTTP ' + xhr.status));
                };
                xhr.onerror = function(){ ng(new Error('network')); };
                xhr.send();
            }
        });
    }

    function fetchOne(pfn, sym) {
        var url = 'https://query1.finance.yahoo.com/v8/finance/chart/'
                + encodeURIComponent(sym) + '?interval=1d&range=2d';
        return httpGet(pfn(url), 8000).then(function(txt){
            var d = JSON.parse(txt);
            var m = d && d.chart && d.chart.result && d.chart.result[0] && d.chart.result[0].meta;
            if (!m) throw new Error('no meta');
            return m;
        });
    }

    function fetchSym(sym) {
        var order = [];
        if (winPx !== null) order.push(PROXIES[winPx]);
        for (var i = 0; i < PROXIES.length; i++) {
            if (i !== winPx) order.push(PROXIES[i]);
        }
        var idx = 0;
        function next(){
            if (idx >= order.length) return Promise.resolve(null);
            var pfn = order[idx++];
            return fetchOne(pfn, sym).then(function(m){
                if (winPx === null) winPx = PROXIES.indexOf(pfn);
                return m;
            }, function(e){
                lastErr = (e && e.message) ? e.message : String(e);
                return next();
            });
        }
        return next();
    }

    function buildHTML(items) {
        var parts = [];
        for (var i = 0; i < items.length; i++) {
            var it = items[i];
            if (it.px === null || it.px === undefined) {
                parts.push('<span class="ticker-item"><span class="tk-name">' + it.name
                    + '</span><span class="tk-price tk-chg c-nt">—</span></span>');
                continue;
            }
            var chg = it.px - it.prv;
            var pct = it.prv ? (chg / it.prv) * 100 : 0;
            var up  = chg >= 0;
            var cls = it.isVix ? (up ? 'c-vup' : 'c-vdn') : (up ? 'c-up' : 'c-dn');
            parts.push('<span class="ticker-item"><span class="tk-name">' + it.name
                + '</span><span class="tk-price">' + tkFmt(it.px, it.fmt, it.pre)
                + '</span><span class="tk-chg ' + cls + '">' + (up ? '▲' : '▼') + ' '
                + (up ? '+' : '') + pct.toFixed(2) + '%</span></span>');
        }
        var html = parts.join('');
        return html + html;
    }

    function loadTicker() {
        var jobs = [];
        for (var i = 0; i < TICKER_INSTR.length; i++) {
            jobs.push(fetchSym(TICKER_INSTR[i].sym).then(null, function(){ return null; }));
        }
        return Promise.all(jobs).then(function(res){
            var items = [], anyOk = false;
            for (var k = 0; k < TICKER_INSTR.length; k++) {
                var inst = TICKER_INSTR[k], m = res[k], prv = null, px = null;
                if (m) {
                    px = (m.regularMarketPrice === undefined) ? null : m.regularMarketPrice;
                    prv = (m.chartPreviousClose === undefined || m.chartPreviousClose === null)
                        ? m.previousClose : m.chartPreviousClose;
                }
                if (px !== null && px !== undefined) anyOk = true;
                items.push({ name:inst.name, pre:inst.pre, fmt:inst.fmt,
                             isVix:inst.isVix, px:px, prv:prv });
            }
            var track = document.getElementById('tickerTrack');
            if (!track) return;
            if (!anyOk && DEBUG) {
                track.innerHTML = '<span class="ticker-item"><span class="tk-name">ERR</span>'
                    + '<span class="tk-price">' + lastErr + '</span></span>';
                return;
            }
            track.innerHTML = buildHTML(items);
        });
    }

    loadTicker();
    setInterval(loadTicker, 60000);
})();

// ── 전체화면 토글 ──
(function(){
    var btn = document.getElementById('fsBtn');
    var el  = document.documentElement;
    if (!btn) return;

    function isFs(){
        return document.fullscreenElement || document.webkitFullscreenElement || null;
    }
    function enter(){
        var fn = el.requestFullscreen || el.webkitRequestFullscreen;
        if (fn) { try { fn.call(el); } catch(e){} }
    }
    function exit(){
        var fn = document.exitFullscreen || document.webkitExitFullscreen;
        if (fn) { try { fn.call(document); } catch(e){} }
    }
    function sync(){ btn.innerHTML = isFs() ? '✕' : '⛶'; }

    btn.addEventListener('click', function(ev){
        ev.stopPropagation();
        if (isFs()) exit(); else enter();
        setTimeout(sync, 300);
    });
    document.addEventListener('fullscreenchange', sync);
    document.addEventListener('webkitfullscreenchange', sync);

    // 4초간 조작이 없으면 버튼을 숨기고, 화면을 건드리면 다시 표시
    var t = null;
    function poke(){
        btn.className = '';
        clearTimeout(t);
        t = setTimeout(function(){ btn.className = 'hide'; }, 4000);
    }
    document.addEventListener('touchstart', poke, true);
    document.addEventListener('mousemove', poke, true);
    poke();
})();
</script>
</body>
</html>
