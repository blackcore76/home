<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="manifest" href="flip-clock-manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600&display=swap" rel="stylesheet">
<title>Dual Market Clock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#0a0a0a;color:#f0f0f0;
  font-family:'Noto Sans KR',sans-serif;font-weight:600;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none}

.ticker-wrap{position:fixed;top:0;left:0;right:0;height:30px;z-index:95;
  background:rgba(10,10,10,.97);border-bottom:1px solid #1a1a1a;
  overflow:hidden;display:flex;align-items:center}
.ticker-track{display:flex;align-items:center;white-space:nowrap;
  animation:ticker-scroll 55s linear infinite;will-change:transform}
.ticker-track:hover{animation-play-state:paused}
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{display:inline-flex;align-items:center;gap:6px;padding:0 20px;
  font-family:'Noto Sans KR',sans-serif;font-size:13px;
  border-right:1px solid rgba(255,255,255,.06)}
.tk-name{color:#7a91a8;font-weight:500;letter-spacing:.04em}
.tk-price{color:#c8d6e8;font-weight:600}
.tk-chg{font-size:11px;font-weight:500}
.tk-chg.c-up{color:#ff3b5c}
.tk-chg.c-dn{color:#448aff}
.tk-chg.c-vup{color:#448aff}
.tk-chg.c-vdn{color:#ff3b5c}
.tk-chg.c-nt{color:#4a607a}

.wrap{display:flex;width:100%;max-width:1080px;height:300px;gap:0;padding:0 8px}

.clock{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center}
.clock:first-child{border-right:1px solid #1a1a1a}

.header{display:flex;align-items:baseline;gap:12px;margin-bottom:10px}
.region{font-size:24px;color:#bbb;letter-spacing:.15em}
.date{font-size:24px;color:#999;letter-spacing:.06em}

.time-row{display:flex;align-items:center;gap:16px}
.time{font-size:84px;font-weight:600;color:#fff;letter-spacing:.02em;
  line-height:1;font-variant-numeric:tabular-nums;white-space:nowrap}
.time .sec{font-size:36px;color:#666;margin-left:4px}

.badge-col{display:flex;flex-direction:column;gap:3px}
.badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;
  letter-spacing:.02em;white-space:nowrap;
  border:1px solid transparent}
.badge.off{background:#141414;color:#3a3a3a;border-color:#1a1a1a}
.badge.on{color:#fff}

.badge.on[data-c="pre"]{background:#1a3a2a;border-color:#2d7a4f;color:#4ade80}
.badge.on[data-c="regular"]{background:#1a2a3a;border-color:#2563eb;color:#60a5fa}
.badge.on[data-c="post"]{background:#3a2a1a;border-color:#d97706;color:#fbbf24}
.badge.on[data-c="single"]{background:#2a1a2a;border-color:#9333ea;color:#c084fc}
.badge.on[data-c="preUS"]{background:#1a3a2a;border-color:#2d7a4f;color:#4ade80}
.badge.on[data-c="regularUS"]{background:#1a2a3a;border-color:#2563eb;color:#60a5fa}
.badge.on[data-c="afterUS"]{background:#3a2a1a;border-color:#d97706;color:#fbbf24}
.badge.on[data-c="dayUS"]{background:#2a1a2a;border-color:#9333ea;color:#c084fc}

@media(max-width:760px){
  .ticker-wrap{height:24px}
  .ticker-item{font-size:11px;padding:0 12px;gap:4px}
  .tk-chg{font-size:9px}
  .wrap{height:auto;padding:0 4px}
  .header{gap:6px;margin-bottom:4px}
  .region{font-size:14px!important}
  .date{font-size:14px!important}
  .time-row{gap:8px}
  .time{font-size:48px}
  .time .sec{font-size:20px;margin-left:2px}
  .badge-col{gap:2px}
  .badge{padding:2px 6px;font-size:9px;border-radius:6px}
}
@media(max-width:480px){
  .region{font-size:11px!important}
  .date{font-size:11px!important}
  .time{font-size:36px}
  .time .sec{font-size:16px}
  .badge{padding:1px 5px;font-size:8px}
}
</style>
</head>
<body>

<div class="ticker-wrap" id="tickerWrap">
  <div class="ticker-track" id="tickerTrack">
    <span class="tk-name" style="padding:0 16px;opacity:.4">로딩 중…</span>
  </div>
</div>

<div class="wrap">
  <div class="clock">
    <div class="header">
      <span class="region">KOREA · KRX</span>
      <span class="date" id="krDate"></span>
    </div>
    <div class="time-row">
      <div class="time" id="krTime">--:--<span class="sec">--</span></div>
      <div class="badge-col" id="krBadges">
        <span class="badge off" data-c="pre" data-s="30600" data-e="32400">장전 시간외</span>
        <span class="badge off" data-c="regular" data-s="32400" data-e="55800">정규장</span>
        <span class="badge off" data-c="post" data-s="56400" data-e="57600">장후 시간외</span>
        <span class="badge off" data-c="single" data-s="57600" data-e="64800">시간외 단일가</span>
      </div>
    </div>
  </div>

  <div class="clock">
    <div class="header">
      <span class="region">USA · NYSE</span>
      <span class="date" id="usDate"></span>
    </div>
    <div class="time-row">
      <div class="time" id="usTime">--:--<span class="sec">--</span></div>
      <div class="badge-col" id="usBadges">
        <span class="badge off" data-c="dayUS" data-s="72000" data-e="14400" data-wrap="1">데이마켓</span>
        <span class="badge off" data-c="preUS" data-s="14400" data-e="34200">프리마켓</span>
        <span class="badge off" data-c="regularUS" data-s="34200" data-e="57600">정규장</span>
        <span class="badge off" data-c="afterUS" data-s="57600" data-e="72000">애프터마켓</span>
      </div>
    </div>
  </div>
</div>

<script>
const KR_TZ = 'Asia/Seoul';
const US_TZ = 'America/New_York';

const krTimeEl = document.getElementById('krTime');
const usTimeEl = document.getElementById('usTime');
const krDateEl = document.getElementById('krDate');
const usDateEl = document.getElementById('usDate');
const krBadges = document.querySelectorAll('#krBadges .badge');
const usBadges = document.querySelectorAll('#usBadges .badge');

function getTimeParts(tz) {
  const d = new Date();
  const f = new Intl.DateTimeFormat('en-GB', {timeZone:tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
  const p = f.formatToParts(d);
  const obj = {};
  p.forEach(x => { if(x.type!=='literal') obj[x.type]=x.value; });
  return obj;
}

function formatDate(tz) {
  return new Date().toLocaleDateString('ko-KR', {
    timeZone:tz, month:'long', day:'numeric', weekday:'short'
  });
}

function updateBadges(badges, sod) {
  badges.forEach(b => {
    const s = parseInt(b.dataset.s);
    const e = parseInt(b.dataset.e);
    const wrap = b.dataset.wrap === '1';
    const isOn = wrap ? (sod >= s || sod < e) : (sod >= s && sod < e);
    if (isOn && b.classList.contains('off')) {
      b.classList.remove('off'); b.classList.add('on');
    } else if (!isOn && b.classList.contains('on')) {
      b.classList.remove('on'); b.classList.add('off');
    }
  });
}

let lastKrDate = '', lastUsDate = '';

function tick() {
  const kr = getTimeParts(KR_TZ);
  const us = getTimeParts(US_TZ);

  krTimeEl.innerHTML = kr.hour+':'+kr.minute+'<span class="sec">'+kr.second+'</span>';
  usTimeEl.innerHTML = us.hour+':'+us.minute+'<span class="sec">'+us.second+'</span>';

  const krSod = parseInt(kr.hour)*3600+parseInt(kr.minute)*60+parseInt(kr.second);
  const usSod = parseInt(us.hour)*3600+parseInt(us.minute)*60+parseInt(us.second);

  updateBadges(krBadges, krSod);
  updateBadges(usBadges, usSod);

  if (kr.second==='00' || lastKrDate==='') {
    const kd = formatDate(KR_TZ);
    if(kd!==lastKrDate){krDateEl.textContent=kd;lastKrDate=kd;}
  }
  if (us.second==='00' || lastUsDate==='') {
    const ud = formatDate(US_TZ);
    if(ud!==lastUsDate){usDateEl.textContent=ud;lastUsDate=ud;}
  }
}

tick();
setInterval(tick, 1000);

if ('wakeLock' in navigator) {
  (async()=>{
    try{let wl=await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange',async()=>{
        if(document.visibilityState==='visible')
          try{wl=await navigator.wakeLock.request('screen')}catch(e){}
      });
    }catch(e){}
  })();
}

if ('serviceWorker' in navigator)
  navigator.serviceWorker.register('flip-clock-sw.js').catch(()=>{});

// ── 티커 테이프 ──
(function(){
    const TICKER_INSTR = [
        { name:'NASDAQ', sym:'^IXIC', isVix:false, fmt:'int', pre:'' },
        { name:'S&P500', sym:'^GSPC', isVix:false, fmt:'int', pre:'' },
        { name:'DOW',    sym:'^DJI',  isVix:false, fmt:'int', pre:'' },
        { name:'VIX',    sym:'^VIX',  isVix:true,  fmt:'d2',  pre:'' },
        { name:'KOSPI',  sym:'^KS11', isVix:false, fmt:'d2',  pre:'' },
        { name:'KOSDAQ', sym:'^KQ11', isVix:false, fmt:'d2',  pre:'' },
        { name:'금 현물', sym:'GC=F',  isVix:false, fmt:'d2',  pre:'$' },
        { name:'환율',   sym:'KRW=X', isVix:false, fmt:'d2',  pre:'₩' },
        { name:'WTI원유', sym:'CL=F',  isVix:true,  fmt:'d2',  pre:'$' },
    ];
    const PROXIES = [
        u => `https://lotto-proxy.blackcore-ff6.workers.dev/?url=${encodeURIComponent(u)}`,
        u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
        u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
        u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
    ];
    let winPx = null;
    function tkFmt(val, f, pre) {
        if (val == null) return '—';
        let s = f === 'int' ? Math.round(val).toLocaleString('en-US') : val.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        return pre + s;
    }
    async function fetchOne(pfn, sym) {
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=2d`;
        const ac = new AbortController();
        const tid = setTimeout(function(){ ac.abort(); }, 8000);
        let res;
        try {
            res = await fetch(pfn(url), { signal: ac.signal });
        } finally {
            clearTimeout(tid);
        }
        if (!res.ok) throw new Error(res.status);
        const d = await res.json();
        const m = d?.chart?.result?.[0]?.meta;
        if (!m) throw new Error('no meta');
        return m;
    }
    async function fetchSym(sym) {
        const order = winPx !== null ? [PROXIES[winPx], ...PROXIES.filter((_,i) => i !== winPx)] : PROXIES;
        for (let i = 0; i < order.length; i++) {
            try {
                const m = await fetchOne(order[i], sym);
                if (winPx === null) winPx = PROXIES.indexOf(order[i]);
                return m;
            } catch(e) {}
        }
        return null;
    }
    function buildHTML(items) {
        const parts = items.map(it => {
            const { name, pre, fmt: f, isVix, px, prv } = it;
            if (px == null) return `<span class="ticker-item"><span class="tk-name">${name}</span><span class="tk-price tk-chg c-nt">—</span></span>`;
            const chg = px - prv, pct = prv ? (chg/prv)*100 : 0, up = chg >= 0;
            const sg = up ? '+' : '';
            const cls = isVix ? (up ? 'c-vup' : 'c-vdn') : (up ? 'c-up' : 'c-dn');
            return `<span class="ticker-item"><span class="tk-name">${name}</span><span class="tk-price">${tkFmt(px,f,pre)}</span><span class="tk-chg ${cls}">${up?'▲':'▼'} ${sg}${pct.toFixed(2)}%</span></span>`;
        });
        return parts.join('') + parts.join('');
    }
    async function loadTicker() {
        const results = await Promise.allSettled(TICKER_INSTR.map(inst => fetchSym(inst.sym)));
        const items = TICKER_INSTR.map((inst, i) => {
            const m = results[i].status === 'fulfilled' ? results[i].value : null;
            return { ...inst, px: m?.regularMarketPrice ?? null, prv: m?.chartPreviousClose ?? m?.previousClose ?? null };
        });
        const track = document.getElementById('tickerTrack');
        if (track) track.innerHTML = buildHTML(items);
    }
    loadTicker();
    setInterval(loadTicker, 60000);
})();
</script>
</body>
</html>
